const REMINDERS_COLLECTION = 'reminders';

function useReminders() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const unsub = onSnapshot(
        query(userCol(REMINDERS_COLLECTION), orderBy('createdAt','desc')),
        snap => { setItems(snap.docs.map(d=>({docId:d.id,...d.data()}))); setLoading(false); },
        err  => { console.error('Reminders listener',err); setLoading(false); }
      );
      return unsub;
    }
    if (window.fb && getUserUID()) { const u=start(); return ()=>u&&u(); }
    let u;
    const hFb=()=>{ if(getUserUID()) u=start(); };
    const hUser=()=>{ if(u) u(); u=start(); };
    window.addEventListener('firebase-ready',hFb,{once:true});
    window.addEventListener('user-ready',hUser,{once:true});
    return ()=>{
      window.removeEventListener('firebase-ready',hFb);
      window.removeEventListener('user-ready',hUser);
      if(u) u();
    };
  },[]);
  return {items,loading};
}
async function addReminder(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(userCol(REMINDERS_COLLECTION), {...data, createdAt:Date.now(), done:false});
}
async function toggleReminderDone(docId, done) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(userDoc(REMINDERS_COLLECTION, docId), {done:!done, doneAt:!done?Date.now():null});
}
async function deleteReminder(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(userDoc(REMINDERS_COLLECTION, docId));
}

function NewReminderModal({ onClose }) {
  const [form, setForm] = useState({
    title:'', dueDate:'', priority:'Normal', project:'', notes:''
  });
  const [saving, setSaving] = useState(false);
  function set(f,v){setForm(s=>({...s,[f]:v}));}

  async function handleSave() {
    if (!form.title.trim()||!form.dueDate) return;
    setSaving(true);
    try { await addReminder(form); onClose(); }
    catch(e){ console.error(e); alert('Could not save.'); }
    finally{ setSaving(false); }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'var(--surface)',borderRadius:10,width:460,boxShadow:'0 8px 40px rgba(0,0,0,.22)',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
        <div style={{background:'var(--amber)',padding:'14px 18px'}}>
          <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>+ New Reminder</span>
        </div>
        <div style={{padding:'18px 20px'}}>
          <div className="form-group">
            <label className="form-label">Reminder Title</label>
            <input className="form-input" value={form.title} onChange={e=>set('title',e.target.value)} placeholder="e.g. Follow up with client on RA Bill payment" autoFocus />
          </div>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Due Date</label>
              <input className="form-input" type="date" value={form.dueDate} onChange={e=>set('dueDate',e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Priority</label>
              <select className="form-input form-select" value={form.priority} onChange={e=>set('priority',e.target.value)}>
                <option>Urgent</option><option>Normal</option><option>Low</option>
              </select>
            </div>
          </div>
          <ProjectSelect value={form.project} onChange={v=>set('project',v)} split={form.split} onSplitChange={v=>set('split',v)} />
          <div className="form-group">
            <label className="form-label">Notes</label>
            <input className="form-input" value={form.notes} onChange={e=>set('notes',e.target.value)} placeholder="Optional details" />
          </div>
        </div>
        <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={handleSave} disabled={saving||!form.title.trim()||!form.dueDate} className="btn btn-primary"
            style={{background:'var(--amber)',opacity:saving||!form.title.trim()||!form.dueDate?0.6:1}}>
            {saving?'Saving…':'Save Reminder'}
          </button>
        </div>
      </div>
    </div>
  );
}

function Reminders() {
  const { items: manualReminders, loading: remLoading } = useReminders();
  const { items: bills }     = useBills();
  const { tasks }            = useTasks();
  const { items: wos }       = useWorkOrders();
  const { items: raBills }   = useRABills();
  const [showNew, setShowNew] = useState(false);
  const [filter, setFilter] = useState('all'); // all | pending | done | overdue

  const today = new Date().toISOString().slice(0,10);
  const in7   = new Date(Date.now()+7*86400000).toISOString().slice(0,10);

  // Auto-generated reminders from live data
  const autoReminders = [
    // Overdue bills
    ...bills.filter(b=>!b.paid&&b.due&&b.due<today).map(b=>({
      docId: `auto-bill-${b.docId}`, auto:true,
      title: `Overdue bill — ${b.payee}`,
      notes: `${inr(b.amount||0)} · Due ${fmt(b.due)}`,
      dueDate: b.due, priority:'Urgent', project:b.project||'',
      done:false, category:'Bill'
    })),
    // Bills due in 7 days
    ...bills.filter(b=>!b.paid&&b.due&&b.due>=today&&b.due<=in7).map(b=>({
      docId: `auto-billdue-${b.docId}`, auto:true,
      title: `Bill due soon — ${b.payee}`,
      notes: `${inr(b.amount||0)} · Due ${fmt(b.due)}`,
      dueDate: b.due, priority:'Normal', project:b.project||'',
      done:false, category:'Bill'
    })),
    // Overdue tasks
    ...tasks.filter(t=>t.status!=='Completed'&&t.due&&t.due<today).map(t=>({
      docId: `auto-task-${t.docId}`, auto:true,
      title: `Overdue task — ${t.name}`,
      notes: `Assigned: ${t.assigned} · Due ${fmt(t.due)}`,
      dueDate: t.due, priority:'Urgent', project:t.project||'',
      done:false, category:'Task'
    })),
    // Overdue WOs
    ...wos.filter(w=>w.stage!=='Completed'&&w.stage!=='Cancelled'&&w.due&&w.due<today).map(w=>({
      docId: `auto-wo-${w.docId}`, auto:true,
      title: `Work order overdue — ${w.wo}`,
      notes: `${w.vendorName} · ${w.stage}`,
      dueDate: w.due, priority:'Urgent', project:w.project||'',
      done:false, category:'Work Order'
    })),
    // RA Bills with pending balance
    ...raBills.filter(b=>b.status!=='Fully Received'&&b.balancePending>0).map(b=>({
      docId: `auto-ra-${b.docId}`, auto:true,
      title: `RA Bill payment pending — ${b.raBillNo}`,
      notes: `${b.client} · Balance: ${inr(b.balancePending||0)}`,
      dueDate: today, priority:'Normal', project:b.project||'',
      done:false, category:'Receipt'
    })),
  ];

  const allItems = [
    ...autoReminders,
    ...manualReminders.map(r=>({...r, auto:false, category:'Manual'}))
  ].sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||''));

  const filtered = allItems.filter(r=>{
    if (filter==='pending') return !r.done;
    if (filter==='done')    return r.done;
    if (filter==='overdue') return !r.done && r.dueDate < today;
    return true;
  });

  const overdueCount = allItems.filter(r=>!r.done&&r.dueDate<today).length;
  const pendingCount = allItems.filter(r=>!r.done).length;

  const PRIO_BADGE = {Urgent:'red',Normal:'amber',Low:'grey'};
  const CAT_BADGE  = {Bill:'red',Task:'blue','Work Order':'teal',Receipt:'green',Manual:'grey'};

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Reminders</div>
          <div className="section-sub">{pendingCount} pending · {overdueCount} overdue · auto-generated from live data</div>
        </div>
        <button className="btn btn-primary" style={{background:'var(--amber)'}} onClick={()=>setShowNew(true)}>+ Add Reminder</button>
      </div>

      <div className="stats-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        <div className="stat-card"><div className="stat-label">Total</div><div className="stat-value">{allItems.length}</div></div>
        <div className="stat-card"><div className="stat-label">Overdue</div><div className="stat-value red">{overdueCount}</div></div>
        <div className="stat-card"><div className="stat-label">Pending</div><div className="stat-value amber">{pendingCount}</div></div>
        <div className="stat-card"><div className="stat-label">Done</div><div className="stat-value green">{allItems.filter(r=>r.done).length}</div></div>
      </div>

      <div className="tabs">
        {[['all','All'],['pending','Pending'],['overdue','Overdue'],['done','Done']].map(([v,l])=>(
          <div key={v} className={`tab ${filter===v?'active':''}`} onClick={()=>setFilter(v)}>{l}</div>
        ))}
      </div>

      <div className="card">
        {filtered.length === 0 ? (
          <div className="module-coming">
            <div className="big-icon">🔔</div>
            <h3>No reminders</h3>
            <p className="text-muted">All clear! Add a manual reminder or they'll auto-generate from overdue bills, tasks and work orders.</p>
          </div>
        ) : filtered.map(r=>(
          <div key={r.docId} style={{
            display:'flex',alignItems:'flex-start',gap:12,padding:'12px 16px',
            borderBottom:'1px solid var(--border)',
            background: r.done?'var(--grey-50)': r.dueDate<today?'#FFF3F3':'',
            opacity: r.done?0.6:1
          }}>
            {/* Done toggle — only for manual reminders */}
            <div style={{paddingTop:2,flexShrink:0}}>
              {r.auto ? (
                <div style={{width:18,height:18,borderRadius:'50%',background:PRIO_BADGE[r.priority]==='red'?'var(--red)':PRIO_BADGE[r.priority]==='amber'?'var(--amber)':'var(--grey)',opacity:.8}} />
              ) : (
                <div onClick={()=>toggleReminderDone(r.docId,r.done)}
                  style={{width:18,height:18,borderRadius:4,border:`2px solid ${r.done?'var(--green)':'var(--border)'}`,
                    background:r.done?'var(--green)':'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {r.done&&<span style={{color:'#fff',fontSize:11,fontWeight:700}}>✓</span>}
                </div>
              )}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:13,textDecoration:r.done?'line-through':'none'}}>{r.title}</div>
              {r.notes && <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>{r.notes}</div>}
              <div style={{display:'flex',gap:6,marginTop:5,flexWrap:'wrap'}}>
                <span className={`badge ${PRIO_BADGE[r.priority]||'grey'}`}>{r.priority}</span>
                <span className={`badge ${CAT_BADGE[r.category]||'grey'}`}>{r.category}</span>
                {r.project&&<span className={`badge ${PROJECT_COLOR[r.project]||'grey'}`}>{r.project}</span>}
                {r.auto&&<span className="badge grey" style={{fontSize:9}}>AUTO</span>}
              </div>
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontSize:11.5,color:r.dueDate<today&&!r.done?'var(--red)':'var(--text-muted)',fontWeight:r.dueDate<today&&!r.done?600:400}}>
                {r.dueDate<today&&!r.done?'⚠ ':''}{fmt(r.dueDate)}
              </div>
              {!r.auto && (
                <button className="btn btn-sm btn-ghost" style={{marginTop:4,fontSize:10}} onClick={()=>deleteReminder(r.docId)}>Delete</button>
              )}
            </div>
          </div>
        ))}
      </div>
      {showNew && <NewReminderModal onClose={()=>setShowNew(false)} />}
    </div>
  );
}

function Reports() {
  const { tasks }            = useTasks();

  const { items: advances }  = useAdvances();
  const { items: wos }       = useWorkOrders();
  const { items: pos }       = usePurchaseOrders();
  const { items: petty }     = usePettyCash();
  const { items: receipts }  = useReceipts();
  const { items: raBills }   = useRABills();
  const { items: vendors }   = useVendors();
  const [tab, setTab] = useState('finance');

  const today = new Date().toISOString().slice(0,10);
  const thisMonth = today.slice(0,7);
  const thisYear  = today.slice(0,4);

  // ── Finance Summary ──
  const totalBillsAmt    = bills.reduce((s,b)=>s+Number(b.amount||0),0);
  const paidBillsAmt     = bills.filter(b=>b.paid).reduce((s,b)=>s+Number(b.amount||0),0);
  const unpaidBillsAmt   = totalBillsAmt - paidBillsAmt;
  const overdueBillsAmt  = bills.filter(b=>!b.paid&&b.due&&b.due<today).reduce((s,b)=>s+Number(b.amount||0),0);
  const totalAdvances    = advances.reduce((s,a)=>s+Number(a.amount||0),0);

  const totalPetty       = petty.reduce((s,p)=>s+Number(p.amount||0),0);
  const thisMonthPetty   = petty.filter(p=>(p.date||'').startsWith(thisMonth)).reduce((s,p)=>s+Number(p.amount||0),0);
  const totalPOValue     = pos.reduce((s,p)=>s+Number(p.value||0),0);
  const totalWOValue     = wos.reduce((s,w)=>s+Number(w.value||0),0);
  const totalRABilled    = raBills.reduce((s,b)=>s+Number(b.amountClaimed||0),0);
  const totalRAPending   = raBills.reduce((s,b)=>s+Number(b.balancePending||0),0);

  // ── Bill breakdown by category ──
  const billsByCat = {};
  bills.forEach(b=>{ const c=b.category||'Other'; billsByCat[c]=(billsByCat[c]||0)+Number(b.amount||0); });

  // ── Petty by category ──

  // ── Petty by person ──

  // ── Tasks summary ──

  wos.forEach(w=>{ wosByStage[w.stage]=(wosByStage[w.stage]||0)+1; });

  // ── Vendor spend ──

  bills.forEach(b=>{ const v=b.payee||'Unknown'; vendorSpend[v]=(vendorSpend[v]||0)+Number(b.amount||0); });

function QuotationApprovalAction({ quotation, currentUser, onApproved, onRejected }) {
  const [working, setWorking] = useState(false);

  async function handleApprove() {
    if (!can(currentUser, 'approve_quotation')) { alert('You do not have permission to approve quotations.'); return; }
    setWorking(true);
    try {
      await updateQuotation(quotation.docId, {
        approved: true,
        approvedBy: currentUser.name,
        approvedByUid: currentUser.uid,
        approvedAt: Date.now(),
        stage: 'Finalized'
      });
      onApproved && onApproved();
    } catch(e) { console.error(e); alert('Could not approve.'); }
    finally { setWorking(false); }
  }

  async function handleReject() {
    setWorking(true);
    try {
      await updateQuotation(quotation.docId, { approved: false, rejectedBy: currentUser.name, rejectedAt: Date.now() });
      onRejected && onRejected();
    } catch(e) { console.error(e); alert('Could not update.'); }
    finally { setWorking(false); }
  }

  if (quotation.approved) {
    return (
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <span className="badge green">✓ Approved</span>
        <span style={{fontSize:10.5,color:'var(--text-muted)'}}>by {quotation.approvedBy}</span>
        <button className="btn btn-sm btn-ghost" style={{fontSize:10}} onClick={handleReject} disabled={working}>Revoke</button>
      </div>
    );
  }

  return (
    <PermGate user={currentUser} action="approve_quotation" fallback={
      <span style={{fontSize:11,color:'var(--text-muted)'}}>Pending approval</span>
    }>
      <button className="btn btn-sm btn-primary" style={{background:'var(--green)'}} onClick={handleApprove} disabled={working}>
        {working?'…':'✓ Approve'}
      </button>
    </PermGate>
  );
}

// ─── Wrapper: Quotations with currentUser for approval ─
function QuotationsWithUser({ currentUser }) {
  const { items, loading } = useQuotations();
  const { items: reqs } = useRequisitions();
  const [showNew, setShowNew] = useState(false);
  const [stageFilter, setStageFilter] = useState('all');
  const [approvedFilter, setApprovedFilter] = useState('all');
  const [vendorFilter, setQVendorFilter] = useState('all');
  const [projectFilter, setQProjectFilter] = useState('all');
  const [qSortBy, setQSortBy] = useState('date_desc');
  const [issuingFor, setIssuingFor] = useState(null);
  const [viewSchedule, setViewSchedule] = useState(null);
  const [editQuote, setEditQuote] = useState(null);

  const qVendors = [...new Set(items.map(q=>q.vendorName).filter(Boolean))].sort();
  const filtered = [...items].sort((a,b)=>
    qSortBy==='date_asc'?(a.receivedDate||'').localeCompare(b.receivedDate||''):
    qSortBy==='amount_desc'?Number(b.value||0)-Number(a.value||0):
    qSortBy==='amount_asc'?Number(a.value||0)-Number(b.value||0):
    qSortBy==='vendor_asc'?(a.vendorName||'').localeCompare(b.vendorName||''):
    (b.receivedDate||'').localeCompare(a.receivedDate||'')
  ).filter(q =>
    (stageFilter==='all' || q.stage===stageFilter) &&
    (approvedFilter==='all' || (approvedFilter==='approved'&&q.approved) || (approvedFilter==='pending'&&!q.approved)) &&
    (vendorFilter==='all' || q.vendorName===vendorFilter) &&
    (projectFilter==='all' || q.project===projectFilter)
  );
  const pipelineValue = items.filter(q=>!q.approved).reduce((s,q)=>s+Number(q.value||0),0);

  async function advanceStage(q) {
    if (q.stage === 'Receipt of Quotation') {
      try { await updateQuotation(q.docId, { stage: 'Finalized' }); }
      catch(e) { console.error(e); alert('Could not update stage.'); }
    } else if (q.stage === 'Finalized') {
      setIssuingFor(q);
    }
  }

  function reqLabel(id) {
    const r = reqs.find(r=>r.docId===id||r.req===id);
    return r ? `${r.req} — ${r.description?.slice(0,30)}` : (id||'—');
  }

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Quotations</div>
          <div className="section-sub">{loading?'Loading…':`${items.length} quotation${items.length===1?'':'s'} · pipeline ${inr(pipelineValue)}`}</div>
        </div>
        <div className="flex gap-2">
          <PermGate user={currentUser} action="enter_quotation" fallback={null}>
            <button className="btn btn-primary" onClick={()=>setShowNew(true)}>+ New Quotation</button>
          </PermGate>
          <ClearCollectionButton label="Clear All" count={items.length} onClear={clearAllQuotations} />
        </div>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="card-body" style={{paddingTop:10,paddingBottom:10}}>
          <div className="flex gap-2" style={{flexWrap:'wrap'}}>
            <select className="form-input form-select" style={{width:200}} value={stageFilter} onChange={e=>setStageFilter(e.target.value)}>
              <option value="all">All Stages</option>
              {QUOTE_STAGES.map(s=><option key={s}>{s}</option>)}
            </select>
            <select className="form-input form-select" style={{width:160}} value={approvedFilter} onChange={e=>setApprovedFilter(e.target.value)}>
              <option value="all">All</option>
              <option value="approved">Approved only</option>
              <option value="pending">Pending approval</option>
            </select>
            <select className="form-input form-select" style={{width:160}} value={vendorFilter} onChange={e=>setQVendorFilter(e.target.value)}>
              <option value="all">All Vendors</option>
              {qVendors.map(v=><option key={v}>{v}</option>)}
            </select>
            <select className="form-input form-select" style={{width:130}} value={projectFilter} onChange={e=>setQProjectFilter(e.target.value)}>
              <option value="all">All Projects</option>
              {PROJECTS.map(p=><option key={p}>{p}</option>)}
            </select>
            <select className="form-input form-select" style={{width:190}} value={qSortBy} onChange={e=>setQSortBy(e.target.value)}>
              <option value="date_desc">↓ Received Date (Newest)</option>
              <option value="date_asc">↑ Received Date (Oldest)</option>
              <option value="amount_desc">↓ Value (Highest)</option>
              <option value="amount_asc">↑ Value (Lowest)</option>
              <option value="vendor_asc">A→Z Vendor</option>
            </select>
          </div>
        </div>
      </div>

      <div className="card">
        {loading ? (
          <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
        ) : filtered.length===0 ? (
          <div className="module-coming">
            <div className="big-icon">📋</div>
            <h3>No quotations yet</h3>
            <p className="text-muted">Add vendor quotations. Link to a requisition. Approve the best one to issue a PO or WO.</p>
          </div>
        ) : (
          <table>
            <thead>
              <tr><th>Quot #</th><th>Vendor</th><th>Project</th><th>REQ Ref</th><th>Value</th><th>Payment Schedule</th><th>Stage</th><th>Approval</th><th>Actions</th></tr>
            </thead>
            <tbody>
              {filtered.map(q=>(
                <tr key={q.docId} style={{background:q.approved?'#F0FFF4':''}}>
                  <td className="mono" style={{whiteSpace:'nowrap'}}>{q.quotNo||'—'}</td>
                  <td className="fw-600">{q.vendorName}</td>
                  <td>{q.project?<span className={`badge ${PROJECT_COLOR[q.project]||'grey'}`}>{q.project}</span>:<span className="text-muted">—</span>}</td>
                  <td style={{fontSize:11.5,color:'var(--text-muted)'}}>{reqLabel(q.linkedReq)}</td>
                  <td className="amount fw-600">{inr(q.value||0)}</td>
                  <td>
                    {q.paymentSchedule&&q.paymentSchedule.length>0
                      ? <span className="btn btn-sm btn-ghost" style={{cursor:'pointer'}} onClick={()=>setViewSchedule(q)}>{q.paymentSchedule.length} stage{q.paymentSchedule.length===1?'':'s'}</span>
                      : <span className="text-muted text-sm">—</span>}
                  </td>
                  <td><span className={`badge ${STAGE_COLOR[q.stage]||'grey'}`}>{q.stage}</span></td>
                  <td>
                    <QuotationApprovalAction quotation={q} currentUser={currentUser} />
                  </td>
                  <td>
                    <div className="flex gap-2">
                      {q.approved && q.stage==='Finalized' && (
                        <PermGate user={currentUser} action="issue_po">
                          <button className="btn btn-sm btn-primary" style={{background:'var(--green)'}} onClick={()=>setIssuingFor(q)}>Issue PO →</button>
                        </PermGate>
                      )}
                      <button className="btn btn-sm btn-ghost" onClick={()=>setEditQuote(q)}>Edit</button>
                      {q.stage==='Receipt of Quotation' && (
                        <button className="btn btn-sm btn-ghost" onClick={()=>advanceStage(q)}>→ Finalize</button>
                      )}
                      <button className="btn btn-sm btn-ghost" onClick={()=>{if(confirm('Delete?'))deleteQuotation(q.docId);}}>Delete</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
      {showNew && <NewQuotationWithREQ onClose={()=>setShowNew(false)} reqs={reqs} />}
      {editQuote && <NewQuotationWithREQ onClose={()=>setEditQuote(null)} reqs={reqs} existing={editQuote} />}
      {issuingFor && <IssuePOModal quotation={issuingFor} onClose={()=>setIssuingFor(null)} onIssued={()=>setIssuingFor(null)} />}
      {viewSchedule && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setViewSchedule(null)}>
          <div style={{background:'var(--surface)',borderRadius:10,width:420,boxShadow:'0 8px 40px rgba(0,0,0,.22)',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
            <div style={{background:'var(--primary)',padding:'14px 18px'}}>
              <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>Payment Schedule — {viewSchedule.vendorName}</span>
            </div>
            <div style={{padding:'16px 20px'}}>
              <table style={{width:'100%'}}>
                <thead><tr>
                  {['Stage','%','Amount','Date'].map(h=><th key={h} style={{fontSize:10,textAlign:'left',color:'var(--text-muted)',padding:'4px 0'}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {(viewSchedule.paymentSchedule||[]).map((r,i)=>(
                    <tr key={i} style={{borderTop:'1px solid var(--grey-50)'}}>
                      <td style={{padding:'6px 0',fontSize:12.5}}>{r.name}</td>
                      <td style={{fontSize:12.5}}>{r.pct}%</td>
                      <td className="amount" style={{fontSize:12.5}}>{inr(r.amount||0)}</td>
                      <td style={{fontSize:12.5}}>{r.date||'—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{padding:'0 20px 16px',display:'flex',justifyContent:'flex-end'}}>
              <button onClick={()=>setViewSchedule(null)} className="btn btn-ghost">Close</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── New Quotation with REQ dropdown and Quot Number ─
function NewQuotationWithREQ({ onClose, reqs, existing }) {
  const isEdit = !!existing;
  const knownNames = useKnownNames();
  const [form, setForm] = useState(isEdit ? {
    quotNo: existing.quotNo||'', vendorName: existing.vendorName||'',
    description: existing.description||'', value: existing.value ? String(existing.value) : '',
    receivedDate: existing.receivedDate||'',
    stage: existing.stage||'Receipt of Quotation', notes: existing.notes||'', project: existing.project||''
  } : {
    quotNo:'', vendorName:'', description:'', value:'',
    receivedDate: new Date().toISOString().slice(0,10),
    stage:'Receipt of Quotation', notes:'', project:''
  });
  const [schedule, setSchedule] = useState(isEdit && existing.paymentSchedule ? existing.paymentSchedule.map(r=>({...r,id:genRowId()})) : []);
  const [saving, setSaving] = useState(false);
  function set(f,v){setForm(s=>({...s,[f]:v}));}

  async function handleSave(){
    if(!form.vendorName.trim()||!form.value) return;
    setSaving(true);
    try{
      if (isEdit) {
        await updateQuotation(existing.docId, {...form, value:Number(form.value), paymentSchedule:schedule});
      } else {
        await addQuotation({...form,value:Number(form.value),paymentSchedule:schedule});
      }
      onClose();
    }catch(e){console.error(e);alert('Could not save quotation.');}
    finally{setSaving(false);}
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'var(--surface)',borderRadius:10,width:580,maxHeight:'92vh',overflowY:'auto',boxShadow:'0 8px 40px rgba(0,0,0,.22)'}} onClick={e=>e.stopPropagation()}>
        <div style={{background:'var(--primary)',padding:'14px 18px',position:'sticky',top:0,zIndex:1}}>
          <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>{isEdit ? '✏ Edit Quotation' : '+ New Quotation'}</span>
        </div>
        <div style={{padding:'18px 20px'}}>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Quotation Number</label>
              <input className="form-input font-mono" value={form.quotNo} onChange={e=>set('quotNo',e.target.value)} placeholder="e.g. QUOT/2026-27/001" autoFocus />
            </div>
            <div className="form-group">
              <label className="form-label">Received Date</label>
              <input className="form-input" type="date" value={form.receivedDate} onChange={e=>set('receivedDate',e.target.value)} />
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Vendor Name</label>
            <AutocompleteInput value={form.vendorName} onChange={v=>set('vendorName',v)} suggestions={knownNames.vendors} placeholder="Vendor / supplier name" />
          </div>
          <div className="form-group">
            <label className="form-label">Description</label>
            <input className="form-input" value={form.description} onChange={e=>set('description',e.target.value)} placeholder="e.g. RO membranes — 5 units, 4040 size" />
          </div>
          <div className="form-group">
            <label className="form-label">Total Value (₹)</label>
            <input className="form-input font-mono" value={form.value} onChange={e=>set('value',e.target.value)} placeholder="0" />
          </div>
          <div className="form-group">
            <label className="form-label">Stage</label>
            <select className="form-input form-select" value={form.stage} onChange={e=>set('stage',e.target.value)}>
              {QUOTE_STAGES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <PaymentScheduleEditor rows={schedule} setRows={setSchedule} totalValue={form.value} />
          <div className="form-group">
            <label className="form-label">Notes</label>
            <textarea className="form-input" rows="2" value={form.notes} onChange={e=>set('notes',e.target.value)} style={{resize:'vertical'}} />
          </div>
          <ProjectSelect value={form.project} onChange={v=>set('project',v)} split={form.split} onSplitChange={v=>set('split',v)} />
        </div>
        <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={handleSave} disabled={saving||!form.vendorName.trim()||!form.value} className="btn btn-primary"
            style={{opacity: (saving||!form.vendorName.trim()||!form.value) ? 0.6 : 1}}>
            {saving?'Saving…': isEdit ? 'Save Changes' : 'Save Quotation'}
          </button>
        </div>
      </div>
    </div>
  );
}

function usePermSettings() {
  const [perms, setPerms] = useState(DEFAULT_PERMISSIONS);
  useEffect(() => {
    function start() {
      const { db, doc, onSnapshot } = window.fb;
      const unsub = onSnapshot(doc(db, 'settings', 'permissions'), snap => {
        if (snap.exists()) setPerms(s => ({ ...DEFAULT_PERMISSIONS, ...snap.data() }));
      }, err => console.error('Perms listener', err));
      return unsub;
    }
    if (window.fb) { const u=start(); return ()=>u&&u(); }
    let u; const h=()=>{u=start();};
    window.addEventListener('firebase-ready',h,{once:true});
    return ()=>{ window.removeEventListener('firebase-ready',h); if(u)u(); };
  }, []);
  async function savePerms(newPerms) {
    const { db, doc, setDoc } = window.fb;
    await setDoc(doc(db, 'settings', 'permissions'), newPerms, { merge: true });
  }
  return { perms, setPerms, savePerms };
}

function PermissionMatrix({ currentUser }) {
  const { perms, setPerms, savePerms } = usePermSettings();
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  function toggle(role, action) {
    if (role==='owner') return;
    setPerms(p => ({ ...p, [role]: { ...(p[role]||{}), [action]: !(p[role]||{})[action] } }));
  }
  async function handleSave() {
    setSaving(true);
    try { await savePerms(perms); setSaved(true); setTimeout(()=>setSaved(false),2000); }
    catch(e) { console.error(e); alert('Could not save.'); }
    finally { setSaving(false); }
  }
  return (
    <div className="card">
      <div className="card-header" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span className="card-title">Role & Permission Matrix</span>
        <button className="btn btn-sm btn-primary" onClick={handleSave} disabled={saving}>
          {saving?'Saving…':saved?'✓ Saved':'Save Permissions'}
        </button>
      </div>
      <div className="card-body" style={{overflowX:'auto'}}>
        <table style={{width:'100%',minWidth:500}}>
          <thead>
            <tr>
              <th style={{textAlign:'left',fontSize:11,color:'var(--text-muted)',padding:'6px 10px',width:180}}>Action</th>
              {ROLES_LIST.map(r=><th key={r.key} style={{textAlign:'center',fontSize:11,color:'var(--text-muted)',padding:'6px 10px'}}>{r.label}</th>)}
            </tr>
          </thead>
          <tbody>
            {ACTIONS_LIST.map(a=>(
              <tr key={a.key} style={{borderTop:'1px solid var(--grey-50)'}}>
                <td style={{fontSize:12.5,padding:'8px 10px'}}>{a.label}</td>
                {ROLES_LIST.map(r=>{
                  const granted = r.key==='owner' ? true : !!(perms[r.key]||{})[a.key];
                  return (
                    <td key={r.key} style={{textAlign:'center',padding:'8px 10px'}}>
                      <div onClick={()=>toggle(r.key,a.key)} style={{width:36,height:20,borderRadius:10,margin:'0 auto',
                        cursor:r.key==='owner'?'not-allowed':'pointer',
                        background:granted?'var(--green)':'var(--border)',position:'relative',transition:'background .15s'}}>
                        <div style={{position:'absolute',top:2,left:granted?18:2,width:16,height:16,borderRadius:'50%',
                          background:'#fff',transition:'left .15s',boxShadow:'0 1px 3px rgba(0,0,0,.2)'}} />
                      </div>
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{fontSize:11,color:'var(--text-muted)',marginTop:10}}>Owner always has full access.</div>
      </div>
    </div>
  );
}

// ─── Login Screen ─────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  async function handleLogin() {
    if (!email.trim() || !password) return;
    setLoading(true); setError('');
    try {
      const { auth, signInWithEmailAndPassword, db, doc, onSnapshot } = window.fb;
      const cred = await signInWithEmailAndPassword(auth, email.trim(), password);
      const uid = cred.user.uid;
      // Fetch profile from Firestore
      const userRef = doc(db, uid, uid);
      const snap = await new Promise((res,rej) => {
        const unsub = onSnapshot(userRef, s => { unsub(); res(s); }, rej);
      });
      let profile;
      if (snap.exists()) {
        const d = snap.data();
        const name = d.name || d.Name || cred.user.email;
        const role = d.role || d.Role || 'viewer';
        profile = { uid, name, email: cred.user.email, initials: d.initials||(name[0]||'U').toUpperCase(), role };
      } else {
        profile = { uid, name: cred.user.email, email: cred.user.email, initials: cred.user.email[0].toUpperCase(), role: 'owner' };
      }
      window.currentUser = profile;
      onLogin(profile);
    } catch(e) {
      console.error('Login error:', e);
      if (e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'||e.code==='auth/user-not-found') setError('Incorrect email or password.');
      else if (e.code==='auth/invalid-email') setError('Please enter a valid email address.');
      else if (e.code==='auth/too-many-requests') setError('Too many attempts. Please wait and try again.');
      else setError('Sign in failed. Check your connection and try again.');
    } finally { setLoading(false); }
  }

  return (
    <div style={{minHeight:'100vh',background:'var(--primary-dark)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-sans)'}}>
      <div style={{background:'var(--surface)',borderRadius:12,width:380,boxShadow:'0 8px 40px rgba(0,0,0,.3)',overflow:'hidden'}}>
        <div style={{background:'var(--primary)',padding:'32px 28px 28px',textAlign:'center'}}>
          <div style={{fontSize:36,marginBottom:10}}>💧</div>
          <div style={{fontWeight:800,fontSize:18,color:'#fff',letterSpacing:.3}}>Nirmaan Watertech</div>
          <div style={{fontSize:12,color:'rgba(255,255,255,.65)',marginTop:4}}>Internal Workflow Platform</div>
        </div>
        <div style={{padding:'28px 28px 24px'}}>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:11.5,fontWeight:600,color:'var(--text-secondary)',display:'block',marginBottom:5}}>Email Address</label>
            <input type="email" value={email} onChange={e=>{setEmail(e.target.value);setError('');}}
              onKeyDown={e=>e.key==='Enter'&&handleLogin()} placeholder="you@nirmaanwatertech.com" autoFocus
              style={{width:'100%',padding:'10px 12px',border:`1px solid ${error?'var(--red)':'var(--border)'}`,borderRadius:6,fontSize:13,outline:'none',boxSizing:'border-box'}} />
          </div>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:11.5,fontWeight:600,color:'var(--text-secondary)',display:'block',marginBottom:5}}>Password</label>
            <input type="password" value={password} onChange={e=>{setPassword(e.target.value);setError('');}}
              onKeyDown={e=>e.key==='Enter'&&handleLogin()} placeholder="Your password"
              style={{width:'100%',padding:'10px 12px',border:`1px solid ${error?'var(--red)':'var(--border)'}`,borderRadius:6,fontSize:13,outline:'none',boxSizing:'border-box'}} />
          </div>
          {error && <div style={{background:'#FFEBEE',border:'1px solid #FFCDD2',borderRadius:6,padding:'8px 12px',fontSize:12,color:'var(--red)',marginBottom:16}}>{error}</div>}
          <button onClick={handleLogin} disabled={loading||!email.trim()||!password}
            style={{width:'100%',background:loading||!email.trim()||!password?'#90CAF9':'var(--primary)',color:'#fff',border:'none',borderRadius:6,padding:'11px',fontWeight:700,fontSize:13,cursor:'pointer'}}>
            {loading?'Signing in…':'Sign In'}
          </button>
          <div style={{fontSize:11,color:'var(--text-muted)',textAlign:'center',marginTop:16}}>Nirmaan Watertech Solutions · Mulund West, Mumbai</div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [currentUser, setCurrentUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true); // true while checking session
  const [active, setActiveState] = useState(() => sessionStorage.getItem('nw_active') || 'dashboard');
  function setActive(page) {
    sessionStorage.setItem('nw_active', page);
    setActiveState(page);
  }
  const today = new Date().toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' });

  // Listen for Firebase Auth state — persists across page reloads
  useEffect(() => {
    function startAuthListener() {
      const { auth, onAuthStateChanged, db, doc, getDoc, onSnapshot } = window.fb;
      const unsub = onAuthStateChanged(auth, async (firebaseUser) => {
        if (firebaseUser) {
          const uid = firebaseUser.uid;

          function buildProfile(data, fallbackName) {
            const name = data?.name || data?.Name || fallbackName || firebaseUser.email;
            const role = data?.role || data?.Role || 'owner';
            return {
              uid, name, email: firebaseUser.email,
              initials: data?.initials || name[0].toUpperCase(),
              role
            };
          }

          function applyProfile(profile) {
            window.currentUser = profile;
            setCurrentUser(profile);
            setAuthLoading(false);
            window.dispatchEvent(new CustomEvent('user-ready', { detail: { uid } }));
          }

          // Try path 1: doc(db, uid, uid) — collection named UID, doc named UID
          const userRef = doc(db, uid, uid);
          const profileUnsub = onSnapshot(userRef, (snap) => {
            if (snap.exists()) {
              applyProfile(buildProfile(snap.data()));
            } else {
              // Try path 2: doc(db, 'users', uid)
              getDoc(doc(db, 'users', uid)).then(snap2 => {
                if (snap2.exists()) {
                  applyProfile(buildProfile(snap2.data()));
                } else {
                  // No profile found — use email but default role to owner
                  applyProfile(buildProfile(null));
                }
              }).catch(() => applyProfile(buildProfile(null)));
            }
          }, () => applyProfile(buildProfile(null)));
          return profileUnsub;
        } else {
          // Not signed in
          window.currentUser = null;
          setCurrentUser(null);
          setAuthLoading(false);
        }
      });
      return unsub;
    }

    if (window.fb) {
      const unsub = startAuthListener();
      return () => unsub && unsub();
    } else {
      let unsub;
      const handler = () => { unsub = startAuthListener(); };
      window.addEventListener('firebase-ready', handler, { once: true });
      return () => { window.removeEventListener('firebase-ready', handler); if (unsub) unsub(); };
    }
  }, []);

  async function handleLogout() {
    try {
      const { auth, signOut } = window.fb;
      await signOut(auth);
      window.currentUser = null;
      setCurrentUser(null);
      setActive('dashboard');
    } catch(e) {
      console.error('Logout error:', e);
    }
  }

  // Show loading spinner while checking auth state
  if (authLoading) {
    return (
      <div style={{minHeight:'100vh',background:'var(--primary-dark)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
        <div style={{fontSize:36}}>💧</div>
        <div style={{color:'rgba(255,255,255,.7)',fontSize:13}}>Loading Nirmaan Watertech…</div>
      </div>
    );
  }

  // Show login screen if not authenticated
  if (!currentUser) {
    return <LoginScreen onLogin={(user) => { setCurrentUser(user); }} />;
  }

  return (
    <div className="app">
      {/* Sidebar */}
      <div className="sidebar">
        <div className="sidebar-header">
          <div className="sidebar-logo">💧 Nirman Watertech</div>
          <div className="sidebar-sub">Internal Workflow Platform</div>
        </div>
        {NAV.map((item, i) => {
          if (item.section) return <div className="sidebar-section" key={i}>{item.section}</div>;
          return (
            <div className={`nav-item ${active===item.id?'active':''}`} key={item.id} onClick={()=>setActive(item.id)}>
              <span className="icon">{item.icon}</span>
              <span>{item.label}</span>
              {item.badge && <span className="nav-badge">{item.badge}</span>}
            </div>
          );
        })}

        {/* User info at bottom of sidebar */}
        <div style={{marginTop:'auto',padding:'12px 10px',borderTop:'1px solid rgba(255,255,255,.10)'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 6px',borderRadius:8,cursor:'pointer'}} onClick={handleLogout} title="Click to sign out">
            <div style={{width:30,height:30,borderRadius:'50%',background:'rgba(255,255,255,.15)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>
              {currentUser.initials}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:'#fff',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                {currentUser.name.includes('@')
                  ? currentUser.name.split('@')[0].charAt(0).toUpperCase()+currentUser.name.split('@')[0].slice(1)
                  : currentUser.name.charAt(0).toUpperCase()+currentUser.name.slice(1)}
              </div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.5)',textTransform:'capitalize'}}>{currentUser.role.replace('_',' ')} · Sign out</div>
            </div>
          </div>
        </div>
      </div>

      {/* Main area */}
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{TITLES[active]||'Dashboard'}</div>
          <div className="topbar-right">
            <span style={{fontSize:11,color:'var(--text-muted)'}}>{today}</span>
            <button className="icon-btn" title="Notifications">🔔</button>
            <div className="avatar" title={`${currentUser.name} — ${currentUser.role}`} onClick={handleLogout} style={{cursor:'pointer',title:'Sign out'}}>
              {currentUser.initials}
            </div>
          </div>
        </div>
        <div className="content">
          <ErrorBoundary key={active}>
            <Module id={active} setActive={setActive} currentUser={currentUser} />
          </ErrorBoundary>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
