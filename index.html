const SETTINGS_COLLECTION = 'settings';
const SETTINGS_DOC = 'cashflow';

function useCashSettings() {
  const [settings, setSettings] = useState({ startingBalance: 1350000, criticalThreshold: 500000, warningThreshold: 800000 });
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    function start() {
      const { db, doc, onSnapshot } = window.fb;
      const unsub = onSnapshot(doc(db, SETTINGS_COLLECTION, SETTINGS_DOC), (snap) => {
        if (snap.exists()) setSettings(s => ({ ...s, ...snap.data() }));
        setLoading(false);
      }, () => setLoading(false));
      return unsub;
    }
    if (window.fb) {
      const unsub = start();
      return () => unsub && unsub();
    } else {
      let unsub;
      const handler = () => { unsub = start(); };
      window.addEventListener('firebase-ready', handler, { once: true });
      return () => { window.removeEventListener('firebase-ready', handler); if (unsub) unsub(); };
    }
  }, []);

  async function save(newSettings) {
    const { db, doc, setDoc } = window.fb;
    await setDoc(doc(db, SETTINGS_COLLECTION, SETTINGS_DOC), { ...settings, ...newSettings }, { merge: true });
  }

  return { settings, loading, save };
}

async function clearCashFlowData() {
  const { db, doc, setDoc } = window.fb;
  // Clear all unpaid bills (the forecast's source data) and reset the starting balance.
  await clearAllBills();
  await setDoc(doc(db, SETTINGS_COLLECTION, SETTINGS_DOC), { startingBalance: 0 }, { merge: true });
}

function CashFlow() {
  const [view, setView] = useState('all'); // 'all' | 'past' | 'future'
  const [typeFilter, setTypeFilter] = useState('all'); // 'all' | 'in' | 'out'
  const [projectFilter, setCFProjectFilter] = useState('all');
  const { items: bills,    loading: billsLoading    } = useBills();
  const { items: advances, loading: advLoading      } = useAdvances();
  const { items: receipts, loading: receiptsLoading } = useReceipts();
  const { items: capital,  loading: capitalLoading  } = useCapitalLoans();
  const { items: expenses, loading: expLoading      } = useExpenses();
  const { items: petty,    loading: pettyLoading    } = usePettyCash();
  const { settings, loading: settingsLoading } = useCashSettings();
  const [editingBalance, setEditingBalance] = useState(false);
  const [balanceInput, setBalanceInput] = useState('');

  const loading = billsLoading || settingsLoading || receiptsLoading || capitalLoading || advLoading || expLoading || pettyLoading;
  const todayStr = new Date().toISOString().slice(0,10);

  // ── Build all rows from every money movement ──
  const allRows = [
    // OUTFLOWS
    ...bills.flatMap(b => {
      // If bill has a payment schedule, use each stage as a separate outflow
      if (b.paymentSchedule && b.paymentSchedule.length > 0) {
        return b.paymentSchedule.map(stage => ({
          date: stage.date||b.due||'',
          label: `${b.payee} — ${stage.name||'Payment'}`,
          cat: b.category||'Bill', subcat: `${stage.pct||''}% of ${inr(b.amount||0)}`,
          type: 'out', amt: Number(stage.amount||0), project: b.project||'',
          ref: b.invoiceNo||'', isPast: (stage.date||b.due||'') < todayStr,
        }));
      }
      // No schedule — single outflow on due date
      return [{
        date: b.due||b.invoiceDate||'', label: b.payee,
        cat: b.category||'Bill', subcat: b.paid?'Paid':'Unpaid',
        type: 'out', amt: Number(b.amount||0), project: b.project||'',
        ref: b.invoiceNo||'', isPast: (b.due||'') < todayStr,
      }];
    }),
    ...advances.map(a => ({
      date: a.datePaid||'', label: `Advance — ${a.vendor}`,
      cat: 'Advance', subcat: a.status||'',
      type: 'out', amt: Number(a.amount||0), project: a.project||'',
      ref: a.refNumber||'', isPast: (a.datePaid||'') <= todayStr,
    })),
    ...expenses.map(e => ({
      date: e.date||'', label: e.description||(e.vendor||'General Expense'),
      cat: e.category||'General Expense', subcat: e.paymentMode||'',
      type: 'out', amt: Number(e.amount||0), project: e.project||'',
      ref: e.refNumber||'', isPast: (e.date||'') <= todayStr,
    })),
    ...petty.map(p => ({
      date: p.date||'', label: p.description||'Petty Cash',
      cat: `Petty — ${p.category||''}`, subcat: p.paidBy||'',
      type: 'out', amt: Number(p.amount||0), project: p.project||'',
      ref: '', isPast: (p.date||'') <= todayStr,
    })),
    // INFLOWS
    ...receipts.map(r => ({
      date: r.dateReceived||'', label: `${r.client||'Client'} — ${r.raBillNo||r.milestoneName||'Receipt'}`,
      cat: 'Client Receipt', subcat: r.paymentMode||'',
      type: 'in', amt: Number(r.amountReceived||0), project: r.project||'',
      ref: r.refNumber||'', isPast: (r.dateReceived||'') <= todayStr,
    })),
    ...capital.map(c => ({
      date: c.dateReceived||'', label: `${c.type} — ${c.source}`,
      cat: 'Capital Inflow', subcat: c.paymentMode||'',
      type: 'in', amt: Number(c.amount||0), project: c.project||'',
      ref: c.refNumber||'', isPast: (c.dateReceived||'') <= todayStr,
    })),
  ]
  .filter(r => r.date && r.amt > 0)
  .sort((a,b) => (a.date||'').localeCompare(b.date||''));

  // Apply filters
  const filtered = allRows.filter(r =>
    (view==='all' || (view==='past' && r.isPast) || (view==='future' && !r.isPast)) &&
    (typeFilter==='all' || r.type===typeFilter) &&
    (projectFilter==='all' || r.project===projectFilter)
  );

  // Build running balance
  let running = Number(settings.startingBalance) || 0;
  const rows = filtered.map(r => {
    if (r.type==='out') running -= r.amt;
    else running += r.amt;
    return { ...r, balance: running };
  });

  const totalIn  = filtered.filter(r=>r.type==='in').reduce((s,r)=>s+r.amt,0);
  const totalOut = filtered.filter(r=>r.type==='out').reduce((s,r)=>s+r.amt,0);
  const netFlow  = totalIn - totalOut;
  const forecastLow = rows.length ? Math.min(...rows.map(r=>r.balance)) : Number(settings.startingBalance)||0;
  const forecastEnd = rows.length ? rows[rows.length-1].balance : Number(settings.startingBalance)||0;
  const lowRow = rows.find(r=>r.balance===forecastLow);
  const criticalBreached = forecastLow < Number(settings.criticalThreshold||0);
  const warningBreached  = !criticalBreached && forecastLow < Number(settings.warningThreshold||0);

  // Category breakdown
  const outByCat = {};
  filtered.filter(r=>r.type==='out').forEach(r=>{ outByCat[r.cat]=(outByCat[r.cat]||0)+r.amt; });
  const inByCat = {};
  filtered.filter(r=>r.type==='in').forEach(r=>{ inByCat[r.cat]=(inByCat[r.cat]||0)+r.amt; });

  async function saveBalance() {
    const { db, doc, setDoc } = window.fb;
    try {
      await setDoc(doc(db, SETTINGS_COLLECTION, SETTINGS_DOC), { ...settings, startingBalance: Number(balanceInput)||0 }, { merge:true });
      setEditingBalance(false);
    } catch(e) { console.error(e); alert('Could not save balance.'); }
  }

  const TYPE_BADGE = { 'Bill':'red', 'Advance':'amber', 'General Expense':'red', 'Client Receipt':'green', 'Capital Inflow':'blue' };

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Cash Flow</div>
          <div className="section-sub">{loading?'Loading…':`${allRows.length} transactions — Bills · Advances · Expenses · Petty Cash · Receipts · Capital`}</div>
        </div>
      </div>

      {!loading && criticalBreached && (
        <div className="alert-bar critical" style={{marginBottom:14}}>
          <span className="alert-icon">🚨</span>
          <strong>Critical:</strong>&nbsp;Balance drops to {inr(forecastLow)} {lowRow?`on ${fmt(lowRow.date)}`:''} — below ₹{Number(settings.criticalThreshold||0).toLocaleString('en-IN')} threshold.
        </div>
      )}
      {!loading && warningBreached && (
        <div className="alert-bar warning" style={{marginBottom:14}}>
          <span className="alert-icon">⚠️</span>
          <strong>Warning:</strong>&nbsp;Balance drops to {inr(forecastLow)} {lowRow?`on ${fmt(lowRow.date)}`:''}.
        </div>
      )}

      {/* Stats */}
      <div className="stats-grid" style={{gridTemplateColumns:'repeat(6,1fr)',marginBottom:14}}>
        <div className="stat-card">
          <div className="stat-label">Opening Balance</div>
          {editingBalance ? (
            <div style={{display:'flex',gap:4,marginTop:4}}>
              <input className="form-input font-mono" style={{width:90,fontSize:12}} value={balanceInput}
                onChange={e=>setBalanceInput(e.target.value)} autoFocus onKeyDown={e=>e.key==='Enter'&&saveBalance()} />
              <button className="btn btn-sm btn-primary" onClick={saveBalance}>✓</button>
              <button className="btn btn-sm btn-ghost" onClick={()=>setEditingBalance(false)}>✕</button>
            </div>
          ) : (
            <>
              <div className="stat-value green">{inr(settings.startingBalance||0)}</div>
              <div className="stat-sub" style={{cursor:'pointer',color:'var(--primary)'}}
                onClick={()=>{setBalanceInput(String(settings.startingBalance||0));setEditingBalance(true);}}>Edit</div>
            </>
          )}
        </div>
        <div className="stat-card"><div className="stat-label">Total Inflows</div><div className="stat-value green">{inr(totalIn)}</div><div className="stat-sub">{filtered.filter(r=>r.type==='in').length} entries</div></div>
        <div className="stat-card"><div className="stat-label">Total Outflows</div><div className="stat-value red">{inr(totalOut)}</div><div className="stat-sub">{filtered.filter(r=>r.type==='out').length} entries</div></div>
        <div className="stat-card"><div className="stat-label">Net Flow</div><div className={`stat-value ${netFlow>=0?'green':'red'}`}>{inr(Math.abs(netFlow))}{netFlow<0?' ↓':' ↑'}</div></div>
        <div className="stat-card"><div className="stat-label">Balance Low</div><div className={`stat-value ${criticalBreached?'red':warningBreached?'amber':'blue'}`}>{inr(forecastLow)}</div>{lowRow&&<div className="stat-sub">{fmt(lowRow.date)}</div>}</div>
        <div className="stat-card"><div className="stat-label">Closing Balance</div><div className={`stat-value ${forecastEnd>=0?'green':'red'}`}>{inr(forecastEnd)}</div></div>
      </div>

      {/* Breakdown summary */}
      {!loading && rows.length > 0 && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
          <div className="card">
            <div className="card-header"><span className="card-title">Outflows by Category</span></div>
            <div className="card-body">
              {Object.entries(outByCat).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>(
                <div key={cat} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <span style={{fontSize:12,color:'var(--text-secondary)'}}>{cat}</span>

const BILLS_COLLECTION = 'bills';
const ADVANCES_COLLECTION = 'advances';
const PAYMENT_MODES = ['NEFT','RTGS','Cheque','Cash','UPI','Other'];

// ─── Bills hooks and helpers ───────────────────────
function useBills() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(userCol(BILLS_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, (snap) => {
        setItems(snap.docs.map(d => ({ docId: d.id, ...d.data() })));
        setLoading(false);
      }, (err) => { console.error('Bills listener error', err); setLoading(false); });
      return unsub;
    }
    if (window.fb && getUserUID()) { const unsub = start(); return () => unsub && unsub(); }
    let unsub;
    const handler = () => { if(getUserUID()) { unsub = start(); } };
    const userHandler = () => { if(unsub) unsub(); if(window.fb) unsub = start(); };
    window.addEventListener('firebase-ready', handler, { once: true });
    window.addEventListener('user-ready', userHandler, { once: true });
    return () => {
      window.removeEventListener('firebase-ready', handler);
      window.removeEventListener('user-ready', userHandler);
      if (unsub) unsub();
    };
  }, []);
  return { items, loading };
}
async function addBill(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(userCol(BILLS_COLLECTION), { ...data, createdAt: Date.now(), paid: false });
}
async function markBillPaid(docId) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(userDoc(BILLS_COLLECTION, docId), { paid: true, paidAt: Date.now() });
}
async function deleteBill(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(userDoc(BILLS_COLLECTION, docId));
}
async function clearAllBills() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(userCol(BILLS_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

            <label className="form-label">Link to Purchase Order</label>
            <select className="form-input form-select" value={linkedPO} onChange={e=>setLinkedPO(e.target.value)}>
              <option value="">None</option>
              {(pos||[]).map(p=><option key={p.docId} value={p.po}>{p.po} — {p.vendorName} ({inr(p.value||0)})</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Link to Bill</label>
            <select className="form-input form-select" value={linkedBill} onChange={e=>setLinkedBill(e.target.value)}>
              <option value="">None</option>
              {(bills||[]).map(b=><option key={b.docId} value={b.docId}>{b.payee} — {inr(b.amount||0)}{b.paid?' (Paid)':''}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Amount Adjusted Against This PO/Bill (₹)</label>
            <input className="form-input font-mono" value={adjustedAmount} onChange={e=>setAdjustedAmount(e.target.value)} placeholder="0" />
            {adjustedAmount && (
              <div style={{fontSize:11.5,marginTop:5,color: balance < 0 ? 'var(--red)' : 'var(--green)'}}>
                Balance after adjustment: {inr(Math.max(0,balance))}
                {balance < 0 && ' ⚠ Exceeds advance amount'}
              </div>
            )}
          </div>
        </div>
        <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={handleSave} disabled={saving} className="btn btn-primary" style={{opacity:saving?0.6:1}}>
            {saving?'Saving…':'Save Link'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Bill Payments Module ──────────────────────────
function BillPayments() {
  const { items, loading } = useBills();
  const { items: advances, loading: advLoading } = useAdvances();
  const { items: pos } = usePurchaseOrders();
  const { items: wos } = useWorkOrders();
  const [catFilter, setCatFilter] = useState('all');
  const [statusFilter, setStatusFilter] = useState('all');
  const [projectFilter, setBillProjectFilter] = useState('all');
  const [vendorFilter, setBillVendorFilter] = useState('all');
  const [monthFilter, setBillMonthFilter] = useState('all');
  const [sortBy, setSortBy] = useState('date_desc');
  const [tab, setTab] = useState('bills'); // 'bills' | 'advances'
  const [showNewBill, setShowNewBill] = useState(false);
  const [showNewAdvance, setShowNewAdvance] = useState(false);
  const [linkingAdvance, setLinkingAdvance] = useState(null);
  const [editBill, setEditBill] = useState(null);
  const [editAdvance, setEditAdvance] = useState(null);
  const [viewBillSchedule, setViewBillSchedule] = useState(null);

  const todayStr = new Date().toISOString().slice(0,10);

  // Bills with computed status
  const withStatus = items.map(b => {
    let status;
    if (b.paid) status = 'Paid';
    else if (b.due === todayStr) status = 'Due Today';
    else if (b.due < todayStr) status = 'Overdue';
    else status = 'Upcoming';
    const days = (status === 'Overdue' && b.due) ? Math.floor((new Date(todayStr) - new Date(b.due)) / 86400000) : 0;
    const linkedAdv = advances.filter(a => a.linkedBill === b.docId);
    const advanceDeducted = linkedAdv.reduce((s,a) => s + Number(a.adjustedAmount||0), 0);
    const netPayable = Math.max(0, Number(b.amount||0) - advanceDeducted);
    return { ...b, computedStatus: status, days, advanceDeducted, netPayable };
  });

  function applySort(arr, key, dateField='due', amtField='amount', nameField='payee') {
    const sorted = [...arr];
    switch(key) {
      case 'date_desc':   return sorted.sort((a,b)=>(b[dateField]||b.createdAt||0)>=(a[dateField]||a.createdAt||0)?1:-1);
      case 'date_asc':    return sorted.sort((a,b)=>(a[dateField]||a.createdAt||0)>=(b[dateField]||b.createdAt||0)?1:-1);
      case 'amount_desc': return sorted.sort((a,b)=>Number(b[amtField]||0)-Number(a[amtField]||0));
      case 'amount_asc':  return sorted.sort((a,b)=>Number(a[amtField]||0)-Number(b[amtField]||0));
      case 'payee_asc':   return sorted.sort((a,b)=>(a[nameField]||'').localeCompare(b[nameField]||''));
      case 'vendor_asc':  return sorted.sort((a,b)=>(a.vendorName||a.vendor||a.source||'').localeCompare(b.vendorName||b.vendor||b.source||''));
      case 'status':      return sorted.sort((a,b)=>{
        const order = {Overdue:0,'Due Today':1,Upcoming:2,Paid:3,Unadjusted:0,'Partially Adjusted':1,'Fully Adjusted':2};
        return (order[a.computedStatus||a.status]??4)-(order[b.computedStatus||b.status]??4);
      });
      default: return sorted;
    }
  }

  const billMonths = [...new Set(items.map(b=>b.due?.slice(0,7)).filter(Boolean))].sort().reverse();
  const billVendors = [...new Set(items.map(b=>b.payee).filter(Boolean))].sort();
  const filtered = applySort(
    withStatus.filter(b =>
      (catFilter === 'all' || b.category === catFilter) &&
      (statusFilter === 'all' || b.computedStatus === statusFilter) &&
      (projectFilter === 'all' || b.project === projectFilter) &&
      (vendorFilter === 'all' || b.payee === vendorFilter) &&
      (monthFilter === 'all' || (b.due||'').startsWith(monthFilter))
    ), sortBy
  );

  // Stats
  const overdueTotal = withStatus.filter(b=>b.computedStatus==='Overdue').reduce((s,b)=>s+b.netPayable,0);
  const overdueCount = withStatus.filter(b=>b.computedStatus==='Overdue').length;
  const dueTodayTotal = withStatus.filter(b=>b.computedStatus==='Due Today').reduce((s,b)=>s+b.netPayable,0);
  const next7 = new Date(Date.now()+7*86400000).toISOString().slice(0,10);
  const dueWeekTotal = withStatus.filter(b=>!b.paid&&b.due>=todayStr&&b.due<=next7).reduce((s,b)=>s+b.netPayable,0);
  const paidTotal = withStatus.filter(b=>b.paid).reduce((s,b)=>s+Number(b.amount||0),0);

  // Advance stats
  const totalAdvances = advances.reduce((s,a)=>s+Number(a.amount||0),0);
  const unadjustedAdvances = advances.filter(a=>a.status!=='Fully Adjusted').reduce((s,a)=>s+Number(a.balanceAmount||0),0);

  // PO label lookup
  function poLabel(poNo) {
    const p = pos.find(p=>p.po===poNo);
    return p ? `${p.po} — ${p.vendorName}` : poNo;
  }

  const [advVendorFilter, setAdvVendorFilter] = useState('all');
  const [advStatusFilter, setAdvStatusFilter] = useState('all');
  const [advProjectFilter, setAdvProjectFilter] = useState('all');
  const [advMonthFilter, setAdvMonthFilter] = useState('all');
  const advVendors = [...new Set(advances.map(a=>a.vendor).filter(Boolean))].sort();
  const advMonths = [...new Set(advances.map(a=>a.datePaid?.slice(0,7)).filter(Boolean))].sort().reverse();
  const filteredAdvances = advances.filter(a=>
    (advVendorFilter==='all'||a.vendor===advVendorFilter) &&
    (advStatusFilter==='all'||a.status===advStatusFilter) &&
    (advProjectFilter==='all'||a.project===advProjectFilter) &&
    (advMonthFilter==='all'||(a.datePaid||'').startsWith(advMonthFilter))
  );
  const ADV_STATUS_COLOR = { 'Unadjusted':'red', 'Partially Adjusted':'amber', 'Fully Adjusted':'green' };

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Bill Payments</div>
          <div className="section-sub">
            {tab==='bills'
              ? (loading?'Loading…':`${items.length} bill${items.length===1?'':'s'} · live data`)
              : (advLoading?'Loading…':`${advances.length} advance${advances.length===1?'':'s'} · ${inr(unadjustedAdvances)} unadjusted`)}
          </div>
        </div>
        <div className="flex gap-2">
          {tab==='bills'
            ? <button className="btn btn-primary" onClick={()=>setShowNewBill(true)}>+ Add Bill</button>
            : <button className="btn btn-primary" style={{background:'var(--secondary)'}} onClick={()=>setShowNewAdvance(true)}>+ Record Advance</button>}
          {tab==='bills'
            ? <ClearCollectionButton label="Clear Bills" count={items.length} onClear={clearAllBills} />
            : <ClearCollectionButton label="Clear Advances" count={advances.length} onClear={clearAllAdvances} />}
        </div>
      </div>

      {/* Tabs */}
      <div className="tabs">
        <div className={`tab ${tab==='bills'?'active':''}`} onClick={()=>setTab('bills')}>📑 Bills & Invoices</div>
        <div className={`tab ${tab==='advances'?'active':''}`} onClick={()=>setTab('advances')}>
          💰 Advance Payments
          {unadjustedAdvances > 0 && <span className="nav-badge" style={{background:'var(--amber)',marginLeft:8}}>{advances.filter(a=>a.status!=='Fully Adjusted').length}</span>}
        </div>
      </div>

      {/* ── BILLS TAB ── */}
      {tab==='bills' && (
        <>
          <div className="stats-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
            <div className="stat-card"><div className="stat-label">Overdue (Net)</div><div className="stat-value red">{inr(overdueTotal)}</div><div className="stat-sub">{overdueCount} bill{overdueCount===1?'':'s'}</div></div>
            <div className="stat-card"><div className="stat-label">Due Today (Net)</div><div className="stat-value amber">{inr(dueTodayTotal)}</div></div>
            <div className="stat-card"><div className="stat-label">Due This Week (Net)</div><div className="stat-value blue">{inr(dueWeekTotal)}</div></div>
            <div className="stat-card"><div className="stat-label">Paid Total</div><div className="stat-value green">{inr(paidTotal)}</div></div>
          </div>
          <div className="card">
            <div className="card-body" style={{paddingTop:10,paddingBottom:10}}>
              <div className="flex gap-2" style={{flexWrap:'wrap'}}>
                <select className="form-input form-select" style={{width:150}} onChange={e=>setCatFilter(e.target.value)}>
                  <option value="all">All Categories</option>
                  {(window.appLists?.billCategories||DEFAULT_LISTS.billCategories).map(c=><option key={c}>{c}</option>)}
                </select>
                <select className="form-input form-select" style={{width:140}} onChange={e=>setStatusFilter(e.target.value)}>
                  <option value="all">All Status</option>
                  <option>Overdue</option><option>Due Today</option><option>Upcoming</option><option>Paid</option>
                </select>
                <select className="form-input form-select" style={{width:130}} value={projectFilter} onChange={e=>setBillProjectFilter(e.target.value)}>
                  <option value="all">All Projects</option>
                  {PROJECTS.map(p=><option key={p}>{p}</option>)}
                </select>
                <select className="form-input form-select" style={{width:150}} value={vendorFilter} onChange={e=>setBillVendorFilter(e.target.value)}>
                  <option value="all">All Vendors</option>
                  {billVendors.map(v=><option key={v}>{v}</option>)}
                </select>
                <select className="form-input form-select" style={{width:140}} value={monthFilter} onChange={e=>setBillMonthFilter(e.target.value)}>
                  <option value="all">All Months</option>
                  {billMonths.map(m=><option key={m} value={m}>{new Date(m+'-01').toLocaleString('en-IN',{month:'long',year:'numeric'})}</option>)}
                </select>
                <select className="form-input form-select" style={{width:180}} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
                  <option value="date_desc">↓ Due Date (Newest)</option>
                  <option value="date_asc">↑ Due Date (Oldest)</option>
                  <option value="amount_desc">↓ Amount (Highest)</option>
                  <option value="amount_asc">↑ Amount (Lowest)</option>
                  <option value="payee_asc">A→Z Payee</option>
                  <option value="status">By Status (Urgent first)</option>
                </select>
              </div>
            </div>
            {loading ? (
              <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
            ) : filtered.length===0 ? (
              <div className="module-coming"><div className="big-icon">📑</div><h3>No bills yet</h3><p className="text-muted">Add your first bill.</p></div>
            ) : (
              <table>
                <thead>
                  <tr><th>Payee</th><th>Project</th><th>Category</th><th>Invoice #</th><th>Due Date</th><th>Bill Amount</th><th>Advance Deducted</th><th>Net Payable</th><th>Linked To</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                  {filtered.map(b => (
                    <tr key={b.docId} className={b.computedStatus==='Overdue'?'overdue':b.computedStatus==='Due Today'?'due-today':''}>
                      <td className="fw-600">{b.payee}</td>
                      <td>{b.project?<span className={`badge ${PROJECT_COLOR[b.project]||'grey'}`}>{b.project}</span>:<span className="text-muted">—</span>}</td>
                      <td><span className="badge grey">{b.category}</span></td>
                      <td className="mono">{b.invoiceNo||'—'}</td>
                      <td>{fmt(b.due)}{b.days>0&&<span style={{color:'var(--red)',fontWeight:600,marginLeft:4}}>+{b.days}d</span>}</td>
                      <td className="amount">{inr(b.amount||0)}</td>
                      <td className="amount" style={{color:'var(--green)'}}>
                        {b.advanceDeducted > 0 ? <>− {inr(b.advanceDeducted)}</> : <span className="text-muted">—</span>}
                      </td>
                      <td className="amount fw-600" style={{color: b.advanceDeducted > 0 ? 'var(--primary)' : 'var(--text)'}}>
                        {inr(b.netPayable)}
                      </td>
                      <td><XRefBadge po={b.linkedPO} wo={b.linkedWO} /></td>
                      <td><span className={`badge ${BILL_STATUS_COLOR[b.computedStatus]}`}>{b.computedStatus}</span></td>
                      <td>
                        <div className="flex gap-2">
                          <button className="btn btn-sm btn-ghost" onClick={()=>setEditBill(b)}>Edit</button>
                          {b.paymentSchedule&&b.paymentSchedule.length>0&&<button className="btn btn-sm btn-outline" onClick={()=>setViewBillSchedule(b)}>Schedule</button>}
                          {!b.paid && <button className="btn btn-sm btn-primary" onClick={()=>markBillPaid(b.docId)}>Mark Paid</button>}
                          <button className="btn btn-sm btn-ghost" onClick={()=>{if(confirm('Delete?'))deleteBill(b.docId);}}>Delete</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </>
      )}

      {/* ── ADVANCES TAB ── */}
      {tab==='advances' && (
        <>
          <div className="stats-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
            <div className="stat-card"><div className="stat-label">Total Advances Paid</div><div className="stat-value red">{inr(totalAdvances)}</div></div>
            <div className="stat-card"><div className="stat-label">Unadjusted Balance</div><div className="stat-value amber">{inr(unadjustedAdvances)}</div><div className="stat-sub">{advances.filter(a=>a.status!=='Fully Adjusted').length} pending</div></div>
            <div className="stat-card"><div className="stat-label">Fully Adjusted</div><div className="stat-value green">{advances.filter(a=>a.status==='Fully Adjusted').length}</div></div>
          </div>
          <div className="card">
            <div className="card-body" style={{paddingTop:10,paddingBottom:10}}>
              <div className="flex gap-2" style={{flexWrap:'wrap'}}>
                <select className="form-input form-select" style={{width:150}} value={advVendorFilter} onChange={e=>setAdvVendorFilter(e.target.value)}>
                  <option value="all">All Vendors</option>
                  {advVendors.map(v=><option key={v}>{v}</option>)}
                </select>
                <select className="form-input form-select" style={{width:150}} value={advStatusFilter} onChange={e=>setAdvStatusFilter(e.target.value)}>
                  <option value="all">All Statuses</option>
                  <option>Unadjusted</option><option>Partially Adjusted</option><option>Fully Adjusted</option>
                </select>
                <select className="form-input form-select" style={{width:130}} value={advProjectFilter} onChange={e=>setAdvProjectFilter(e.target.value)}>
                  <option value="all">All Projects</option>
                  {PROJECTS.map(p=><option key={p}>{p}</option>)}
                </select>
                <select className="form-input form-select" style={{width:140}} value={advMonthFilter} onChange={e=>setAdvMonthFilter(e.target.value)}>
                  <option value="all">All Months</option>
                  {advMonths.map(m=><option key={m} value={m}>{new Date(m+'-01').toLocaleString('en-IN',{month:'long',year:'numeric'})}</option>)}
                </select>
                <select className="form-input form-select" style={{width:180}} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
                  <option value="date_desc">↓ Date Paid (Newest)</option>
                  <option value="date_asc">↑ Date Paid (Oldest)</option>
                  <option value="amount_desc">↓ Amount (Highest)</option>
                  <option value="amount_asc">↑ Amount (Lowest)</option>
                  <option value="payee_asc">A→Z Vendor</option>
                  <option value="status">By Status</option>
                </select>
              </div>
            </div>
            {advLoading ? (
              <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Loading…</p></div>
            ) : advances.length===0 ? (
              <div className="module-coming">
                <div className="big-icon">💰</div>
                <h3>No advance payments yet</h3>
                <p className="text-muted">Record an advance payment to a vendor before a PO or bill is raised.</p>
              </div>
            ) : (
              <table>
                <thead>
                  <tr><th>Vendor</th><th>Project</th><th>Date Paid</th><th>Mode</th><th>Ref #</th><th>Amount</th><th>Adjusted</th><th>Balance</th><th>Linked To</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                  {applySort(filteredAdvances, sortBy, 'datePaid').map(a => (
                    <tr key={a.docId} style={{background: a.status==='Unadjusted' ? 'var(--amber-50)' : a.status==='Fully Adjusted' ? 'var(--green-50)' : ''}}>
                      <td className="fw-600">{a.vendor}</td>
                      <td>{a.project?<span className={`badge ${PROJECT_COLOR[a.project]||'grey'}`}>{a.project}</span>:<span className="text-muted">—</span>}</td>
                      <td>{fmt(a.datePaid)}</td>
                      <td><span className="badge grey">{a.paymentMode}</span></td>
                      <td className="mono" style={{fontSize:11}}>{a.refNumber||'—'}</td>
                      <td className="amount fw-600">{inr(a.amount||0)}</td>
                      <td className="amount" style={{color:'var(--green)'}}>{inr(a.adjustedAmount||0)}</td>
                      <td className="amount fw-600" style={{color: Number(a.balanceAmount||0)>0?'var(--amber)':'var(--green)'}}>{inr(a.balanceAmount||0)}</td>
                      <td style={{fontSize:11.5}}>
                        {a.linkedPO && <div className="mono">{a.linkedPO}</div>}
                        {a.linkedBill && <div style={{color:'var(--text-muted)'}}>Bill linked</div>}
                        {!a.linkedPO && !a.linkedBill && <span className="text-muted">Not linked yet</span>}
                      </td>
                      <td><span className={`badge ${ADV_STATUS_COLOR[a.status]||'grey'}`}>{a.status}</span></td>
                      <td>
                        <div className="flex gap-2">
                          <button className="btn btn-sm btn-ghost" onClick={()=>setEditAdvance(a)}>Edit</button>
                          {a.status !== 'Fully Adjusted' && (
                            <button className="btn btn-sm btn-ghost" onClick={()=>setLinkingAdvance(a)}>Link / Adjust</button>
                          )}
                          <button className="btn btn-sm btn-ghost" onClick={()=>{if(confirm('Delete?'))deleteAdvance(a.docId);}}>Delete</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </>
      )}

      {showNewBill && <NewBillModal onClose={()=>setShowNewBill(false)} />}
      {editBill && <NewBillModal onClose={()=>setEditBill(null)} existing={editBill} />}
      {showNewAdvance && <NewAdvanceModal onClose={()=>setShowNewAdvance(false)} pos={pos} wos={wos} bills={items} />}
      {editAdvance && <NewAdvanceModal onClose={()=>setEditAdvance(null)} pos={pos} wos={wos} bills={items} existing={editAdvance} />}
      {viewBillSchedule && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{background:'var(--surface)',borderRadius:10,width:500,maxHeight:'80vh',overflowY:'auto',boxShadow:'0 8px 40px rgba(0,0,0,.22)'}} onClick={e=>e.stopPropagation()}>
            <div style={{background:'var(--primary)',padding:'14px 18px',position:'sticky',top:0}}>
              <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>Payment Schedule — {viewBillSchedule.payee}</span>
            </div>
            <div style={{padding:'16px 20px'}}>
              <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:12}}>Total: {inr(viewBillSchedule.amount||0)}</div>
              <table style={{width:'100%'}}>
                <thead><tr style={{background:'var(--grey-50)'}}>
                  <th style={{padding:'6px 10px',fontSize:11,textAlign:'left',color:'var(--text-muted)'}}>Stage</th>
                  <th style={{padding:'6px 10px',fontSize:11,textAlign:'left',color:'var(--text-muted)'}}>%</th>
                  <th style={{padding:'6px 10px',fontSize:11,textAlign:'left',color:'var(--text-muted)'}}>Amount</th>
                  <th style={{padding:'6px 10px',fontSize:11,textAlign:'left',color:'var(--text-muted)'}}>Due Date</th>
                </tr></thead>
                <tbody>
                  {(viewBillSchedule.paymentSchedule||[]).map((s,i)=>(
                    <tr key={i} style={{borderTop:'1px solid var(--grey-50)'}}>
                      <td style={{padding:'8px 10px',fontSize:12.5,fontWeight:600}}>{s.name||`Stage ${i+1}`}</td>
                      <td style={{padding:'8px 10px',fontSize:12}}>{s.pct||'—'}%</td>
                      <td style={{padding:'8px 10px',fontSize:12,fontWeight:600,color:'var(--red)'}}>{inr(s.amount||0)}</td>
                      <td style={{padding:'8px 10px',fontSize:12}}>{fmt(s.date)||'—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{padding:'0 20px 16px',display:'flex',justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setViewBillSchedule(null)}>Close</button>
            </div>
          </div>
        </div>
      )}
      {linkingAdvance && <LinkAdvanceModal advance={linkingAdvance} onClose={()=>setLinkingAdvance(null)} pos={pos} bills={items} />}
    </div>
  );
}

// ════════════════════════════════════════════════════
// RECEIPTS — client inflows against billing schedule
// ════════════════════════════════════════════════════
// ════════════════════════════════════════════════════
// RECEIPTS — three-layer client billing system
// Billing Schedule → RA Bills → Receipts
// ════════════════════════════════════════════════════
const BILLING_COLLECTION  = 'billing_schedules';
const RABILLS_COLLECTION  = 'ra_bills';
const RECEIPTS_COLLECTION = 'receipts';

// ─── Firestore hooks ───────────────────────────────
function useBillingSchedules() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const unsub = onSnapshot(
        query(userCol(BILLING_COLLECTION), orderBy('createdAt','desc')),
        snap => { setItems(snap.docs.map(d=>({docId:d.id,...d.data()}))); setLoading(false); },
        err  => { console.error('Billing listener',err); setLoading(false); }
      );
      return unsub;
    }

async function addBillingSchedule(data) {

}
async function addRABill(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(userCol(RABILLS_COLLECTION), {...data, createdAt:Date.now()});
}
async function updateRABill(docId, data) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(userDoc(RABILLS_COLLECTION, docId), data);
}
async function deleteRABill(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(userDoc(RABILLS_COLLECTION, docId));
}
async function addReceipt(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(userCol(RECEIPTS_COLLECTION), {...data, createdAt:Date.now()});
}
async function deleteReceipt(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(userDoc(RECEIPTS_COLLECTION, docId));
}
async function clearAllReceipts() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const [s1,s2,s3] = await Promise.all([
    getDocs(userCol(BILLING_COLLECTION)),
    getDocs(userCol(RABILLS_COLLECTION)),
    getDocs(userCol(RECEIPTS_COLLECTION)),
  ]);
  const batch = writeBatch(db);
  [...s1.docs,...s2.docs,...s3.docs].forEach(d=>batch.delete(d.ref));
  await batch.commit();
}

function nextRABillNumber(existing) {
  return `RA/${FY}/${String(existing+1).padStart(3,'0')}`;
}

// MODAL 1 — New Billing Schedule
// ════════════════════════════════════════════════════
function NewBillingScheduleModal({ onClose }) {
  const [form, setForm] = useState({ client:'', projectRef:'', contractValue:'', project:'' });
  const [milestones, setMilestones] = useState([
    { id:genRowId(), name:'Advance',    pct:'', amount:'', expectedDate:'' },
    { id:genRowId(), name:'RA Bill 1',  pct:'', amount:'', expectedDate:'' },
    { id:genRowId(), name:'Final Bill', pct:'', amount:'', expectedDate:'' },
  ]);
  const [saving, setSaving] = useState(false);
  function set(f,v){setForm(s=>({...s,[f]:v}));}

  function addMilestone(){setMilestones(m=>[...m,{id:genRowId(),name:'',pct:'',amount:'',expectedDate:''}]);}
  function removeMilestone(id){setMilestones(m=>m.filter(r=>r.id!==id));}
  function updateMilestone(id,field,value){
    setMilestones(m=>m.map(r=>{
      if(r.id!==id) return r;
      const next={...r,[field]:value};
      if(field==='pct'&&form.contractValue){
        const pct=parseFloat(value);
        if(!isNaN(pct)) next.amount=String(Math.round((pct/100)*Number(form.contractValue)));
      }
      return next;
    }));
  }

  const pctTotal = milestones.reduce((s,m)=>s+(parseFloat(m.pct)||0),0);
  const amtTotal = milestones.reduce((s,m)=>s+(Number(m.amount)||0),0);

  async function handleSave(){
    if(!form.client.trim()) return;
    setSaving(true);
    try {
      await addBillingSchedule({
        ...form,
        contractValue: Number(form.contractValue)||0,
        milestones: milestones.filter(m=>m.name.trim()),
      });
      onClose();
    } catch(e){ console.error(e); alert('Could not save.'); }
    finally{ setSaving(false); }

          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Client Name</label>
              <AutocompleteInput value={form.client} onChange={v=>set('client',v)} suggestions={knownNames.clients} placeholder="e.g. Green Valley CHS" />
            </div>
            <div className="form-group">
              <label className="form-label">Project / Site Reference</label>
              <input className="form-input" value={form.projectRef} onChange={e=>set('projectRef',e.target.value)} placeholder="e.g. WTP installation, Thane" />
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Contract Value (₹)</label>
            <input className="form-input font-mono" value={form.contractValue}
              onChange={e=>{set('contractValue',e.target.value);}}
              placeholder="Total contract amount — entering this auto-calculates milestone amounts from %" />
          </div>

          <div style={{borderTop:'1px solid var(--border)',paddingTop:14,marginTop:4}}>
            <label className="form-label" style={{marginBottom:8,display:'block'}}>Billing Milestones</label>
            <div style={{border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',marginBottom:8}}>
              <table style={{width:'100%'}}>
                <thead>
                  <tr style={{background:'var(--grey-50)'}}>
                    <th style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)'}}>Milestone Name</th>
                    <th style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)',width:60}}>%</th>
                    <th style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)',width:120}}>Amount (₹)</th>
                    <th style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)',width:140}}>Expected Date</th>
                    <th style={{width:30}}></th>

                    <tr key={m.id} style={{borderTop:'1px solid var(--grey-50)'}}>

  );

// MODAL 2 — Submit RA Bill

function SubmitRABillModal({ onClose, schedules, existingCount }) {
  const [form, setForm] = useState({
    raBillNo: nextRABillNumber(existingCount),
    scheduleId: '', client:'', projectRef:'', milestoneIndex: '',
    amountClaimed: '', dateSubmitted: new Date().toISOString().slice(0,10),
    notes: ''
  });
  const [saving, setSaving] = useState(false);
  function set(f,v){setForm(s=>({...s,[f]:v}));}

  const selectedSchedule = schedules.find(s=>s.docId===form.scheduleId);
  const selectedMilestone = selectedSchedule && form.milestoneIndex!==''
    ? selectedSchedule.milestones[Number(form.milestoneIndex)]
    : null;

  function handleScheduleSelect(docId){
    const sc = schedules.find(s=>s.docId===docId);
    set('scheduleId',docId);
    set('client',sc?sc.client:'');
    set('projectRef',sc?sc.projectRef:'');
    set('milestoneIndex','');
    set('amountClaimed','');
  }
  function handleMilestoneSelect(idx){
    set('milestoneIndex',idx);
    const sc = schedules.find(s=>s.docId===form.scheduleId);
    if(sc&&sc.milestones[idx]) set('amountClaimed',String(sc.milestones[idx].amount||''));
  }

  async function handleSave(){
    if(!form.scheduleId||!form.amountClaimed||!form.dateSubmitted) return;
    setSaving(true);
    try {
      await addRABill({
        ...form,
        amountClaimed: Number(form.amountClaimed),
        amountReceived: 0,
        balancePending: Number(form.amountClaimed),
        status: 'Submitted',
        milestoneName: selectedMilestone?.name||'',
        project: selectedSchedule?.project||'',
      });
      onClose();
    } catch(e){ console.error(e); alert('Could not submit RA Bill.'); }
    finally{ setSaving(false); }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'var(--surface)',borderRadius:10,width:540,maxHeight:'90vh',overflowY:'auto',boxShadow:'0 8px 40px rgba(0,0,0,.22)'}} onClick={e=>e.stopPropagation()}>

          <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>📄 Submit Running Bill</span>
        </div>
        <div style={{padding:'18px 20px'}}>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">RA Bill Number</label>
              <input className="form-input font-mono" value={form.raBillNo} onChange={e=>set('raBillNo',e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Date Submitted</label>
              <input className="form-input" type="date" value={form.dateSubmitted} onChange={e=>set('dateSubmitted',e.target.value)} />
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Client / Project</label>
            <select className="form-input form-select" value={form.scheduleId} onChange={e=>handleScheduleSelect(e.target.value)}>
              <option value="">Select billing schedule…</option>
              {schedules.map(sc=>(
                <option key={sc.docId} value={sc.docId}>{sc.client} — {sc.projectRef||'No ref'}</option>
              ))}
            </select>
          </div>

          {selectedSchedule && (
            <div className="form-group">
              <label className="form-label">Against Billing Schedule Milestone</label>
              <select className="form-input form-select" value={form.milestoneIndex} onChange={e=>handleMilestoneSelect(e.target.value)}>
                <option value="">Select milestone this bill applies to…</option>
                {(selectedSchedule.milestones||[]).map((m,i)=>(
                  <option key={i} value={i}>{m.name} — {inr(m.amount||0)}{m.pct?` (${m.pct}%)`:''}</option>
                ))}

            </div>

            <div style={{background:'var(--primary-50)',borderRadius:6,padding:'8px 12px',fontSize:12,marginBottom:14}}>
              <div className="flex justify-between">
                <span>Milestone: <strong>{selectedMilestone.name}</strong></span>
                <span className="amount fw-600">{inr(selectedMilestone.amount||0)}</span>
              </div>
              {selectedMilestone.expectedDate && (
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Expected date: {selectedMilestone.expectedDate}</div>

            <input className="form-input font-mono" value={form.amountClaimed} onChange={e=>set('amountClaimed',e.target.value)} placeholder="0" />

// MODAL 3 — Record Receipt against RA Bill
// ════════════════════════════════════════════════════
function RecordReceiptModal({ raBill, onClose, allReceipts }) {
  const alreadyReceived = allReceipts.filter(r=>r.raBillId===raBill.docId).reduce((s,r)=>s+Number(r.amountReceived||0),0);
  const pendingBalance = Math.max(0, Number(raBill.amountClaimed||0) - alreadyReceived);

  const [form, setForm] = useState({
    amountReceived: String(pendingBalance),
    dateReceived: new Date().toISOString().slice(0,10),
    paymentMode: 'NEFT', refNumber: '', notes: ''
  });
  const [saving, setSaving] = useState(false);
  function set(f,v){setForm(s=>({...s,[f]:v}));}

  const newBalance = Math.max(0, pendingBalance - Number(form.amountReceived||0));
  const isShort = Number(form.amountReceived||0) < pendingBalance;
  const isOver = Number(form.amountReceived||0) > pendingBalance;

  async function handleSave(){
    if(!form.amountReceived||!form.dateReceived) return;
    setSaving(true);
    try {
      const amt = Number(form.amountReceived);
      await addReceipt({
        raBillId:        raBill.docId,
        raBillNo:        raBill.raBillNo,
        scheduleId:      raBill.scheduleId,
        client:          raBill.client,
        projectRef:      raBill.projectRef,
        project:         raBill.project || '',
        milestoneName:   raBill.milestoneName,
        amountClaimed:   raBill.amountClaimed,
        amountReceived:  amt,
        dateReceived:    form.dateReceived,
        paymentMode:     form.paymentMode,
        refNumber:       form.refNumber,
        notes:           form.notes,
      });
      // Update RA Bill received total and status
      const totalReceived = alreadyReceived + amt;
      const newPending = Math.max(0, Number(raBill.amountClaimed||0) - totalReceived);
      const status = newPending <= 0 ? 'Fully Received' : 'Partially Received';
      await updateRABill(raBill.docId, {
        amountReceived: totalReceived,
        balancePending: newPending,
        status
      });
      onClose();
    } catch(e){ console.error(e); alert('Could not record receipt.'); }
    finally{ setSaving(false); }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'var(--surface)',borderRadius:10,width:480,boxShadow:'0 8px 40px rgba(0,0,0,.22)',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
        <div style={{background:'var(--green)',padding:'14px 18px'}}>
          <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>✓ Record Receipt — {raBill.raBillNo}</span>
        </div>
        <div style={{padding:'18px 20px'}}>
          {/* Cross-reference summary */}
          <div style={{background:'var(--green-50)',border:'1px solid #C8E6C9',borderRadius:6,padding:'10px 14px',fontSize:12,marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:12.5,marginBottom:6,color:'var(--green)'}}>Cross-Reference</div>
            <div className="flex justify-between mt-1"><span style={{color:'var(--text-muted)'}}>Client</span><strong>{raBill.client}</strong></div>
            <div className="flex justify-between mt-1"><span style={{color:'var(--text-muted)'}}>Project</span><span>{raBill.projectRef||'—'}</span></div>
            <div className="flex justify-between mt-1"><span style={{color:'var(--text-muted)'}}>Billing Milestone</span><span>{raBill.milestoneName||'—'}</span></div>
            <div className="flex justify-between mt-1"><span style={{color:'var(--text-muted)'}}>RA Bill No.</span><span className="mono">{raBill.raBillNo}</span></div>
            <div style={{borderTop:'1px solid #C8E6C9',marginTop:8,paddingTop:8}}>
              <div className="flex justify-between"><span style={{color:'var(--text-muted)'}}>Total Claimed</span><span className="amount fw-600">{inr(raBill.amountClaimed||0)}</span></div>
              <div className="flex justify-between mt-1"><span style={{color:'var(--text-muted)'}}>Already Received</span><span className="amount" style={{color:'var(--green)'}}>{inr(alreadyReceived)}</span></div>
              <div className="flex justify-between mt-1"><span style={{color:'var(--text-muted)'}}>Balance Pending</span><span className="amount fw-600" style={{color:'var(--red)'}}>{inr(pendingBalance)}</span></div>
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Amount Received Now (₹)</label>
            <input className="form-input font-mono" value={form.amountReceived}
              onChange={e=>set('amountReceived',e.target.value)} autoFocus />
            {form.amountReceived && (
              <div style={{fontSize:11.5,marginTop:4,color:isOver?'var(--amber)':isShort?'var(--primary)':'var(--green)',fontWeight:500}}>
                {isOver  && `⚠ Exceeds balance by ${inr(Number(form.amountReceived)-pendingBalance)}`}
                {isShort && `Partial payment — balance remaining: ${inr(newBalance)}`}
                {!isOver && !isShort && '✓ Full balance cleared'}
              </div>
            )}
          </div>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Date Received</label>
              <input className="form-input" type="date" value={form.dateReceived} onChange={e=>set('dateReceived',e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Payment Mode</label>
              <select className="form-input form-select" value={form.paymentMode} onChange={e=>set('paymentMode',e.target.value)}>
                {(window.appLists?.paymentModes||DEFAULT_LISTS.paymentModes).map(m=><option key={m}>{m}</option>)}
              </select>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Reference / UTR Number</label>
            <input className="form-input font-mono" value={form.refNumber} onChange={e=>set('refNumber',e.target.value)} placeholder="Transaction reference" />
          </div>
          <div className="form-group">
            <label className="form-label">Notes</label>
            <input className="form-input" value={form.notes} onChange={e=>set('notes',e.target.value)} placeholder="Optional" />
          </div>
        </div>
        <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={handleSave} disabled={saving||!form.amountReceived||!form.dateReceived} className="btn btn-primary"
            style={{background:'var(--green)',opacity:saving||!form.amountReceived||!form.dateReceived?0.6:1}}>
            {saving?'Saving…':'Record Receipt'}
          </button>
        </div>
      </div>
    </div>
  );
}

  );

// PETTY CASH — day-to-day small cash expenses

const PETTY_COLLECTION = 'petty_cash';
const PETTY_CATEGORIES = [
  'Auto / Fuel',
  'Tea & Snacks',
  'Courier',
  'Stationery',
  'Site Travel',
  'Minor Hardware',
  'Telephone / Recharge',
  'Printing',
  'Bank Charges',
  'Miscellaneous',
];

function usePettyCash() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const unsub = onSnapshot(
        query(userCol(PETTY_COLLECTION), orderBy('createdAt','desc')),
        snap => { setItems(snap.docs.map(d=>({docId:d.id,...d.data()}))); setLoading(false); },
        err  => { console.error('Petty cash listener',err); setLoading(false); }
      );
      return unsub;
    }
    if (window.fb && getUserUID()) { const u=start(); return ()=>u&&u(); }
    let u;
    const h=()=>{ if(getUserUID()) u=start(); };
    const hu=()=>{ if(u) u(); if(window.fb) u=start(); };
    window.addEventListener('firebase-ready',h,{once:true});
    window.addEventListener('user-ready',hu,{once:true});
    return ()=>{ window.removeEventListener('firebase-ready',h); window.removeEventListener('user-ready',hu); if(u) u(); };
  },[]);
  return {items,loading};
}

async function addPettyEntry(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(userCol(PETTY_COLLECTION), {...data, createdAt:Date.now()});
}
async function deletePettyEntry(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(userDoc(PETTY_COLLECTION, docId));
}
async function clearAllPettyCash() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(userCol(PETTY_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d=>batch.delete(d.ref));
  await batch.commit();
}

// ─── New Petty Cash Entry Modal ────────────────────
function NewPettyModal({ onClose, currentUser, existing }) {
  const isEdit = !!existing;
  const knownNames = useKnownNames();
  const lists = useLists();
  const { items: wos } = useWorkOrders();
  const [form, setForm] = useState(isEdit ? {
    date: existing.date||'', amount: existing.amount ? String(existing.amount) : '',
    category: existing.category||'Auto / Fuel', paidBy: existing.paidBy||'',
    description: existing.description||'', project: existing.project||'',
    split: existing.split||{pontoon:50,wtp:50}
  } : {
    date: new Date().toISOString().slice(0,10),
    amount: '', category: 'Auto / Fuel',
    paidBy: currentUser ? currentUser.name : 'Neer',
    description: '', project: '', split: {pontoon:50,wtp:50},
  });
  const [saving, setSaving] = useState(false);
  function set(f,v){setForm(s=>({...s,[f]:v}));}

  async function handleSave() {
    if (!form.amount || !form.description.trim() || !form.date) return;
    setSaving(true);
    try {
      if (isEdit) {
        const { db, doc, updateDoc } = window.fb;
        await updateDoc(userDoc(PETTY_COLLECTION, existing.docId), {...form, amount: Number(form.amount)});
      } else {
        await addPettyEntry({...form, amount: Number(form.amount)});
      }
      onClose();
    } catch(e){ console.error(e); alert('Could not save entry.'); }
    finally{ setSaving(false); }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'var(--surface)',borderRadius:10,width:480,maxHeight:'88vh',overflowY:'auto',boxShadow:'0 8px 40px rgba(0,0,0,.22)'}} onClick={e=>e.stopPropagation()}>
        <div style={{background:'var(--secondary)',padding:'14px 18px',position:'sticky',top:0,zIndex:1}}>
          <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>{isEdit ? '✏ Edit Entry' : '+ Petty Cash Entry'}</span>
        </div>
        <div style={{padding:'18px 20px'}}>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Date</label>
              <input className="form-input" type="date" value={form.date} onChange={e=>set('date',e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Amount (₹)</label>
              <input className="form-input font-mono" value={form.amount} onChange={e=>set('amount',e.target.value)} placeholder="0" autoFocus />
            </div>
          </div>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Category</label>
              <select className="form-input form-select" value={form.category} onChange={e=>set('category',e.target.value)}>
                {(lists.pettyCategories||DEFAULT_LISTS.pettyCategories).map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Paid By</label>
              <select className="form-input form-select" value={form.paidBy} onChange={e=>set('paidBy',e.target.value)}>
                {(lists.employees||DEFAULT_LISTS.employees).map(n=><option key={n}>{n}</option>)}
              </select>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Description</label>
            <input className="form-input" value={form.description} onChange={e=>set('description',e.target.value)} placeholder="e.g. Petrol for site visit — Thane" />
          </div>
          <ProjectSelect value={form.project} onChange={v=>set('project',v)} split={form.split} onSplitChange={v=>set('split',v)} />
        </div>
        <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={handleSave} disabled={saving||!form.amount||!form.description.trim()} className="btn btn-primary"
            style={{background:'var(--secondary)',opacity:saving||!form.amount||!form.description.trim()?0.6:1}}>
            {saving?'Saving…': isEdit ? 'Save Changes' : 'Save Entry'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Petty Cash Module ──────────────────────────────
function PettyCash({ currentUser }) {
  const { items, loading } = usePettyCash();
  const [showNew, setShowNew] = useState(false);
  const [catFilter, setCatFilter] = useState('all');
  const [paidByFilter, setPaidByFilter] = useState('all');
  const [monthFilter, setMonthFilter] = useState('all');
  const [editEntry, setEditEntry] = useState(null);
  const [pettySortBy, setPettySortBy] = useState('date_desc');
  const [pettyProjectFilter, setPettyProjectFilter] = useState('all');

  const months = [...new Set(items.map(i=>i.date?.slice(0,7)).filter(Boolean))].sort().reverse();

  function sortPetty(arr) {
    const s = [...arr];
    if (pettySortBy==='date_asc')    return s.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    if (pettySortBy==='date_desc')   return s.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    if (pettySortBy==='amount_desc') return s.sort((a,b)=>Number(b.amount||0)-Number(a.amount||0));
    if (pettySortBy==='amount_asc')  return s.sort((a,b)=>Number(a.amount||0)-Number(b.amount||0));
    if (pettySortBy==='desc_asc')    return s.sort((a,b)=>(a.description||'').localeCompare(b.description||''));
    return s;
  }

  const filtered = sortPetty(items.filter(i=>
    (catFilter==='all' || i.category===catFilter) &&
    (paidByFilter==='all' || normName(i.paidBy)===paidByFilter) &&
    (monthFilter==='all' || (i.date||'').startsWith(monthFilter)) &&
    (pettyProjectFilter==='all' || i.project===pettyProjectFilter)
  ));

  const total = filtered.reduce((s,i)=>s+Number(i.amount||0),0);
  const totalAll = items.reduce((s,i)=>s+Number(i.amount||0),0);

  // Category breakdown for filtered period
  const activePettyCategories = window.appLists?.pettyCategories || DEFAULT_LISTS.pettyCategories;

const EXPENSE_COLLECTION = 'expenses';

function useExpenses() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { query, orderBy, onSnapshot } = window.fb;
      const unsub = onSnapshot(
        query(userCol(EXPENSE_COLLECTION), orderBy('createdAt','desc')),
        snap => { setItems(snap.docs.map(d=>({docId:d.id,...d.data()}))); setLoading(false); },
        err  => { console.error('Expenses listener',err); setLoading(false); }
      );
      return unsub;
    }
    if (window.fb && getUserUID()) { const u=start(); return ()=>u&&u(); }
    let u;
    const h=()=>{ if(getUserUID()) u=start(); };
    const hu=()=>{ if(u) u(); if(window.fb) u=start(); };
    window.addEventListener('firebase-ready',h,{once:true});
    window.addEventListener('user-ready',hu,{once:true});
    return ()=>{ window.removeEventListener('firebase-ready',h); window.removeEventListener('user-ready',hu); if(u) u(); };
  },[]);
  return {items,loading};
}
async function addExpenseEntry(data) {
  const { addDoc } = window.fb;
  await addDoc(userCol(EXPENSE_COLLECTION), {...data, createdAt:Date.now()});
}
async function deleteExpenseEntry(docId) {
  const { deleteDoc } = window.fb;
  await deleteDoc(userDoc(EXPENSE_COLLECTION, docId));
}
async function updateExpenseEntry(docId, data) {
  const { updateDoc } = window.fb;
  await updateDoc(userDoc(EXPENSE_COLLECTION, docId), data);
}
async function clearAllExpenses() {
  const { getDocs, writeBatch, db } = window.fb;
  const snap = await getDocs(userCol(EXPENSE_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d=>batch.delete(d.ref));
  await batch.commit();
}

function NewExpenseModal({ onClose, currentUser, existing }) {
  const isEdit = !!existing;

  const { items: pos } = usePurchaseOrders();
  const { items: wos } = useWorkOrders();
  const [form, setForm] = useState(isEdit ? {
    date: existing.date||'',
    amount: existing.amount ? String(existing.amount) : '',
    category: existing.category||'',
    vendor: existing.vendor||'',
    paidBy: existing.paidBy||'',
    paymentMode: existing.paymentMode||'NEFT',
    refNumber: existing.refNumber||'',
    description: existing.description||'',
    linkedPO: existing.linkedPO||'',
    linkedWO: existing.linkedWO||'',
    project: existing.project||'',
    split: existing.split||{pontoon:50,wtp:50},
  } : {
    date: new Date().toISOString().slice(0,10),
    amount: '', category: '', vendor: '',
    paidBy: currentUser?.name||'', paymentMode: 'NEFT',
    refNumber: '', description: '', linkedPO: '', linkedWO: '',
    project: '', split: {pontoon:50,wtp:50},

          </div>
          <div className="form-grid">
            <div className="form-group">

            <div className="form-group">

  const months = [...new Set(items.map(i=>i.date?.slice(0,7)).filter(Boolean))].sort().reverse();

  function sortExp(arr) {
    const s = [...arr];
    if (expSortBy==='date_asc')    return s.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    if (expSortBy==='date_desc')   return s.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    if (expSortBy==='amount_desc') return s.sort((a,b)=>Number(b.amount||0)-Number(a.amount||0));
    if (expSortBy==='amount_asc')  return s.sort((a,b)=>Number(a.amount||0)-Number(b.amount||0));
    if (expSortBy==='desc_asc')    return s.sort((a,b)=>(a.description||'').localeCompare(b.description||''));
    return s;

const CAPITAL_COLLECTION = 'capital_loans';
const CAPITAL_TYPES = ['Investor Fund','Bank Loan','Overdraft','Owner Capital Injection','Grant','Other'];

function useCapitalLoans() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(userCol(CAPITAL_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, snap => {
        setItems(snap.docs.map(d => ({ docId: d.id, ...d.data() })));
        setLoading(false);
      }, err => { console.error('Capital listener', err); setLoading(false); });
      return unsub;
    }
    if (window.fb && getUserUID()) { const u = start(); return () => u && u(); }
    let u;
    const h = () => { if(getUserUID()) u = start(); };
    const hu = () => { if(u) u(); if(window.fb) u = start(); };
    window.addEventListener('firebase-ready', h, { once: true });
    window.addEventListener('user-ready', hu, { once: true });
    return () => { window.removeEventListener('firebase-ready', h); window.removeEventListener('user-ready', hu); if (u) u(); };
  }, []);
  return { items, loading };
}
async function addCapitalEntry(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(userCol(CAPITAL_COLLECTION), { ...data, createdAt: Date.now() });
}
async function deleteCapitalEntry(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(userDoc(CAPITAL_COLLECTION, docId));
}
async function clearAllCapital() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(userCol(CAPITAL_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

// ════════════════════════════════════════════════════
// PROJECT P&L — Pontoon vs WTP side by side
// ════════════════════════════════════════════════════
function ProjectPnL() {
  const { items: bills }     = useBills();
  const { items: advances }  = useAdvances();
  const { items: pos }       = usePurchaseOrders();
  const { items: wos }       = useWorkOrders();
  const { items: milestones }= useMilestones();
  const { items: receipts }  = useReceipts();
  const { items: petty }     = usePettyCash();
  const { items: expenseItems } = useExpenses();
  const { items: capital }   = useCapitalLoans();

  function calcProject(proj) {
    const projKey = proj === 'Pontoon' ? 'pontoon' : 'wtp';

    function matchAmt(item, amtField) {
      const amt = Number(item[amtField]||0);
      if (item.project === proj) return amt;
      if (item.project === 'Both') {
        const pct = (item.split?.[projKey] ?? 50) / 100;
        return amt * pct;
      }
      return 0;
    }

    // ── INCOME ──────────────────────────────────────
    const receiptIncome = receipts.filter(r => r.project===proj || r.project==='Both')
      .reduce((s,r) => s + matchAmt(r,'amountReceived'), 0);
    const milestoneIncome = milestones.filter(m => m.paid && (m.project===proj || m.project==='Both'))
      .reduce((s,m) => s + matchAmt(m,'amount'), 0);
    const capitalIncome = 0;
    const totalIncome = receiptIncome + milestoneIncome;

    // ── EXPENSES (Paid / Incurred) ────────────────────
    const billExp    = bills.filter(b => b.project===proj || b.project==='Both').reduce((s,b) => s + matchAmt(b,'amount'), 0);
    const advanceExp = advances.filter(a => a.project===proj || a.project==='Both').reduce((s,a) => s + matchAmt(a,'amount'), 0);
    const pettyExp   = petty.filter(p => p.project===proj || p.project==='Both').reduce((s,p) => s + matchAmt(p,'amount'), 0);
    const bankExp    = expenseItems.filter(e => e.project===proj || e.project==='Both').reduce((s,e) => s + matchAmt(e,'amount'), 0);
    const totalExpenses = billExp + advanceExp + pettyExp + bankExp;

    // ── COMMITMENTS (Not yet paid) ────────────────────
    const poExp = pos.filter(p => p.project===proj || p.project==='Both').reduce((s,p) => s + matchAmt(p,'value'), 0);
    const woExp = wos.filter(w => w.project===proj || w.project==='Both').reduce((s,w) => s + matchAmt(w,'value'), 0);
    const totalCommitted = poExp + woExp;

    const margin    = totalIncome - totalExpenses;
    const marginPct = totalIncome > 0 ? Math.round((margin/totalIncome)*100) : 0;

    return {
      receiptIncome, milestoneIncome, capitalIncome, totalIncome,
      billExp, advanceExp, poExp, woExp, pettyExp,
      totalExpenses, totalCommitted, margin, marginPct,
      billCount:  bills.filter(b=>b.project===proj||b.project==='Both').length,
      poCount:    pos.filter(p=>p.project===proj||p.project==='Both').length,
      woCount:    wos.filter(w=>w.project===proj||w.project==='Both').length,
      pettyCount: petty.filter(p=>p.project===proj||p.project==='Both').length,
      bankExp, bankCount: expenseItems.filter(e=>e.project===proj||e.project==='Both').length,
    };
  }

  const pontoon = calcProject('Pontoon');
  const wtp     = calcProject('WTP');
  const combined = {
    totalIncome:    pontoon.totalIncome + wtp.totalIncome,
    totalExpenses:  pontoon.totalExpenses + wtp.totalExpenses,
    totalCommitted: pontoon.totalCommitted + wtp.totalCommitted,
    margin:         pontoon.margin + wtp.margin,
  };

  function PnLCard({ label, pData, color }) {
    const isPositive = pData.margin >= 0;
    return (
      <div style={{flex:1,border:`2px solid ${color}`,borderRadius:10,overflow:'hidden'}}>
        {/* Header */}
        <div style={{background:color,padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontWeight:800,fontSize:15,color:'#fff'}}>{label}</span>
          <span style={{fontSize:11,color:'rgba(255,255,255,.75)',fontWeight:500}}>Project P&L</span>
        </div>

        {/* Margin highlight */}
        <div style={{background: isPositive ? 'var(--green-50)' : 'var(--red-50)', padding:'12px 16px',borderBottom:`1px solid ${color}20`}}>
          <div style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:.5,marginBottom:2}}>Net Margin</div>
          <div style={{fontFamily:'var(--font-mono)',fontSize:24,fontWeight:800,color:isPositive?'var(--green)':'var(--red)'}}>
            {inr(pData.margin)}
          </div>
          <div style={{fontSize:11.5,color:'var(--text-muted)',marginTop:2}}>{pData.marginPct}% of income</div>
        </div>

        {/* Income breakdown */}
        <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.5,color:'var(--green)',marginBottom:8}}>Income</div>
          <div className="flex justify-between" style={{marginBottom:4}}>
            <span style={{fontSize:12,color:'var(--text-secondary)'}}>Client Receipts</span>
            <span className="amount" style={{fontSize:12,fontWeight:600,color:'var(--green)'}}>{inr(pData.receiptIncome)}</span>
          </div>

// REMINDERS — auto-generated from live Firestore data
