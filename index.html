    --secondary-50: #E0F2F1;
    --red: #C62828;
    --red-50: #FFEBEE;
    --amber: #E65100;

    --green: #2E7D32;

    --grey: #546E7A;

    --bg: #F5F7FA;
    --surface: #FFFFFF;

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; height: 48px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; box-shadow: var(--shadow-sm); }

  .nav-item:hover { background: rgba(255,255,255,.10); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,.16); color: #fff; font-weight: 500; }
  .nav-item .icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
  .nav-badge { background: var(--red); color: #fff; border-radius: 10px; font-size: 9px; font-weight: 700; padding: 1px 5px; margin-left: auto; }
  
  /* Topbar */
  .topbar-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; cursor: pointer; }

  .alert-bar .alert-dismiss { margin-left: auto; cursor: pointer; opacity: .6; font-size: 14px; }

  .card-body { padding: 14px 16px; }

  .stat-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; }
  .stat-label { font-size: 10.5px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }

  .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }

  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }

  .tab:hover:not(.active) { color: var(--text); }

  .progress-fill.blue { background: var(--primary); }
  .progress-fill.green { background: var(--green); }
  .progress-fill.amber { background: var(--amber); }
  .progress-fill.red { background: var(--red); }

  .quick-links { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
  .quick-link { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; text-align: center; transition: all .12s; }

  .quick-link .ql-icon { font-size: 20px; margin-bottom: 5px; }
  .quick-link .ql-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); }
  
  /* Rupee amounts */
  .amount { font-family: var(--font-mono); }
  
  /* Overdue row highlight */
  tr.overdue td { background: #FFF5F5; }
  tr.due-today td { background: #FFFBF0; }
  
  /* Scrollable table wrapper */
  .table-wrap { overflow-x: auto; }
  
  /* Module placeholder */
  .module-coming { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; color: var(--text-muted); gap: 8px; }
  .module-coming .big-icon { font-size: 40px; }
  .module-coming h3 { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
  .module-coming p { font-size: 12px; }
  
  /* Misc */
  .text-muted { color: var(--text-muted); }
  .text-sm { font-size: 11px; }
  .mt-1 { margin-top: 4px; }
  .mt-2 { margin-top: 8px; }
  .mt-3 { margin-top: 12px; }
  .mb-1 { margin-bottom: 4px; }
  .flex { display: flex; }
  .items-center { align-items: center; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .justify-between { justify-content: space-between; }
  .font-mono { font-family: var(--font-mono); }
  .fw-600 { font-weight: 600; }
  .col-gap { display: flex; flex-direction: column; gap: 10px; }
</style>

// ─── Reusable Components ──────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  componentDidCatch(e, info) { console.error('Module error:', e, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:32,textAlign:'center'}}>
          <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
          <div style={{fontWeight:700,fontSize:14,color:'var(--red)',marginBottom:8}}>Something went wrong in this module</div>
          <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:16,fontFamily:'var(--font-mono)'}}>{this.state.error.message}</div>
          <button className="btn btn-primary" onClick={()=>this.setState({error:null})}>Try Again</button>
        </div>
      );
    }
    return this.props.children;
  }
}

// ─── Firestore hook for Tasks ─────────────────────────
function useTasks() {
  const [tasks, setTasks] = useState([]);
  const [ready, setReady] = useState(false);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(collection(db, TASKS_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, (snap) => {
        const rows = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
        setTasks(rows);
        setLoading(false);
      }, (err) => {
        console.error('Tasks listener error', err);
        setLoading(false);
      });
      setReady(true);
      return unsub;
    }

    if (window.fb) {
      const unsub = start();
      return () => unsub && unsub();
    } else {
      let unsub;
      const handler = () => { unsub = start(); };
      window.addEventListener('firebase-ready', handler, { once: true });
      return () => {
        window.removeEventListener('firebase-ready', handler);
        if (unsub) unsub();
      };
    }
  }, []);

  return { tasks, ready, loading };
}

async function addTask(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(collection(db, TASKS_COLLECTION), {
    ...data,
    createdAt: Date.now(),
  });
}

async function updateTask(docId, data) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(doc(db, TASKS_COLLECTION, docId), data);
}

async function deleteTask(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, TASKS_COLLECTION, docId));
}

async function clearAllTasks() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(collection(db, TASKS_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

                autoFocus

                  borderColor: typed === CONFIRM_PHRASE ? 'var(--red)' : typed.length > 0 ? '#EF9A9A' : 'var(--border)'}}

            </div>
            <div style={{padding:'16px 22px 22px',display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button onClick={close} className="btn btn-ghost" disabled={working}>Cancel</button>
              <button

        </div>

    </>
  );
}

// ─── Tasks Module (Firestore-backed) ──────────────────
function Tasks() {
  const { tasks, loading } = useTasks();
  const [filter, setFilter] = useState('all');
  const [showNew, setShowNew] = useState(false);
  const [remarkTask, setRemarkTask] = useState(null);

  // Auto-detect overdue: due date in the past and not Completed
  const todayStr = new Date().toISOString().slice(0,10);
  const withComputedStatus = tasks.map(t => {
    const isOverdue = t.due && t.due < todayStr && t.status !== 'Completed' && !t.remark;
    return { ...t, effectiveStatus: isOverdue ? 'Overdue' : (t.status || 'Pending') };
  });

  const filtered = filter === 'all' ? withComputedStatus : withComputedStatus.filter(t => t.effectiveStatus.toLowerCase() === filter);

  async function markComplete(t) {
    try { await updateTask(t.docId, { status: 'Completed' }); }
    catch (e) { console.error(e); alert('Could not update task.'); }
  }

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Tasks</div>
          <div className="section-sub">{loading ? 'Loading from Firestore…' : `${tasks.length} task${tasks.length===1?'':'s'} · live data`}</div>
        </div>
        <div className="flex gap-2">
          <button className="btn btn-primary" onClick={() => setShowNew(true)}>+ New Task</button>
          <ClearTasksButton count={tasks.length} />

      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="card-body" style={{paddingTop:10,paddingBottom:10}}>
          <div className="flex gap-2 items-center">
            <select className="form-input form-select" style={{width:140}} onChange={e=>setFilter(e.target.value)}>
              <option value="all">All Status</option>
              <option value="overdue">Overdue</option>
              <option value="in progress">In Progress</option>
              <option value="scheduled">Scheduled</option>
              <option value="pending">Pending</option>
              <option value="completed">Completed</option>
            </select>
          </div>
        </div>
      </div>

      <div className="card">
        {loading ? (
          <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
        ) : filtered.length === 0 ? (
          <div className="module-coming">
            <div className="big-icon">📋</div>
            <h3>No tasks yet</h3>
            <p className="text-muted">Create your first task — it'll be saved permanently to your database.</p>
          </div>
        ) : (
          <table>
            <thead>
              <tr><th>Task Name</th><th>Client</th><th>WO #</th><th>Assigned</th><th>Priority</th><th>Status</th><th>Due Date</th><th>Actions</th></tr>
            </thead>
            <tbody>
              {filtered.map(t => (
                <tr key={t.docId} className={t.effectiveStatus==='Overdue'?'overdue':''}>
                  <td><span className="fw-600">{t.name}</span>{t.remark && <div className="text-sm text-muted mt-1">Remark: {t.remark}</div>}</td>
                  <td>{t.client || '—'}</td>
                  <td className="mono">{t.wo || '—'}</td>
                  <td>{t.assigned}</td>
                  <td><span className={`badge ${PRIO_COLOR[t.priority] || 'grey'}`}>{t.priority}</span></td>
                  <td><StatusBadge status={t.effectiveStatus} /></td>
                  <td className={t.effectiveStatus==='Overdue'?'fw-600':''} style={t.effectiveStatus==='Overdue'?{color:'var(--red)'}:{}}>{t.due || '—'}</td>
                  <td>
                    <div className="flex gap-2">
                      {t.effectiveStatus !== 'Completed' && (
                        <button className="btn btn-sm btn-ghost" onClick={() => markComplete(t)}>Complete</button>
                      )}
                      {t.effectiveStatus === 'Overdue' && (
                        <button className="btn btn-sm" style={{background:'var(--red-50)',color:'var(--red)',border:'none',borderRadius:4,fontSize:11,padding:'4px 10px',cursor:'pointer'}} onClick={() => setRemarkTask(t)}>

                    </div>

        )}
      </div>

      {showNew && <NewTaskModal onClose={() => setShowNew(false)} />}
      {remarkTask && <RemarkModal task={remarkTask} onClose={() => setRemarkTask(null)} onSaved={() => setRemarkTask(null)} />}
    </div>
  );
}

// WORK ORDERS — issued to vendors for services/labour
// Series: NWTS/WO/2026-27/001
// ════════════════════════════════════════════════════
const WO_COLLECTION = 'workorders';
const WO_STAGES = ['Draft','Issued','In Progress','Completed','Cancelled'];
const FY = '2026-27';

function useWorkOrders() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(collection(db, WO_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, (snap) => {
        setItems(snap.docs.map(d => ({ docId: d.id, ...d.data() })));
        setLoading(false);
      }, (err) => { console.error('WO listener error', err); setLoading(false); });
      return unsub;
    }
    if (window.fb) { const unsub = start(); return () => unsub && unsub(); }
    let unsub;
    const handler = () => { unsub = start(); };
    window.addEventListener('firebase-ready', handler, { once: true });
    return () => { window.removeEventListener('firebase-ready', handler); if (unsub) unsub(); };
  }, []);
  return { items, loading };
}
async function addWorkOrder(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(collection(db, WO_COLLECTION), { ...data, createdAt: Date.now() });
}
async function updateWorkOrder(docId, data) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(doc(db, WO_COLLECTION, docId), data);
}
async function deleteWorkOrder(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, WO_COLLECTION, docId));
}
async function clearAllWorkOrders() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(collection(db, WO_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

function nextWONumber(count) {
  return `NWTS/WO/${FY}/${String(count + 1).padStart(3, '0')}`;
}
function nextPONumber(count) {
  return `NWTS/PO/${FY}/${String(count + 1).padStart(3, '0')}`;
}

// Returns quotations eligible for linking (Finalization of T&C or Issuing of PO/WO)
function finalizedQuotations(quotations) {
  return quotations.filter(q => q.stage === 'Finalization of T&C' || q.stage === 'Issuing of PO/WO');
}

function NewWOModal({ onClose, nextNumber, quotations }) {
  const [form, setForm] = useState({
    wo: nextNumber, vendorName: '', description: '', value: '',
    linkedQuotation: '', stage: 'Draft', due: '', notes: '',
    penaltyClause: '', disputeClause: ''
  });
  const [schedule, setSchedule] = useState([]);
  const [saving, setSaving] = useState(false);
  function set(f, v) { setForm(s => ({ ...s, [f]: v })); }

  // Auto-fill vendor name when quotation selected
  function handleQuotationSelect(val) {
    const q = quotations.find(q => q.docId === val);
    set('linkedQuotation', val);
    if (q) {
      setForm(s => ({
        ...s,
        linkedQuotation: val,
        vendorName: q.vendorName || s.vendorName,
        description: s.description || q.description || '',
        value: s.value || (q.value ? String(q.value) : ''),
      }));
      if ((!schedule || schedule.length === 0) && q.paymentSchedule && q.paymentSchedule.length > 0) {
        setSchedule(q.paymentSchedule.map(r => ({ ...r, id: genRowId() })));
      }
    }
  }

  async function handleSave() {
    if (!form.vendorName.trim() || !form.description.trim()) return;
    setSaving(true);
    try {
      await addWorkOrder({ ...form, value: Number(form.value) || 0, paymentSchedule: schedule });
      onClose();
    } catch (e) { console.error(e); alert('Could not save work order.'); }
    finally { setSaving(false); }
  }

  const eligible = finalizedQuotations(quotations);

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={onClose}>
      <div style={{background:'var(--surface)',borderRadius:10,width:620,maxHeight:'90vh',overflowY:'auto',boxShadow:'0 8px 40px rgba(0,0,0,.22)'}} onClick={e=>e.stopPropagation()}>
        <div style={{background:'var(--secondary)',padding:'14px 18px',position:'sticky',top:0,zIndex:1}}>
          <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>+ Issue Work Order</span>
        </div>
        <div style={{padding:'18px 20px'}}>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">WO Number</label>
              <input className="form-input font-mono" value={form.wo} onChange={e=>set('wo', e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Linked Quotation</label>
              <select className="form-input form-select" value={form.linkedQuotation} onChange={e => handleQuotationSelect(e.target.value)}>
                <option value="">Select finalized quotation…</option>
                {eligible.map(q => (
                  <option key={q.docId} value={q.docId}>{q.vendorName} — {q.description ? q.description.slice(0,40) : ''} ({inr(q.value||0)})</option>
                ))}
                {eligible.length === 0 && <option disabled>No finalized quotations yet</option>}
              </select>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Vendor Name</label>
            <input className="form-input" value={form.vendorName} onChange={e=>set('vendorName', e.target.value)} placeholder="Vendor / contractor name" />
          </div>
          <div className="form-group">
            <label className="form-label">Scope of Work / Description</label>
            <textarea className="form-input" rows="2" value={form.description} onChange={e=>set('description', e.target.value)} placeholder="e.g. RO plant commissioning and installation at Green Valley CHS" style={{resize:'vertical'}} />
          </div>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Total Value (₹)</label>
              <input className="form-input font-mono" value={form.value} onChange={e=>set('value', e.target.value)} placeholder="0" />
            </div>
            <div className="form-group">
              <label className="form-label">Expected Completion Date</label>
              <input className="form-input" type="date" value={form.due} onChange={e=>set('due', e.target.value)} />
            </div>
          </div>
          <PaymentScheduleEditor rows={schedule} setRows={setSchedule} totalValue={form.value} />
          <div className="form-group">
            <label className="form-label">Stage</label>
            <select className="form-input form-select" value={form.stage} onChange={e=>set('stage', e.target.value)}>
              {WO_STAGES.map(s => <option key={s}>{s}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Penalty Clause</label>
            <input className="form-input" value={form.penaltyClause} onChange={e=>set('penaltyClause', e.target.value)} placeholder="Optional" />
          </div>
          <div className="form-group">
            <label className="form-label">Dispute Resolution Clause</label>
            <input className="form-input" value={form.disputeClause} onChange={e=>set('disputeClause', e.target.value)} placeholder="Optional" />
          </div>
          <div className="form-group">
            <label className="form-label">Internal Notes</label>
            <input className="form-input" value={form.notes} onChange={e=>set('notes', e.target.value)} placeholder="Optional" />
          </div>
        </div>
        <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={handleSave} disabled={saving || !form.vendorName.trim() || !form.description.trim()} className="btn btn-primary"
            style={{background:'var(--secondary)', opacity: saving || !form.vendorName.trim() || !form.description.trim() ? .6 : 1}}>
            {saving ? 'Saving…' : 'Issue Work Order'}
          </button>
        </div>
      </div>
    </div>
  );
}

const WO_STAGE_COLOR = { 'Draft':'grey','Issued':'blue','In Progress':'teal','Completed':'green','Cancelled':'red' };

function WorkOrders() {
  const { items, loading } = useWorkOrders();
  const { items: quotations } = useQuotations();
  const [showNew, setShowNew] = useState(false);
  const [viewSchedule, setViewSchedule] = useState(null);
  const [stageFilter, setStageFilter] = useState('all');

  const nextNumber = nextWONumber(items.length);
  const filtered = stageFilter === 'all' ? items : items.filter(w => w.stage === stageFilter);
  const totalValue = items.reduce((s,w) => s + Number(w.value||0), 0);
  const activeCount = items.filter(w => w.stage === 'Issued' || w.stage === 'In Progress').length;

  // Resolve quotation display name from docId
  function quoteLabel(id) {
    const q = quotations.find(q => q.docId === id);
    return q ? `${q.vendorName}` : (id || '—');
  }

  async function advanceStage(w) {
    const idx = WO_STAGES.indexOf(w.stage);
    if (idx < WO_STAGES.length - 1) {
      try { await updateWorkOrder(w.docId, { stage: WO_STAGES[idx+1] }); }
      catch(e) { console.error(e); alert('Could not update stage.'); }
    }
  }

  return (
    <div style={{marginBottom:24}}>
      <div className="section-header">
        <div>
          <div className="section-title">Work Orders</div>
          <div className="section-sub">
            {loading ? 'Loading from Firestore…' : `${items.length} WO${items.length===1?'':'s'} · ${activeCount} active · Next: ${nextNumber}`}
          </div>
        </div>
        <div className="flex gap-2">
          <button className="btn btn-primary" style={{background:'var(--secondary)'}} onClick={() => setShowNew(true)}>+ Issue Work Order</button>
          <ClearCollectionButton label="Clear All WOs" count={items.length} onClear={clearAllWorkOrders} />

      <div className="stats-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
        <div className="stat-card"><div className="stat-label">Total WO Value</div><div className="stat-value red">{inr(totalValue)}</div></div>
        <div className="stat-card"><div className="stat-label">Active</div><div className="stat-value blue">{activeCount}</div></div>
        <div className="stat-card"><div className="stat-label">Completed</div><div className="stat-value green">{items.filter(w=>w.stage==='Completed').length}</div></div>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="card-body" style={{paddingTop:10,paddingBottom:10}}>
          <select className="form-input form-select" style={{width:160}} onChange={e=>setStageFilter(e.target.value)}>
            <option value="all">All Stages</option>
            {WO_STAGES.map(s => <option key={s}>{s}</option>)}
          </select>
        </div>
      </div>

      <div className="card">
        {loading ? (
          <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
        ) : filtered.length === 0 ? (
          <div className="module-coming">
            <div className="big-icon">🔧</div>
            <h3>No work orders yet</h3>
            <p className="text-muted">Issue a WO to a vendor for services or labour. Link it to a finalized quotation.</p>
          </div>
        ) : (
          <table>
            <thead>
              <tr><th>WO Number</th><th>Vendor</th><th>Scope of Work</th><th>Linked Quotation</th><th>Value</th><th>Due</th><th>Schedule</th><th>Stage</th><th>Actions</th></tr>
            </thead>
            <tbody>
              {filtered.map(w => (
                <tr key={w.docId}>
                  <td className="mono" style={{whiteSpace:'nowrap'}}>{w.wo}</td>
                  <td className="fw-600">{w.vendorName}</td>
                  <td style={{maxWidth:180}}>{w.description}</td>
                  <td style={{fontSize:11.5,color:'var(--text-muted)'}}>{quoteLabel(w.linkedQuotation)}</td>
                  <td className="amount fw-600">{inr(w.value||0)}</td>
                  <td>{w.due || '—'}</td>
                  <td>
                    {w.paymentSchedule && w.paymentSchedule.length > 0 ? (
                      <span className="btn btn-sm btn-ghost" style={{cursor:'pointer',whiteSpace:'nowrap'}} onClick={() => setViewSchedule({...w, label:w.wo})}>
                        {w.paymentSchedule.length} stage{w.paymentSchedule.length===1?'':'s'}
                      </span>
                    ) : <span className="text-muted text-sm">—</span>}

                  <td><span className={`badge ${WO_STAGE_COLOR[w.stage]||'grey'}`}>{w.stage}</span></td>

      {showNew && <NewWOModal onClose={() => setShowNew(false)} nextNumber={nextNumber} quotations={quotations} />}
      {viewSchedule && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={() => setViewSchedule(null)}>
          <div style={{background:'var(--surface)',borderRadius:10,width:440,boxShadow:'0 8px 40px rgba(0,0,0,.22)',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>

                  {(viewSchedule.paymentSchedule||[]).map((r,i) => (
                    <tr key={i} style={{borderTop:'1px solid var(--grey-50)'}}>
                      <td style={{padding:'6px 0',fontSize:12.5}}>{r.name}</td>
                      <td style={{fontSize:12.5}}>{r.pct}%</td>
                      <td className="amount" style={{fontSize:12.5}}>{inr(r.amount||0)}</td>
                      <td style={{fontSize:12.5}}>{r.date || '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{padding:'0 20px 16px',display:'flex',justifyContent:'flex-end'}}>
              <button onClick={() => setViewSchedule(null)} className="btn btn-ghost">Close</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

async function clearAllPOs() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(collection(db, PO_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

function NewPOModal({ onClose, nextNumber, vendors, quotations, prefill }) {
  const [form, setForm] = useState({
    po: nextNumber, vendorName: prefill?.party || '', description: prefill?.description || '',
    value: prefill?.value ? String(prefill.value) : '',
    linkedQuotation: prefill?.fromQuotation || '',
    stage: 'Draft', penaltyClause: prefill?.penaltyClause || '', disputeClause: prefill?.disputeClause || ''
  });
  const [schedule, setSchedule] = useState(prefill?.paymentSchedule ? prefill.paymentSchedule.map(r => ({...r, id: genRowId()})) : []);
  const [saving, setSaving] = useState(false);
  function set(f, v) { setForm(s => ({ ...s, [f]: v })); }

  function handleQuotationSelect(val) {
    const q = quotations.find(q => q.docId === val);
    set('linkedQuotation', val);
    if (q) {
      setForm(s => ({
        ...s,
        linkedQuotation: val,
        vendorName: s.vendorName || q.vendorName || '',
        description: s.description || q.description || '',
        value: s.value || (q.value ? String(q.value) : ''),
      }));
      if ((!schedule || schedule.length === 0) && q.paymentSchedule && q.paymentSchedule.length > 0) {
        setSchedule(q.paymentSchedule.map(r => ({ ...r, id: genRowId() })));
      }
    }
  }

  async function handleSave() {
    if (!form.vendorName.trim() || !form.value) return;
    setSaving(true);
    try {
      await addPO({ ...form, value: Number(form.value), paymentSchedule: schedule });
      onClose();

            <div className="form-group">

              <select className="form-input form-select" value={form.linkedQuotation} onChange={e => handleQuotationSelect(e.target.value)}>
                <option value="">Select finalized quotation…</option>
                {eligible.map(q => (
                  <option key={q.docId} value={q.docId}>{q.vendorName} — {q.description ? q.description.slice(0,40) : ''} ({inr(q.value||0)})</option>

                <option value="">Select vendor…</option>

              {PO_STAGES.map(s => <option key={s}>{s}</option>)}
            </select>

// ─── Cash Flow Module ──────────────────────────────────
const SETTINGS_COLLECTION = 'settings';
const SETTINGS_DOC = 'cashflow';

function useCashSettings() {
  const [settings, setSettings] = useState({ startingBalance: 1350000, criticalThreshold: 500000, warningThreshold: 800000 });
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    function start() {
      const { db, doc, onSnapshot } = window.fb;
      const unsub = onSnapshot(doc(db, SETTINGS_COLLECTION, SETTINGS_DOC), (snap) => {
        if (snap.exists()) setSettings(s => ({ ...s, ...snap.data() }));
        setLoading(false);
      }, () => setLoading(false));
      return unsub;
    }
    if (window.fb) {
      const unsub = start();
      return () => unsub && unsub();
    } else {
      let unsub;
      const handler = () => { unsub = start(); };
      window.addEventListener('firebase-ready', handler, { once: true });
      return () => { window.removeEventListener('firebase-ready', handler); if (unsub) unsub(); };
    }
  }, []);

  async function save(newSettings) {
    const { db, doc, setDoc } = window.fb;
    await setDoc(doc(db, SETTINGS_COLLECTION, SETTINGS_DOC), { ...settings, ...newSettings }, { merge: true });
  }

  return { settings, loading, save };
}

async function clearCashFlowData() {
  const { db, doc, setDoc } = window.fb;
  // Clear all unpaid bills (the forecast's source data) and reset the starting balance.
  await clearAllBills();
  await setDoc(doc(db, SETTINGS_COLLECTION, SETTINGS_DOC), { startingBalance: 0 }, { merge: true });
}

function CashFlow() {
  const [horizon, setHorizon] = useState('30');
  const { items: bills, loading: billsLoading } = useBills();
  const { settings, loading: settingsLoading } = useCashSettings();
  const [editingBalance, setEditingBalance] = useState(false);
  const [balanceInput, setBalanceInput] = useState('');

  const loading = billsLoading || settingsLoading;
  const todayStr = new Date().toISOString().slice(0,10);
  const horizonDate = new Date(Date.now() + Number(horizon)*86400000).toISOString().slice(0,10);

  // Build forecast rows from unpaid bills within horizon, sorted by due date
  const unpaidInRange = bills
    .filter(b => !b.paid && b.due && b.due <= horizonDate)
    .sort((a,b) => (a.due || '').localeCompare(b.due || ''));

  let running = Number(settings.startingBalance) || 0;
  const rows = unpaidInRange.map(b => {
    running -= Number(b.amount || 0);
    return { date: b.due, label: b.payee, cat: b.category, type: 'out', amt: Number(b.amount||0), balance: running };
  });

  const forecastLow = rows.length ? Math.min(...rows.map(r => r.balance), running) : running;
  const lowRow = rows.find(r => r.balance === forecastLow);
  const outflowsTotal = unpaidInRange.reduce((s,b) => s + Number(b.amount||0), 0);

  const criticalBreached = forecastLow < Number(settings.criticalThreshold || 0);
  const warningBreached = !criticalBreached && forecastLow < Number(settings.warningThreshold || 0);

  async function saveBalance() {
    const { db, doc, setDoc } = window.fb;
    try {
      await setDoc(doc(db, SETTINGS_COLLECTION, SETTINGS_DOC), { ...settings, startingBalance: Number(balanceInput) || 0 }, { merge: true });
      setEditingBalance(false);
    } catch (e) { console.error(e); alert('Could not save balance.'); }
  }

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Cash Flow Management</div>
          <div className="section-sub">{loading ? 'Loading from Firestore…' : 'Live balance and forecast · derived from unpaid bills'}</div>
        </div>
        <div className="flex gap-2">
          <select className="form-input form-select" style={{width:130}} value={horizon} onChange={e=>setHorizon(e.target.value)}>
            <option value="30">30-day view</option>
            <option value="45">45-day view</option>
            <option value="60">60-day view</option>
            <option value="90">90-day view</option>
          </select>
          <ClearCollectionButton label="Clear Forecast Data" count={unpaidInRange.length} onClear={clearCashFlowData} />
        </div>
      </div>

      {!loading && criticalBreached && (
        <div className="alert-bar critical" style={{marginBottom:14}}>
          <span className="alert-icon">🚨</span>
          <strong>Critical Threshold Breached:</strong>&nbsp;Forecast balance drops to {inr(forecastLow)} {lowRow ? `on ${lowRow.date}` : ''} — below your ₹{Number(settings.criticalThreshold).toLocaleString('en-IN')} critical threshold.
        </div>
      )}
      {!loading && warningBreached && (
        <div className="alert-bar warning" style={{marginBottom:14}}>
          <span className="alert-icon">⚠️</span>
          <strong>Warning Threshold Approaching:</strong>&nbsp;Forecast balance drops to {inr(forecastLow)} {lowRow ? `on ${lowRow.date}` : ''} — below your ₹{Number(settings.warningThreshold).toLocaleString('en-IN')} warning threshold.
        </div>
      )}

      <div className="stats-grid" style={{gridTemplateColumns:'repeat(4,1fr)',marginBottom:14}}>
        <div className="stat-card">
          <div className="stat-label">Starting / Live Balance</div>
          {editingBalance ? (
            <div className="flex gap-2 items-center mt-1">
              <input className="form-input font-mono" style={{width:120}} value={balanceInput} onChange={e=>setBalanceInput(e.target.value)} autoFocus />
              <button className="btn btn-sm btn-primary" onClick={saveBalance}>Save</button>
              <button className="btn btn-sm btn-ghost" onClick={() => setEditingBalance(false)}>✕</button>
            </div>
          ) : (
            <>
              <div className="stat-value green">{inr(settings.startingBalance)}</div>
              <div className="stat-sub" style={{cursor:'pointer',color:'var(--primary)'}} onClick={() => { setBalanceInput(String(settings.startingBalance)); setEditingBalance(true); }}>Edit balance</div>
            </>
          )}
        </div>
        <div className="stat-card"><div className="stat-label">Outflows ({horizon}d)</div><div className="stat-value red">{inr(outflowsTotal)}</div><div className="stat-sub">{unpaidInRange.length} unpaid bill{unpaidInRange.length===1?'':'s'}</div></div>
        <div className="stat-card"><div className="stat-label">Forecast Low</div><div className={`stat-value ${criticalBreached?'red':warningBreached?'amber':'blue'}`}>{inr(forecastLow)}</div>{lowRow && <div className="stat-sub">{lowRow.date}</div>}</div>
        <div className="stat-card"><div className="stat-label">Critical / Warning</div><div className="stat-value" style={{fontSize:14}}>{inr(settings.criticalThreshold)} / {inr(settings.warningThreshold)}</div><div className="stat-sub">Set in Settings</div></div>
      </div>

      <div className="card">
        <div className="card-header"><span className="card-title">{horizon}-Day Rolling Forecast — Live Unpaid Bills</span></div>
        {loading ? (
          <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
        ) : rows.length === 0 ? (
          <div className="module-coming">
            <div className="big-icon">📈</div>
            <h3>No upcoming outflows</h3>
            <p className="text-muted">Forecast will populate from unpaid bills as you add them in Bill Payments.</p>
          </div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr><th>Date</th><th>Description</th><th>Category</th><th>Outflow</th><th>Running Balance</th></tr>
              </thead>
              <tbody>
                {rows.map((r,i) => (
                  <tr key={i} className={r.balance < Number(settings.criticalThreshold) ? 'overdue' : ''}>
                    <td className="mono">{r.date}</td>
                    <td>{r.label}</td>
                    <td><span className="badge grey">{r.cat}</span></td>
                    <td className="amount" style={{color:'var(--red)'}}>{inr(r.amt)}</td>
                    <td className="amount fw-600">{inr(r.balance)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

const BILLS_COLLECTION = 'bills';

function useBills() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(collection(db, BILLS_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, (snap) => {
        setItems(snap.docs.map(d => ({ docId: d.id, ...d.data() })));
        setLoading(false);
      }, (err) => { console.error('Bills listener error', err); setLoading(false); });
      return unsub;
    }
    if (window.fb) {
      const unsub = start();
      return () => unsub && unsub();
    } else {
      let unsub;
      const handler = () => { unsub = start(); };
      window.addEventListener('firebase-ready', handler, { once: true });
      return () => { window.removeEventListener('firebase-ready', handler); if (unsub) unsub(); };
    }
  }, []);

  return { items, loading };
}

async function addBill(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(collection(db, BILLS_COLLECTION), { ...data, createdAt: Date.now(), paid: false });
}
async function markBillPaid(docId) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(doc(db, BILLS_COLLECTION, docId), { paid: true, paidAt: Date.now() });
}
async function deleteBill(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, BILLS_COLLECTION, docId));
}
async function clearAllBills() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(collection(db, BILLS_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

function BillPayments() {
  const { items, loading } = useBills();
  const [catFilter, setCatFilter] = useState('all');
  const [statusFilter, setStatusFilter] = useState('all');
  const [showNew, setShowNew] = useState(false);

  const todayStr = new Date().toISOString().slice(0,10);
  const withStatus = items.map(b => {
    let status;
    if (b.paid) status = 'Paid';
    else if (b.due === todayStr) status = 'Due Today';
    else if (b.due < todayStr) status = 'Overdue';
    else status = 'Upcoming';
    const days = (status === 'Overdue' && b.due) ? Math.floor((new Date(todayStr) - new Date(b.due)) / 86400000) : 0;
    return { ...b, computedStatus: status, days };
  });

  const filtered = withStatus.filter(b =>
    (catFilter === 'all' || b.category === catFilter) &&
    (statusFilter === 'all' || b.computedStatus === statusFilter)
  );

  const overdueTotal = withStatus.filter(b => b.computedStatus === 'Overdue').reduce((s,b) => s + Number(b.amount||0), 0);
  const overdueCount = withStatus.filter(b => b.computedStatus === 'Overdue').length;
  const dueTodayTotal = withStatus.filter(b => b.computedStatus === 'Due Today').reduce((s,b) => s + Number(b.amount||0), 0);
  const next7 = new Date(Date.now() + 7*86400000).toISOString().slice(0,10);
  const dueWeekTotal = withStatus.filter(b => !b.paid && b.due >= todayStr && b.due <= next7).reduce((s,b) => s + Number(b.amount||0), 0);
  const paidTotal = withStatus.filter(b => b.paid).reduce((s,b) => s + Number(b.amount||0), 0);

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Bill Payments</div>
          <div className="section-sub">{loading ? 'Loading from Firestore…' : `${items.length} bill${items.length===1?'':'s'} · live data`}</div>
        </div>
        <div className="flex gap-2">
          <button className="btn btn-primary" onClick={() => setShowNew(true)}>+ Add Bill</button>
          <ClearCollectionButton label="Clear All Bills" count={items.length} onClear={clearAllBills} />
        </div>
      </div>
      <div className="stats-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        <div className="stat-card"><div className="stat-label">Overdue Bills</div><div className="stat-value red">{inr(overdueTotal)}</div><div className="stat-sub">{overdueCount} bill{overdueCount===1?'':'s'}</div></div>
        <div className="stat-card"><div className="stat-label">Due Today</div><div className="stat-value amber">{inr(dueTodayTotal)}</div></div>
        <div className="stat-card"><div className="stat-label">Due This Week</div><div className="stat-value blue">{inr(dueWeekTotal)}</div></div>
        <div className="stat-card"><div className="stat-label">Paid Total</div><div className="stat-value green">{inr(paidTotal)}</div></div>
      </div>
      <div className="card">
        <div className="card-body" style={{paddingTop:10,paddingBottom:10}}>
          <div className="flex gap-2">
            <select className="form-input form-select" style={{width:150}} onChange={e=>setCatFilter(e.target.value)}>
              <option value="all">All Categories</option>
              <option>Vendor</option><option>Fixed</option><option>Professional</option><option>Utilities</option><option>Logistics</option><option>GST/Govt</option>
            </select>
            <select className="form-input form-select" style={{width:140}} onChange={e=>setStatusFilter(e.target.value)}>
              <option value="all">All Status</option>
              <option>Overdue</option><option>Due Today</option><option>Upcoming</option><option>Paid</option>
            </select>
          </div>
        </div>
        {loading ? (
          <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
        ) : filtered.length === 0 ? (
          <div className="module-coming">
            <div className="big-icon">📑</div>
            <h3>No bills yet</h3>
            <p className="text-muted">Add your first bill — saved permanently to your database.</p>
          </div>
        ) : (
          <table>
            <thead>
              <tr><th>Payee</th><th>Category</th><th>Invoice #</th><th>Invoice Date</th><th>Due Date</th><th>Amount</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody>
              {filtered.map(b => (
                <tr key={b.docId} className={b.computedStatus==='Overdue'?'overdue':b.computedStatus==='Due Today'?'due-today':''}>
                  <td className="fw-600">{b.payee}</td>
                  <td><span className="badge grey">{b.category}</span></td>
                  <td className="mono">{b.invoiceNo || '—'}</td>
                  <td className="text-muted">{b.invoiceDate || '—'}</td>
                  <td>{b.due}{b.days > 0 && <span style={{color:'var(--red)',fontWeight:600,marginLeft:4}}>+{b.days}d</span>}</td>
                  <td className="amount fw-600">{inr(b.amount||0)}</td>
                  <td><span className={`badge ${BILL_STATUS_COLOR[b.computedStatus]}`}>{b.computedStatus}</span></td>
                  <td>

                      <button className="btn btn-sm btn-ghost" onClick={() => { if(confirm('Delete this bill?')) deleteBill(b.docId); }}>Delete</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
      {showNew && <NewBillModal onClose={() => setShowNew(false)} />}
    </div>
  );
}

const VENDORS_COLLECTION = 'vendors';
const VENDOR_CATEGORIES = ['Membrane Supplier','Pump-Equipment','Chemicals','Pipes-Fittings','Logistics','Electrical','Civil','Other'];

function useVendors() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(collection(db, VENDORS_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, (snap) => {
        setItems(snap.docs.map(d => ({ docId: d.id, ...d.data() })));
        setLoading(false);
      }, (err) => { console.error('Vendors listener error', err); setLoading(false); });
      return unsub;
    }
    if (window.fb) { const unsub = start(); return () => unsub && unsub(); }
    let unsub;
    const handler = () => { unsub = start(); };
    window.addEventListener('firebase-ready', handler, { once: true });
    return () => { window.removeEventListener('firebase-ready', handler); if (unsub) unsub(); };
  }, []);
  return { items, loading };
}
async function addVendor(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(collection(db, VENDORS_COLLECTION), { ...data, createdAt: Date.now() });
}
async function updateVendor(docId, data) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(doc(db, VENDORS_COLLECTION, docId), data);
}
async function deleteVendor(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, VENDORS_COLLECTION, docId));
}
async function clearAllVendors() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(collection(db, VENDORS_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

// PAYMENT SCHEDULE EDITOR — reusable, dynamic rows
// Each row: milestone name, percentage, amount (₹), date
// ════════════════════════════════════════════════════
function genRowId() { return 'r' + Math.random().toString(36).slice(2, 9); }

function PaymentScheduleEditor({ rows, setRows, totalValue }) {
  function addRow() {
    setRows([...rows, { id: genRowId(), name: '', pct: '', amount: '', date: '' }]);
  }
  function removeRow(id) {
    setRows(rows.filter(r => r.id !== id));
  }
  function updateRow(id, field, value) {
    setRows(rows.map(r => {
      if (r.id !== id) return r;
      const next = { ...r, [field]: value };
      // Auto-calc amount from percentage if total value is known and amount wasn't hand-edited this change
      if (field === 'pct' && totalValue) {
        const pctNum = parseFloat(value);
        if (!isNaN(pctNum)) next.amount = String(Math.round((pctNum / 100) * Number(totalValue)));
      }
      return next;
    }));
  }

  const pctTotal = rows.reduce((s, r) => s + (parseFloat(r.pct) || 0), 0);
  const amtTotal = rows.reduce((s, r) => s + (Number(r.amount) || 0), 0);
  const pctMismatch = rows.length > 0 && Math.abs(pctTotal - 100) > 0.01;

  return (
    <div className="form-group">
      <label className="form-label">Payment Schedule</label>
      {rows.length === 0 ? (
        <div style={{fontSize:11.5,color:'var(--text-muted)',padding:'8px 0'}}>No payment stages added yet.</div>
      ) : (
        <div style={{border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',marginBottom:8}}>
          <table style={{width:'100%'}}>
            <thead>
              <tr style={{background:'var(--grey-50)'}}>
                <th style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)'}}>Stage Name</th>
                <th style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)',width:70}}>%</th>
                <th style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)',width:110}}>Amount (₹)</th>
                <th style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)',width:130}}>Date</th>
                <th style={{width:30}}></th>
              </tr>
            </thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.id} style={{borderTop:'1px solid var(--grey-50)'}}>
                  <td style={{padding:4}}>
                    <input className="form-input" style={{fontSize:11.5,padding:'5px 7px'}} value={r.name}
                      onChange={e => updateRow(r.id, 'name', e.target.value)} placeholder="e.g. Advance" />
                  </td>
                  <td style={{padding:4}}>
                    <input className="form-input font-mono" style={{fontSize:11.5,padding:'5px 7px'}} value={r.pct}
                      onChange={e => updateRow(r.id, 'pct', e.target.value)} placeholder="20" />
                  </td>
                  <td style={{padding:4}}>
                    <input className="form-input font-mono" style={{fontSize:11.5,padding:'5px 7px'}} value={r.amount}
                      onChange={e => updateRow(r.id, 'amount', e.target.value)} placeholder="0" />
                  </td>
                  <td style={{padding:4}}>
                    <input className="form-input" type="date" style={{fontSize:11.5,padding:'5px 7px'}} value={r.date}
                      onChange={e => updateRow(r.id, 'date', e.target.value)} />
                  </td>
                  <td style={{padding:4,textAlign:'center'}}>
                    <span onClick={() => removeRow(r.id)} style={{cursor:'pointer',color:'var(--red)',fontSize:14}}>✕</span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      <div className="flex items-center justify-between">
        <button type="button" onClick={addRow} className="btn btn-sm btn-outline">+ Add Payment Stage</button>
        {rows.length > 0 && (
          <span style={{fontSize:11,color: pctMismatch ? 'var(--red)' : 'var(--text-muted)',fontWeight: pctMismatch ? 600 : 400}}>
            Total: {pctTotal}% {pctMismatch && '⚠ should total 100%'} · {inr(amtTotal)}
          </span>
        )}
      </div>
    </div>
  );
}

const QUOTATIONS_COLLECTION = 'quotations';
const QUOTE_STAGES = ['Receipt of Quotation','Negotiation','Finalization of T&C','Issuing of PO/WO'];

function useQuotations() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(collection(db, QUOTATIONS_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, (snap) => {
        setItems(snap.docs.map(d => ({ docId: d.id, ...d.data() })));
        setLoading(false);
      }, (err) => { console.error('Quotations listener error', err); setLoading(false); });
      return unsub;
    }
    if (window.fb) { const unsub = start(); return () => unsub && unsub(); }
    let unsub;
    const handler = () => { unsub = start(); };
    window.addEventListener('firebase-ready', handler, { once: true });
    return () => { window.removeEventListener('firebase-ready', handler); if (unsub) unsub(); };
  }, []);
  return { items, loading };
}
async function addQuotation(data) {
  const { db, collection, addDoc } = window.fb;
  const ref = await addDoc(collection(db, QUOTATIONS_COLLECTION), { ...data, createdAt: Date.now() });
  return ref.id;
}
async function updateQuotation(docId, data) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(doc(db, QUOTATIONS_COLLECTION, docId), data);
}
async function deleteQuotation(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, QUOTATIONS_COLLECTION, docId));
}
async function clearAllQuotations() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(collection(db, QUOTATIONS_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

const STAGE_COLOR = { 'Receipt of Quotation':'blue', 'Negotiation':'amber', 'Finalization of T&C':'teal', 'Issuing of PO/WO':'green' };

function Quotations() {
  const { items, loading } = useQuotations();
  const [showNew, setShowNew] = useState(false);
  const [stageFilter, setStageFilter] = useState('all');
  const [issuingFor, setIssuingFor] = useState(null);
  const [viewSchedule, setViewSchedule] = useState(null);

  const filtered = stageFilter === 'all' ? items : items.filter(q => q.stage === stageFilter);
  const pipelineValue = items.filter(q => q.stage !== 'Issuing of PO/WO').reduce((s,q) => s + Number(q.value||0), 0);

  async function advanceStage(q) {
    const idx = QUOTE_STAGES.indexOf(q.stage);
    if (idx < QUOTE_STAGES.length - 2) {
      try { await updateQuotation(q.docId, { stage: QUOTE_STAGES[idx+1] }); }
      catch(e) { console.error(e); alert('Could not update stage.'); }
    } else if (idx === QUOTE_STAGES.length - 2) {
      setIssuingFor(q);
    }
  }

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Quotations</div>
          <div className="section-sub">{loading ? 'Loading from Firestore…' : `${items.length} quotation${items.length===1?'':'s'} · pipeline value ${inr(pipelineValue)}`}</div>
        </div>
        <div className="flex gap-2">
          <button className="btn btn-primary" onClick={() => setShowNew(true)}>+ New Quotation</button>

          <select className="form-input form-select" style={{width:200}} onChange={e=>setStageFilter(e.target.value)}>
            <option value="all">All Stages</option>
            {QUOTE_STAGES.map(s => <option key={s}>{s}</option>)}
          </select>
        </div>
      </div>
      <div className="card">
        {loading ? (
          <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
        ) : filtered.length === 0 ? (
          <div className="module-coming">
            <div className="big-icon">📋</div>
            <h3>No quotations yet</h3>
            <p className="text-muted">Add your first vendor quotation — enter the details and payment schedule manually.</p>
          </div>
        ) : (
          <table>
            <thead>
              <tr><th>Vendor</th><th>Description</th><th>Value</th><th>Received</th><th>Payment Schedule</th><th>Stage</th><th>Actions</th></tr>
            </thead>
            <tbody>
              {filtered.map(q => (
                <tr key={q.docId}>
                  <td className="fw-600">{q.vendorName}</td>
                  <td>{q.description || '—'}</td>
                  <td className="amount fw-600">{inr(q.value||0)}</td>
                  <td>{q.receivedDate || '—'}</td>
                  <td>
                    {q.paymentSchedule && q.paymentSchedule.length > 0 ? (
                      <span className="btn btn-sm btn-ghost" style={{cursor:'pointer'}} onClick={() => setViewSchedule(q)}>
                        {q.paymentSchedule.length} stage{q.paymentSchedule.length===1?'':'s'} · view
                      </span>
                    ) : <span className="text-muted text-sm">—</span>}
                  </td>
                  <td>
                    <span className={`badge ${STAGE_COLOR[q.stage]||'grey'}`}>{q.stage}</span>
                    {q.issuedPO && <div className="text-sm text-muted mono mt-1">{q.issuedPO}</div>}
                  </td>

        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={() => setViewSchedule(null)}>

                    </tr>

            <div style={{padding:'0 20px 16px',display:'flex',justifyContent:'flex-end'}}>
              <button onClick={() => setViewSchedule(null)} className="btn btn-ghost">Close</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function PaymentTracker() {
  const { items, loading } = useMilestones();
  const { items: pos } = usePurchaseOrders();
  const [showNew, setShowNew] = useState(false);

  const todayStr = new Date().toISOString().slice(0,10);
  const withStatus = items.map(m => {
    let status;
    if (m.paid) status = 'Paid';
    else if (m.due === todayStr) status = 'Due';
    else if (m.due < todayStr) status = 'Overdue';
    else status = 'Upcoming';
    const days = (status === 'Overdue' && m.due) ? Math.floor((new Date(todayStr) - new Date(m.due)) / 86400000) : 0;
    return { ...m, computedStatus: status, days };
  });

  const totalCollected = withStatus.filter(m => m.paid).reduce((s,m) => s + Number(m.amount||0), 0);
  const overdueTotal = withStatus.filter(m => m.computedStatus === 'Overdue').reduce((s,m) => s + Number(m.amount||0), 0);
  const next7 = new Date(Date.now() + 7*86400000).toISOString().slice(0,10);
  const dueWeekTotal = withStatus.filter(m => !m.paid && m.due >= todayStr && m.due <= next7).reduce((s,m) => s + Number(m.amount||0), 0);
  const next30 = new Date(Date.now() + 30*86400000).toISOString().slice(0,10);
  const upcoming30 = withStatus.filter(m => !m.paid && m.due > next7 && m.due <= next30).reduce((s,m) => s + Number(m.amount||0), 0);

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Payment Tracker</div>
          <div className="section-sub">{loading ? 'Loading from Firestore…' : `${items.length} milestone${items.length===1?'':'s'} · live data`}</div>
        </div>
        <div className="flex gap-2">
          <button className="btn btn-primary" onClick={() => setShowNew(true)}>+ New Milestone</button>
          <ClearCollectionButton label="Clear All Milestones" count={items.length} onClear={clearAllMilestones} />
        </div>
      </div>
      <div className="stats-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        <div className="stat-card"><div className="stat-label">Total Collected</div><div className="stat-value green">{inr(totalCollected)}</div></div>
        <div className="stat-card"><div className="stat-label">Overdue</div><div className="stat-value red">{inr(overdueTotal)}</div></div>
        <div className="stat-card"><div className="stat-label">Due This Week</div><div className="stat-value amber">{inr(dueWeekTotal)}</div></div>
        <div className="stat-card"><div className="stat-label">Upcoming 30 Days</div><div className="stat-value blue">{inr(upcoming30)}</div></div>
      </div>
      <div className="card">
        {loading ? (
          <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
        ) : withStatus.length === 0 ? (
          <div className="module-coming">
            <div className="big-icon">💳</div>
            <h3>No payment milestones yet</h3>
            <p className="text-muted">Add your first milestone — saved permanently to your database.</p>
          </div>
        ) : (
          <table>
            <thead>
              <tr><th>Milestone</th><th>%</th><th>Amount</th><th>Due Date</th><th>Status</th><th>PO #</th><th>WO #</th><th>Action</th></tr>
            </thead>
            <tbody>
              {withStatus.map(m => (
                <tr key={m.docId} className={m.computedStatus==='Overdue'?'overdue':m.computedStatus==='Due'?'due-today':''}>
                  <td className="fw-600">{m.name}</td>
                  <td>{m.pct}</td>
                  <td className="amount fw-600">{inr(m.amount||0)}</td>
                  <td>{m.due}{m.days > 0 && <span style={{color:'var(--red)',fontWeight:600}}> +{m.days}d</span>}</td>
                  <td><span className={`badge ${m.computedStatus==='Paid'?'green':m.computedStatus==='Overdue'?'red':m.computedStatus==='Due'?'amber':'blue'}`}>{m.computedStatus}</span></td>
                  <td className="mono">{m.po || '—'}</td>
                  <td className="mono">{m.wo || '—'}</td>
                  <td>
                    {!m.paid ? (
                      <div className="flex gap-2">
                        <button className="btn btn-sm btn-primary" onClick={() => markMilestonePaid(m.docId)}>Mark Paid</button>
                        <button className="btn btn-sm btn-ghost" onClick={() => { if(confirm('Delete this milestone?')) deleteMilestone(m.docId); }}>Delete</button>
                      </div>
                    ) : (
                      <span className="text-muted text-sm">✓ Received</span>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
      {showNew && <NewMilestoneModal onClose={() => setShowNew(false)} pos={pos} />}
    </div>
  );
}

// ─── Clear Data Card + Two-step modal ─────────────────
function ClearDataCard({ item }) {
  const [step, setStep] = useState(0); // 0=idle, 1=confirm, 2=type-verify
  const [typed, setTyped] = useState('');
  const [cleared, setCleared] = useState(false);
  const [working, setWorking] = useState(false);
  const CONFIRM_PHRASE = 'DELETE';

  const isAll = item.scope === 'all';
  const isWired = ['tasks','workorders','bills','cashflow','milestones','quotations','purchaseorders','vendors'].includes(item.scope);
  const cardBg = isAll ? '#FFF0F0' : '#FFFAFA';

  async function handleClear() {
    setWorking(true);
    try {
      if (item.scope === 'tasks') {
        await clearAllTasks();
      } else if (item.scope === 'workorders') {
        await clearAllWorkOrders();
      } else if (item.scope === 'bills') {
        await clearAllBills();
      } else if (item.scope === 'cashflow') {
        await clearCashFlowData();
      } else if (item.scope === 'milestones') {
        await clearAllMilestones();
      } else if (item.scope === 'quotations') {
        await clearAllQuotations();
      } else if (item.scope === 'purchaseorders') {
        await clearAllPOs();
      } else if (item.scope === 'vendors') {
        await clearAllVendors();
      } else if (item.scope === 'all') {
        await Promise.all([
          clearAllTasks(), clearAllWorkOrders(), clearCashFlowData(),
          clearAllMilestones(), clearAllQuotations(), clearAllPOs(), clearAllVendors()
        ]);
      }
      setCleared(true);
      setStep(0);
      setTyped('');
      setTimeout(() => setCleared(false), 3000);
    } catch (e) {
      console.error(e);
      alert('Could not clear data — check Firestore connection.');
    } finally {
      setWorking(false);
    }
  }

  function close() { setStep(0); setTyped(''); }

  return (
    <>
      <div style={{background:cardBg,border:'1px solid #FFCDD2',borderRadius:'var(--radius)',padding:'12px 14px',display:'flex',flexDirection:'column',gap:8}}>
        <div style={{fontWeight:600,fontSize:12.5,color:'var(--text)',display:'flex',alignItems:'center',gap:6}}>
          {item.label}
          {isWired
            ? <span style={{fontSize:9,fontWeight:700,color:'var(--green)',background:'var(--green-50)',padding:'1px 6px',borderRadius:8}}>LIVE</span>
            : <span style={{fontSize:9,fontWeight:700,color:'var(--text-muted)',background:'var(--grey-50)',padding:'1px 6px',borderRadius:8}}>MOCK</span>}
        </div>
        <div style={{fontSize:11.5,color:'var(--text-muted)',flex:1}}>{item.desc}</div>
        {cleared
          ? <div style={{fontSize:11.5,color:'var(--green)',fontWeight:600,display:'flex',alignItems:'center',gap:4}}>✓ Data cleared</div>
          : <button onClick={() => setStep(1)}
              style={{alignSelf:'flex-start',background:'transparent',border:`1px solid ${isAll?'var(--red)':'#EF9A9A'}`,color:'var(--red)',borderRadius:4,padding:'4px 12px',fontSize:11.5,fontWeight:600,cursor:'pointer'}}>
              {isAll ? '🗑 Reset Everything' : 'Clear'}
            </button>
        }
      </div>

      {/* Step 1 — Confirm intent */}
      {step === 1 && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={close}>
          <div style={{background:'var(--surface)',borderRadius:10,width:420,boxShadow:'0 8px 40px rgba(0,0,0,.22)',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
            <div style={{background:'var(--red)',padding:'14px 18px',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:20}}>🗑</span>
              <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>{item.label}</span>
            </div>
            <div style={{padding:'20px 20px 8px'}}>
              <div style={{fontSize:13,color:'var(--text)',marginBottom:10,lineHeight:1.6}}>
                You are about to <strong>permanently delete</strong> this data.<br/>
                {item.desc}<br/><br/>
                <span style={{color:'var(--red)',fontWeight:600}}>This action cannot be undone.</span>
              </div>
              <div style={{background:'var(--red-50)',border:'1px solid #FFCDD2',borderRadius:6,padding:'10px 12px',fontSize:12,color:'var(--red)',marginBottom:16}}>
                ⚠️ All records, history, and linked data in this section will be permanently erased from the system.
              </div>
            </div>
            <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button onClick={close} className="btn btn-ghost">Cancel</button>
              <button onClick={() => setStep(2)} style={{background:'var(--red)',color:'#fff',border:'none',borderRadius:4,padding:'7px 18px',fontWeight:600,fontSize:12.5,cursor:'pointer'}}>
                Yes, I want to delete →
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Step 2 — Type DELETE to confirm */}
      {step === 2 && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={close}>
          <div style={{background:'var(--surface)',borderRadius:10,width:440,boxShadow:'0 8px 40px rgba(0,0,0,.28)',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
            <div style={{background:'#B71C1C',padding:'14px 18px',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:20}}>⛔</span>
              <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>Final Confirmation Required</span>
            </div>
            <div style={{padding:'22px 22px 8px'}}>
              <div style={{fontSize:13,color:'var(--text)',marginBottom:16,lineHeight:1.7}}>
                To confirm deletion of <strong>{item.label}</strong>, type the word below exactly as shown:
              </div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:18,fontWeight:800,color:'var(--red)',letterSpacing:4,textAlign:'center',background:'var(--red-50)',padding:'10px',borderRadius:6,marginBottom:16,border:'1px dashed #EF9A9A'}}>
                {CONFIRM_PHRASE}
              </div>
              <input
                className="form-input font-mono"
                placeholder={`Type ${CONFIRM_PHRASE} to confirm`}
                value={typed}
                onChange={e => setTyped(e.target.value.toUpperCase())}
                autoFocus
                style={{fontSize:14,fontWeight:600,letterSpacing:2,textAlign:'center',
                  borderColor: typed === CONFIRM_PHRASE ? 'var(--red)' : typed.length > 0 ? '#EF9A9A' : 'var(--border)'}}
              />
              {typed.length > 0 && typed !== CONFIRM_PHRASE && (
                <div style={{fontSize:11.5,color:'var(--red)',marginTop:6,textAlign:'center'}}>Keep typing — must match exactly</div>
              )}
            </div>
            <div style={{padding:'16px 22px 22px',display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button onClick={close} className="btn btn-ghost" disabled={working}>Cancel</button>
              <button
                onClick={handleClear}
                disabled={typed !== CONFIRM_PHRASE || working}
                style={{background: typed === CONFIRM_PHRASE ? '#B71C1C' : '#BDBDBD',color:'#fff',border:'none',borderRadius:4,padding:'7px 20px',fontWeight:700,fontSize:12.5,cursor: typed === CONFIRM_PHRASE && !working ? 'pointer' : 'not-allowed',transition:'background .15s'}}>
                {working ? 'Deleting…' : '🗑 Delete Permanently'}
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

const REQ_COLLECTION = 'requisitions';
const REQ_STATUSES = ['Open','Quotations Invited','Quotation Approved','PO/WO Issued','Closed'];
const REQ_CATEGORIES = ['Materials','Services','Both'];
const REQ_PRIORITIES = ['Urgent','Normal','Low'];

function useRequisitions() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(collection(db, REQ_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, snap => {
        setItems(snap.docs.map(d => ({ docId: d.id, ...d.data() })));
        setLoading(false);
      }, err => { console.error('REQ listener', err); setLoading(false); });
      return unsub;
    }
    if (window.fb) { const u = start(); return () => u && u(); }
    let u; const h = () => { u = start(); };
    window.addEventListener('firebase-ready', h, { once: true });
    return () => { window.removeEventListener('firebase-ready', h); if (u) u(); };
  }, []);
  return { items, loading };
}
async function addRequisition(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(collection(db, REQ_COLLECTION), { ...data, createdAt: Date.now() });
}
async function updateRequisition(docId, data) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(doc(db, REQ_COLLECTION, docId), data);
}
async function deleteRequisition(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, REQ_COLLECTION, docId));
}
async function clearAllRequisitions() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(collection(db, REQ_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

function nextREQNumber(count) { return `REQ/${FY}/${String(count+1).padStart(3,'0')}`; }

// CROSS-REFERENCE VIEWER
// Search any document number → see the full chain
// ════════════════════════════════════════════════════
function CrossReference() {
  const { items: reqs } = useRequisitions();
  const { items: quotes } = useQuotations();
  const { items: pos } = usePurchaseOrders();
  const { items: wos } = useWorkOrders();
  const { items: milestones } = useMilestones();
  const [search, setSearch] = useState('');
  const [result, setResult] = useState(null);

  function findChain(query) {
    const q = query.trim().toUpperCase();
    if (!q) { setResult(null); return; }

    // Find starting point — could be REQ, QUOT, PO, WO
    let chain = { query: q, req: null, quotations: [], approvedQuote: null, po: null, wo: null, milestones: [] };

    // Try match as REQ
    const req = reqs.find(r => (r.req||'').toUpperCase().includes(q));
    if (req) {
      chain.req = req;
      chain.quotations = quotes.filter(qt => qt.linkedReq === req.docId || qt.linkedReq === req.req);
      chain.approvedQuote = chain.quotations.find(qt => qt.approved);
      if (chain.approvedQuote) {
        chain.po = pos.find(p => p.linkedQuotation === chain.approvedQuote.docId);
        chain.wo = wos.find(w => w.linkedQuotation === chain.approvedQuote.docId);
      }
    }
    // Try as QUOT
    if (!chain.req) {
      const qt = quotes.find(qt => (qt.quotNo||'').toUpperCase().includes(q) || (qt.vendorName||'').toUpperCase().includes(q));
      if (qt) {
        chain.approvedQuote = qt.approved ? qt : null;
        chain.quotations = [qt];
        chain.req = reqs.find(r => r.docId === qt.linkedReq || r.req === qt.linkedReq);
        chain.po = pos.find(p => p.linkedQuotation === qt.docId);
        chain.wo = wos.find(w => w.linkedQuotation === qt.docId);
      }
    }
    // Try as PO
    if (!chain.req && !chain.quotations.length) {
      const po = pos.find(p => (p.po||'').toUpperCase().includes(q));
      if (po) {
        chain.po = po;
        const qt = quotes.find(qt => qt.docId === po.linkedQuotation);
        if (qt) { chain.quotations = [qt]; chain.approvedQuote = qt.approved ? qt : null; chain.req = reqs.find(r=>r.docId===qt.linkedReq); }
      }
    }
    // Try as WO
    if (!chain.req && !chain.quotations.length && !chain.po) {
      const wo = wos.find(w => (w.wo||'').toUpperCase().includes(q));
      if (wo) {
        chain.wo = wo;
        const qt = quotes.find(qt => qt.docId === wo.linkedQuotation);
        if (qt) { chain.quotations = [qt]; chain.approvedQuote = qt.approved ? qt : null; chain.req = reqs.find(r=>r.docId===qt.linkedReq); }
      }
    }

    if (chain.po) chain.milestones = milestones.filter(m => m.po === chain.po.po);
    setResult(chain);
  }

  const ChainStep = ({ icon, color, label, number, details, found }) => (
    <div style={{display:'flex',gap:0,alignItems:'stretch'}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',width:40,flexShrink:0}}>
        <div style={{width:32,height:32,borderRadius:'50%',background:found?color:'var(--grey-50)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,border:`2px solid ${found?color:'var(--border)'}`}}>
          {found ? icon : '○'}
        </div>
        <div style={{flex:1,width:2,background:'var(--border)',margin:'2px 0'}} />
      </div>
      <div style={{flex:1,paddingBottom:16,paddingLeft:10}}>
        <div style={{fontSize:11,fontWeight:700,color:found?color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:.5}}>{label}</div>
        {found && number && <div className="font-mono" style={{fontSize:12,fontWeight:700,color:'var(--text)',marginTop:2}}>{number}</div>}
        {found && details && <div style={{fontSize:11.5,color:'var(--text-muted)',marginTop:2}}>{details}</div>}
        {!found && <div style={{fontSize:11.5,color:'var(--text-muted)',marginTop:2}}>Not found</div>}
      </div>
    </div>
  );

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Cross-Reference</div>
          <div className="section-sub">Trace any document through the full procurement chain</div>
        </div>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div className="card-body">
          <div className="flex gap-2 items-center">
            <div className="search-wrap" style={{flex:1}}>
              <span className="search-icon">🔍</span>
              <input className="form-input" value={search}
                onChange={e=>setSearch(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&findChain(search)}
                placeholder="Type a REQ, QUOT, PO, WO number or vendor name…" style={{maxWidth:440}} />
            </div>
            <button className="btn btn-primary" onClick={()=>findChain(search)}>Trace</button>
            {result && <button className="btn btn-ghost" onClick={()=>{setResult(null);setSearch('');}}>Clear</button>}
          </div>
        </div>
      </div>

      {result && (
        <div className="card">
          <div className="card-header">
            <span className="card-title">Procurement Chain — "{result.query}"</span>
          </div>
          <div className="card-body" style={{padding:'20px 24px'}}>

function usePermSettings() {
  const [perms, setPerms] = useState(DEFAULT_PERMISSIONS);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    function start() {
      const { db, doc, onSnapshot } = window.fb;
      const unsub = onSnapshot(doc(db, 'settings', 'permissions'), snap => {
        if (snap.exists()) setPerms(s => ({ ...DEFAULT_PERMISSIONS, ...snap.data() }));
        setLoading(false);
      }, () => setLoading(false));
      return unsub;
    }
    if (window.fb) { const u = start(); return () => u && u(); }
    let u; const h = () => { u = start(); };
    window.addEventListener('firebase-ready', h, { once: true });
    return () => { window.removeEventListener('firebase-ready', h); if (u) u(); };
  }, []);

  async function savePerms(newPerms) {
    const { db, doc, setDoc } = window.fb;
    await setDoc(doc(db, 'settings', 'permissions'), newPerms, { merge: true });
  }

  return { perms, setPerms, savePerms, loading };
}

function PermissionMatrix({ currentUser }) {
  const { perms, setPerms, savePerms } = usePermSettings();
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  function toggle(role, action) {
    if (role === 'owner') return; // owner always has all permissions
    setPerms(p => ({ ...p, [role]: { ...(p[role]||{}), [action]: !(p[role]||{})[action] } }));
  }

  async function handleSave() {
    setSaving(true);
    try { await savePerms(perms); setSaved(true); setTimeout(()=>setSaved(false),2000); }
    catch(e) { console.error(e); alert('Could not save permissions.'); }
    finally { setSaving(false); }
  }

  return (
    <div className="card">
      <div className="card-header">
        <span className="card-title">Role & Permission Matrix</span>
        <PermGate user={currentUser} action="edit_settings">
          <button className="btn btn-sm btn-primary" onClick={handleSave} disabled={saving}>
            {saving?'Saving…':saved?'✓ Saved':'Save Permissions'}
          </button>
        </PermGate>
      </div>
      <div className="card-body" style={{overflowX:'auto'}}>
        <table style={{width:'100%',minWidth:600}}>
          <thead>
            <tr>
              <th style={{textAlign:'left',fontSize:11,color:'var(--text-muted)',padding:'6px 10px',width:200}}>Action</th>
              {ROLES.map(r=>(
                <th key={r.key} style={{textAlign:'center',fontSize:11,color:'var(--text-muted)',padding:'6px 10px'}}>
                  {r.label}
                  {r.key==='owner'&&<div style={{fontSize:9,color:'var(--primary)'}}>all access</div>}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {ACTIONS.map(a=>(
              <tr key={a.key} style={{borderTop:'1px solid var(--grey-50)'}}>
                <td style={{fontSize:12.5,padding:'8px 10px',color:'var(--text)'}}>{a.label}</td>
                {ROLES.map(r=>{
                  const granted = r.key==='owner' ? true : !!(perms[r.key]||{})[a.key];
                  return (
                    <td key={r.key} style={{textAlign:'center',padding:'8px 10px'}}>
                      <div onClick={()=>toggle(r.key,a.key)} style={{
                        width:36,height:20,borderRadius:10,margin:'0 auto',cursor:r.key==='owner'?'not-allowed':'pointer',
                        background:granted?'var(--green)':'var(--border)',position:'relative',transition:'background .15s'
                      }}>
                        <div style={{
                          position:'absolute',top:2,left:granted?18:2,width:16,height:16,borderRadius:'50%',
                          background:'#fff',transition:'left .15s',boxShadow:'0 1px 3px rgba(0,0,0,.2)'
                        }} />
                      </div>
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{fontSize:11,color:'var(--text-muted)',marginTop:10}}>Owner always has full access — cannot be restricted.</div>
      </div>
    </div>
  );
}
