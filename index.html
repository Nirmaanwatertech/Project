<script type="text/babel" data-presets="react">
/* @jsxRuntime classic */
const { useState, useEffect, useRef } = React;

// ─── Formatters ───────────────────────────────────────
const inr = (n) => '₹' + Number(n).toLocaleString('en-IN');

// Format YYYY-MM-DD → DD-MM-YYYY for display
function fmt(dateStr) {
  if (!dateStr) return '—';
  const parts = String(dateStr).split('-');
  if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
  return dateStr;
}

// ─── Firestore path helpers ────────────────────────────
// All data lives under users/{uid}/{collection} — matches where
// Firestore Console placed it when collections were created inside the user doc.
// These helpers resolve the correct path for every read/write operation.

function getUserUID() {
  if (window.fb?.auth?.currentUser?.uid) return window.fb.auth.currentUser.uid;
  return window.currentUser?.uid || null;
}

// Data is at ROOT level in Firestore — not under users/{uid}
// userCol and userDoc simply reference root collections directly
function userCol(colName) {
  const { db, collection } = window.fb;
  return collection(db, colName);
}

function userDoc(colName, docId) {
  const { db, doc } = window.fb;
  return doc(db, colName, docId);
}

// ─── Projects ─────────────────────────────────────────
const PROJECTS = ['Pontoon', 'WTP', 'Both'];
const PROJECT_COLOR = { 'Pontoon': 'blue', 'WTP': 'teal', 'Both': 'grey' };

// ─── Configurable Lists ───────────────────────────────
const DEFAULT_LISTS = {
  employees:      ['Neer','Manav','Vikram Singh','Amardeep Singh','Pritesh','Hardik','Kushan'],
  pettyCategories:['Auto / Fuel','Tea & Snacks','Courier','Stationery','Site Travel','Minor Hardware','Telephone / Recharge','Printing','Bank Charges','Miscellaneous'],
  billCategories: ['Vendor','Fixed','Professional','Utilities','Logistics','GST/Govt'],
  expenseCategories: ['Office Rent','Salaries','Professional Fees','Bank Charges','Software / Subscriptions','Travel & Accommodation','Utilities','Equipment Purchase','Maintenance','Miscellaneous'],
  paymentModes:   ['NEFT','RTGS','Cheque','Cash','UPI','Other'],
  capitalTypes:   ['Investor Fund','Bank Loan','Overdraft','Owner Capital Injection','Grant','Other'],
  reqCategories:  ['Materials','Services','Both'],
  reqPriorities:  ['Urgent','Normal','Low'],
};

window.appLists = { ...DEFAULT_LISTS };

function useLists() {
  const [lists, setLists] = useState(window.appLists);
  useEffect(() => {
    function start() {
      const { db, doc, onSnapshot } = window.fb;
      const unsub = onSnapshot(doc(db, 'settings', 'lists'), snap => {
        if (snap.exists()) {
          const merged = { ...DEFAULT_LISTS, ...snap.data() };
          window.appLists = merged;
          setLists(merged);
        }
      }, err => console.error('Lists listener', err));
      return unsub;
    }
    if (window.fb) { const u = start(); return () => u && u(); }
    let u; const h = () => { u = start(); };
    window.addEventListener('firebase-ready', h, { once: true });
    return () => { window.removeEventListener('firebase-ready', h); if (u) u(); };
  }, []);
  return lists;
}

async function saveLists(newLists, oldLists) {
  const { db, doc, setDoc, getDocs, writeBatch } = window.fb;

  await setDoc(doc(db, 'settings', 'lists'), newLists, { merge: true });
  window.appLists = { ...window.appLists, ...newLists };

  if (!oldLists) return 0;

  const FIELD_MAP = {
    paymentModes:      [{ col:'bills', field:'paymentMode' }, { col:'advances', field:'paymentMode' }, { col:'expenses', field:'paymentMode' }, { col:'capital_loans', field:'paymentMode' }],
    pettyCategories:   [{ col:'petty_cash', field:'category' }],
    billCategories:    [{ col:'bills', field:'category' }],
    expenseCategories: [{ col:'expenses', field:'category' }],
    employees:         [{ col:'petty_cash', field:'paidBy' }, { col:'expenses', field:'paidBy' }],
    capitalTypes:      [{ col:'capital_loans', field:'type' }],
  };

  let totalMigrated = 0;
  const listKeys = Object.keys(FIELD_MAP);

  for (let ki = 0; ki < listKeys.length; ki++) {
    const listKey = listKeys[ki];
    const targets = FIELD_MAP[listKey];
    const oldItems = oldLists[listKey] || [];
    const newItems = newLists[listKey] || [];
    const renames = {};

    if (oldItems.length === newItems.length) {
      oldItems.forEach((oldVal, i) => { if (oldVal !== newItems[i]) renames[oldVal] = newItems[i]; });
    } else {
      const removed = oldItems.filter(v => !newItems.includes(v));
      const added   = newItems.filter(v => !oldItems.includes(v));
      removed.forEach((v, i) => { if (added[i]) renames[v] = added[i]; });
    }

    if (!Object.keys(renames).length) continue;

    for (let ti = 0; ti < targets.length; ti++) {
      const { col, field } = targets[ti];
      try {
        const snap = await getDocs(userCol(col));
        const toUpdate = snap.docs.filter(d => renames[d.data()[field]]);
        if (!toUpdate.length) continue;
        for (let i = 0; i < toUpdate.length; i += 500) {
          const batch = writeBatch(db);
          toUpdate.slice(i, i + 500).forEach(d => batch.update(d.ref, { [field]: renames[d.data()[field]] }));
          await batch.commit();
          totalMigrated += Math.min(500, toUpdate.length - i);
        }
      } catch(e) { console.warn('Migration skipped for', col, field, e.message); }
    }
  }
  return totalMigrated;
}

  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [savedMsg, setSavedMsg] = useState('✓ Saved');
  const [dragging, setDragging] = useState(null);
  const [dragTarget, setDragTarget] = useState(null);
  const [editingItem, setEditingItem] = useState(null); // { listKey, idx }
  const [editValue, setEditValue] = useState('');

  useEffect(() => { setLocalLists({ ...lists }); }, [JSON.stringify(lists)]);

  if (!localLists) return <div style={{padding:16,color:'var(--text-muted)',fontSize:12}}>Loading lists…</div>;

  function removeItem(listKey, idx) {
    setLocalLists(l => ({ ...l, [listKey]: l[listKey].filter((_,i) => i !== idx) }));
  }

  function addItem(listKey) {
    const val = (newItems[listKey] || '').trim();
    if (!val) return;
    if (localLists[listKey].map(s=>s.toLowerCase()).includes(val.toLowerCase())) return;
    setLocalLists(l => ({ ...l, [listKey]: [...l[listKey], val] }));
    setNewItems(n => ({ ...n, [listKey]: '' }));
  }

  function startEdit(listKey, idx) {
    setEditingItem({ listKey, idx });
    setEditValue(localLists[listKey][idx]);
  }

  function commitEdit() {
    if (!editingItem) return;
    const val = editValue.trim();
    if (val) {
      setLocalLists(l => ({
        ...l,
        [editingItem.listKey]: l[editingItem.listKey].map((item, i) =>
          i === editingItem.idx ? val : item
        )
      }));
    }
    setEditingItem(null);
    setEditValue('');
  }

  function onDragStart(listKey, idx) { setDragging({ listKey, idx }); }
  function onDragEnter(listKey, idx) { setDragTarget({ listKey, idx }); }
  function onDragEnd(listKey) {
    if (!dragging || !dragTarget) { setDragging(null); setDragTarget(null); return; }
    if (dragging.listKey !== listKey || dragging.idx === dragTarget.idx) { setDragging(null); setDragTarget(null); return; }
    setLocalLists(l => {
      const arr = [...l[listKey]];
      const [moved] = arr.splice(dragging.idx, 1);
      arr.splice(dragTarget.idx, 0, moved);
      return { ...l, [listKey]: arr };
    });
    setDragging(null); setDragTarget(null);
  }

  async function handleSave() {
    setSaving(true);
    try {
      const migrated = await saveLists(localLists, lists);
      setSaved(true);
      if (migrated > 0) {
        setTimeout(() => setSaved(false), 4000);
        setSavedMsg(`✓ Saved · ${migrated} existing entr${migrated===1?'y':'ies'} updated`);
      } else {
        setSavedMsg('✓ Saved');
        setTimeout(() => setSaved(false), 2000);
      }
    }
    catch(e) { console.error(e); alert('Could not save.'); }
    finally { setSaving(false); }
  }

    { key: 'capitalTypes',      label: '🏦 Capital / Loan Types',     desc: 'Capital & Loans type selector' },
  ];

  return (
    <div className="card">
      <div className="card-header" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span className="card-title">Lists Manager</span>
        <button className="btn btn-sm btn-primary" onClick={handleSave} disabled={saving}>
          {saving ? 'Saving & migrating…' : saved ? savedMsg : 'Save All Changes'}
        </button>
      </div>
      <div className="card-body">
        <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:16}}>
          ☰ drag to reorder · ✏ click name to rename · × to remove · Enter to add
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          {SECTIONS.map(sec => (
            <div key={sec.key} style={{border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
              <div style={{background:'var(--grey-50)',padding:'8px 12px',borderBottom:'1px solid var(--border)'}}>
                <div style={{fontWeight:700,fontSize:12.5}}>{sec.label}</div>
                <div style={{fontSize:10.5,color:'var(--text-muted)',marginTop:1}}>{sec.desc}</div>
              </div>
              <div style={{padding:'8px 12px'}}>
                <div style={{marginBottom:8}}>
                  {localLists[sec.key].length === 0 && (
                    <div style={{fontSize:11.5,color:'var(--text-muted)',padding:'6px 0'}}>No items — add one below.</div>
                  )}
                  {localLists[sec.key].map((item, idx) => {
                    const isEditing = editingItem?.listKey === sec.key && editingItem?.idx === idx;
                    return (
                      <div key={idx} draggable={!isEditing}

                          borderBottom:'1px solid var(--grey-50)',borderRadius:4,
                          background: dragging?.listKey===sec.key&&dragging?.idx===idx?'var(--primary-50)':
                                      dragTarget?.listKey===sec.key&&dragTarget?.idx===idx?'var(--grey-50)':'',
                          opacity: dragging?.listKey===sec.key&&dragging?.idx===idx?0.5:1}}>
                        {/* Drag handle */}
                        <span style={{color:'var(--text-muted)',fontSize:12,cursor:'grab',flexShrink:0}}>☰</span>

// Aggregates all vendor/payee names from every collection for autocomplete
function useKnownNames() {
  const [names, setNames] = useState({ vendors:[], payees:[], clients:[] });

  useEffect(() => {
    function start() {
      const { db, collection, getDocs } = window.fb;
      async function load() {
        try {
          const [bills, advances, pos, wos, quotes, petty, capital] = await Promise.all([
            getDocs(userCol('bills')),
            getDocs(userCol('advances')),
            getDocs(userCol('purchaseorders')),
            getDocs(userCol('workorders')),
            getDocs(userCol('quotations')),
            getDocs(userCol('petty_cash')),
            getDocs(userCol('capital_loans')),
          ]);

          const vendorNames = [
            ...pos.docs.map(d=>d.data().vendorName),
            ...wos.docs.map(d=>d.data().vendorName),
            ...quotes.docs.map(d=>d.data().vendorName),
            ...advances.docs.map(d=>d.data().vendor),
          ].filter(Boolean);

          const payeeNames = [
            ...bills.docs.map(d=>d.data().payee),
            ...advances.docs.map(d=>d.data().vendor),
            ...petty.docs.map(d=>d.data().paidBy),
          ].filter(Boolean);

          const clientNames = [].filter(Boolean);

          const capitalSources = capital.docs.map(d=>d.data().source).filter(Boolean);

          setNames({
            vendors: [...new Set(vendorNames)].sort(),
            payees:  [...new Set(payeeNames)].sort(),
            clients: [...new Set(clientNames)].sort(),
            capital: [...new Set(capitalSources)].sort(),
          });
        } catch(e) { console.error('useKnownNames error', e); }
      }
      load();
    }
    if (window.fb) start();
    else window.addEventListener('firebase-ready', start, { once: true });
  }, []);

  return names;
}

// ─── Reusable Components ──────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  componentDidCatch(e, info) { console.error('Module error:', e, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:32,textAlign:'center'}}>
          <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
          <div style={{fontWeight:700,fontSize:14,color:'var(--red)',marginBottom:8}}>Something went wrong in this module</div>
          <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:16,fontFamily:'var(--font-mono)'}}>{this.state.error.message}</div>
          <button className="btn btn-primary" onClick={()=>this.setState({error:null})}>Try Again</button>
        </div>
      );
    }
    return this.props.children;
  }
}

// ─── Autocomplete Input ───────────────────────────────
// Reusable: shows dropdown of past values as you type
// suggestions = array of strings from existing Firestore data
function AutocompleteInput({ value, onChange, suggestions, placeholder, className, style }) {
  const [open, setOpen] = useState(false);
  const [filtered, setFiltered] = useState([]);
  const ref = useRef(null);

  useEffect(() => {
    function handleClick(e) {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  function handleChange(e) {
    const val = e.target.value;
    onChange(val);
    if (val.trim().length > 0) {
      const q = val.toLowerCase();
      const matches = [...new Set(suggestions.filter(s => s && s.toLowerCase().includes(q) && s.toLowerCase() !== q))].slice(0, 8);
      setFiltered(matches);
      setOpen(matches.length > 0);
    } else {
      // Show all suggestions when field is focused but empty
      const all = [...new Set(suggestions.filter(Boolean))].slice(0, 8);
      setFiltered(all);
      setOpen(all.length > 0);
    }
  }

  function handleFocus() {
    if (!value || value.trim() === '') {
      const all = [...new Set(suggestions.filter(Boolean))].slice(0, 8);
      setFiltered(all);
      setOpen(all.length > 0);
    }
  }

  function handleSelect(s) {
    onChange(s);
    setOpen(false);
  }

  return (
    <div ref={ref} style={{position:'relative'}}>
      <input
        className={className || 'form-input'}
        style={style}
        value={value}
        onChange={handleChange}
        onFocus={handleFocus}
        placeholder={placeholder}
        autoComplete="off"
      />
      {open && filtered.length > 0 && (
        <div style={{
          position:'absolute', top:'100%', left:0, right:0, zIndex:2000,
          background:'var(--surface)', border:'1px solid var(--border)',
          borderRadius:'0 0 6px 6px', boxShadow:'0 4px 12px rgba(0,0,0,.12)',
          maxHeight:200, overflowY:'auto'
        }}>
          {filtered.map((s, i) => (
            <div key={i} onMouseDown={() => handleSelect(s)}
              style={{padding:'7px 12px', fontSize:12.5, cursor:'pointer', borderTop: i>0?'1px solid var(--grey-50)':'none',
                display:'flex', alignItems:'center', gap:8}}
              onMouseEnter={e=>e.currentTarget.style.background='var(--primary-50)'}
              onMouseLeave={e=>e.currentTarget.style.background=''}>
              <span style={{color:'var(--text-muted)',fontSize:11}}>↩</span>
              {s}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ClearDataCard({ item }) {
  const isWired = ['tasks','workorders','bills','cashflow','milestones','quotations','purchaseorders','pettycash','expenses'].includes(item.scope);
  const [step, setStep] = useState(0);
  const [typed, setTyped] = useState('');
  const [working, setWorking] = useState(false);
  const [cleared, setCleared] = useState(false);

  async function handleClear() {
    setWorking(true);
    try {
      if (item.scope==='tasks')              await clearAllTasks();
      else if (item.scope==='workorders')    await clearAllWorkOrders();
      else if (item.scope==='bills')         await Promise.all([clearAllBills(), clearAllAdvances()]);
      else if (item.scope==='cashflow')      await clearCashFlowData();
      else if (item.scope==='milestones')    await clearAllMilestones();
      else if (item.scope==='quotations')    await clearAllQuotations();
      else if (item.scope==='purchaseorders') await clearAllPOs();
      else if (item.scope==='pettycash')     await clearAllPettyCash();
      else if (item.scope==='expenses')      await clearAllExpenses();
      else if (item.scope==='all') {
        await Promise.all([clearAllTasks(), clearAllWorkOrders(), clearCashFlowData(),
          clearAllMilestones(), clearAllQuotations(), clearAllPOs(),
          clearAllBills(), clearAllAdvances(), clearAllPettyCash(), clearAllExpenses()]);
      }
      setCleared(true); setStep(0); setTyped('');
    } catch(e) { console.error(e); alert('Could not clear data.'); }
    finally { setWorking(false); }
  }

  return (
    <div style={{background:'var(--surface)',border:'1px solid #FFCDD2',borderRadius:8,padding:'14px 16px'}}>
      <div style={{fontWeight:600,fontSize:12.5,marginBottom:4}}>{item.label}</div>
      <div style={{fontSize:11.5,color:'var(--text-muted)',marginBottom:10}}>{item.desc}</div>
      {cleared && <div style={{fontSize:11.5,color:'var(--green)',marginBottom:8}}>✓ Cleared</div>}
      {!isWired ? (
        <span style={{fontSize:11,color:'var(--text-muted)'}}>Coming soon</span>
      ) : step===0 ? (
        <button onClick={()=>setStep(1)} className="btn btn-sm" style={{background:'#FFEBEE',color:'var(--red)',border:'1px solid #FFCDD2'}}>Clear →</button>
      ) : (
        <div>
          <div style={{fontSize:11.5,color:'var(--red)',marginBottom:6}}>Type DELETE to confirm:</div>
          <div style={{display:'flex',gap:6}}>
            <input className="form-input font-mono" style={{fontSize:12,width:100}} value={typed}
              onChange={e=>setTyped(e.target.value.toUpperCase())} placeholder="DELETE" />
            <button onClick={handleClear} disabled={typed!=='DELETE'||working}
              style={{background:typed==='DELETE'?'var(--red)':'#BDBDBD',color:'#fff',border:'none',borderRadius:4,padding:'6px 12px',fontSize:12,cursor:'pointer'}}>
              {working?'…':'Confirm'}
            </button>
            <button onClick={()=>{setStep(0);setTyped('');}} className="btn btn-sm btn-ghost">Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── PaymentScheduleEditor ────────────────────────────
function PaymentScheduleEditor({ rows, setRows, totalValue }) {
  function addRow() { setRows(r=>[...r,{id:genRowId(),name:'',pct:'',amount:'',date:''}]); }
  function removeRow(id) { setRows(r=>r.filter(x=>x.id!==id)); }
  function updateRow(id,field,value) {
    setRows(r=>r.map(x=>{
      if(x.id!==id) return x;
      const next={...x,[field]:value};
      if(field==='pct'&&totalValue) next.amount=String(Math.round((parseFloat(value)||0)/100*Number(totalValue)));
      if(field==='amount'&&totalValue&&Number(totalValue)>0) next.pct=String(Math.round((Number(value)||0)/Number(totalValue)*100));
      return next;
    }));
  }
  const total = rows.reduce((s,r)=>s+(parseFloat(r.pct)||0),0);
  return (
    <div className="form-group">
      <label className="form-label">Payment Schedule <span style={{color:'var(--text-muted)',fontWeight:400,fontSize:11}}>(optional)</span></label>
      {rows.length>0 && (
        <div style={{border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',marginBottom:8}}>
          <table style={{width:'100%'}}>
            <thead><tr style={{background:'var(--grey-50)'}}>
              {['Stage','%','Amount (₹)','Date',''].map((h,i)=><th key={i} style={{fontSize:10,padding:'5px 8px',textAlign:'left',color:'var(--text-muted)'}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {rows.map(r=>(
                <tr key={r.id} style={{borderTop:'1px solid var(--grey-50)'}}>
                  <td style={{padding:3}}><input className="form-input" style={{fontSize:11.5,padding:'4px 6px'}} value={r.name} onChange={e=>updateRow(r.id,'name',e.target.value)} placeholder="e.g. Advance" /></td>
                  <td style={{padding:3,width:60}}><input className="form-input font-mono" style={{fontSize:11.5,padding:'4px 6px'}} value={r.pct} onChange={e=>updateRow(r.id,'pct',e.target.value)} placeholder="30" /></td>
                  <td style={{padding:3,width:110}}><input className="form-input font-mono" style={{fontSize:11.5,padding:'4px 6px'}} value={r.amount} onChange={e=>updateRow(r.id,'amount',e.target.value)} placeholder="0" /></td>
                  <td style={{padding:3,width:130}}><input className="form-input" type="date" style={{fontSize:11.5,padding:'4px 6px'}} value={r.date} onChange={e=>updateRow(r.id,'date',e.target.value)} /></td>
                  <td style={{padding:3,textAlign:'center',width:24}}><span onClick={()=>removeRow(r.id)} style={{cursor:'pointer',color:'var(--red)',fontSize:14}}>✕</span></td>
                </tr>
              ))}
            </tbody>
          </table>
          {total>0&&<div style={{padding:'4px 8px',fontSize:11,color:Math.abs(total-100)<1?'var(--green)':'var(--amber)',background:'var(--grey-50)'}}>Total: {total}%{Math.abs(total-100)<1?' ✓':' (should total 100%)'}</div>}
        </div>
      )}
      <button type="button" onClick={addRow} className="btn btn-sm btn-outline">+ Add Stage</button>
    </div>
  );
}

// ─── IssuePOModal — from approved quotation ───────────
function IssuePOModal({ quotation, onClose, onIssued }) {
  const knownNames = useKnownNames();
  const [form, setForm] = useState({
    po: '', vendorName: quotation?.vendorName||'',
    description: quotation?.description||'',
    value: quotation?.value ? String(quotation.value) : '',
    linkedQuotation: quotation?.docId||'',
    stage: 'Draft',
    project: quotation?.project||''
  });
  const [schedule, setSchedule] = useState(quotation?.paymentSchedule ? quotation.paymentSchedule.map(r=>({...r,id:genRowId()})) : []);
  const [saving, setSaving] = useState(false);
  function set(f,v){setForm(s=>({...s,[f]:v}));}

  async function handleIssue() {
    if (!form.vendorName.trim()||!form.value) return;
    setSaving(true);
    try {
      const { addDoc, updateDoc } = window.fb;
      // Create PO
      await addDoc(userCol(PO_COLLECTION), {...form, value:Number(form.value), paymentSchedule:schedule, createdAt:Date.now()});
      // Mark quotation as issued
      await updateDoc(userDoc(QUOTATIONS_COLLECTION, quotation.docId), {stage:'Finalized', issued:true});
      onIssued && onIssued();
    } catch(e){ console.error(e); alert('Could not issue PO.'); }
    finally{ setSaving(false); }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'var(--surface)',borderRadius:10,width:580,maxHeight:'90vh',overflowY:'auto',boxShadow:'0 8px 40px rgba(0,0,0,.22)'}} onClick={e=>e.stopPropagation()}>

          <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>Issue Purchase Order from Quotation</span>
        </div>
        <div style={{padding:'18px 20px'}}>
          <div style={{background:'var(--green-50)',border:'1px solid #C8E6C9',borderRadius:6,padding:'8px 12px',fontSize:12,marginBottom:14}}>
            Issuing PO against: <strong>{quotation?.vendorName}</strong> · {inr(quotation?.value||0)}
          </div>
          <div className="form-group">
            <label className="form-label">PO Number</label>
            <input className="form-input font-mono" value={form.po} onChange={e=>set('po',e.target.value)} placeholder="NWTS/PO/2026-27/001" />
          </div>
          <div className="form-group">
            <label className="form-label">Vendor Name</label>
            <AutocompleteInput value={form.vendorName} onChange={v=>set('vendorName',v)} suggestions={knownNames.vendors} />
          </div>
          <div className="form-group">
            <label className="form-label">Description</label>
            <input className="form-input" value={form.description} onChange={e=>set('description',e.target.value)} />
          </div>
          <div className="form-group">
            <label className="form-label">Value (₹)</label>
            <input className="form-input font-mono" value={form.value} onChange={e=>set('value',e.target.value)} />
          </div>

          <ProjectSelect value={form.project} onChange={v=>set('project',v)} split={form.split} onSplitChange={v=>set('split',v)} />
        </div>
        <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={handleIssue} disabled={saving||!form.vendorName.trim()||!form.value} className="btn btn-primary"
            style={{background:'var(--green)',opacity:saving||!form.vendorName.trim()||!form.value?.6:1}}>

  );

// ─── NewMilestoneModal ────────────────────────────────
function NewMilestoneModal({ onClose, pos, existing }) {

// ─── PaymentTracker ───────────────────────────────────
function PaymentTracker() {
  const { items, loading } = useMilestones();
  const { items: pos } = usePurchaseOrders();
  const [showNew, setShowNew] = useState(false);
  const [editMilestone, setEditMilestone] = useState(null);
  const [filter, setFilter] = useState('all');
  const [sortBy, setSortBy] = useState('date_desc');
  const [msProjectFilter, setMsProjectFilter] = useState('all');
  const [msMonthFilter, setMsMonthFilter] = useState('all');

  const today = new Date().toISOString().slice(0,10);
  const withStatus = items.map(m => {
    let status;
    if (m.paid) status = 'Paid';
    else if (m.due < today) status = 'Overdue';
    else if (m.due === today) status = 'Due Today';
    else status = 'Upcoming';
    return {...m, computedStatus: status};
  });
  const msMonths = [...new Set(items.map(m=>m.due?.slice(0,7)).filter(Boolean))].sort().reverse();
  const filtered = (filter==='all' ? [...withStatus] : withStatus.filter(m=>m.computedStatus===filter)).filter(m=>
    (msProjectFilter==='all'||m.project===msProjectFilter) &&
    (msMonthFilter==='all'||(m.due||'').startsWith(msMonthFilter))
  ).sort((a,b)=>sortBy==='date_asc'?(a.due||'').localeCompare(b.due||''):sortBy==='amount_desc'?Number(b.amount||0)-Number(a.amount||0):sortBy==='amount_asc'?Number(a.amount||0)-Number(b.amount||0):(b.due||'').localeCompare(a.due||''));
  const totalDue = items.filter(m=>!m.paid).reduce((s,m)=>s+Number(m.amount||0),0);
  const totalPaid = items.filter(m=>m.paid).reduce((s,m)=>s+Number(m.amount||0),0);
  const overdueAmt = withStatus.filter(m=>m.computedStatus==='Overdue').reduce((s,m)=>s+Number(m.amount||0),0);
  const MS_STATUS_COLOR = {Paid:'green',Overdue:'red','Due Today':'amber',Upcoming:'blue'};

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Payment Tracker</div>
          <div className="section-sub">{loading?'Loading…':`${items.length} milestone${items.length===1?'':'s'}`}</div>
        </div>
        <div className="flex gap-2">
          <button className="btn btn-primary" onClick={()=>setShowNew(true)}>+ Add Milestone</button>
          <ClearCollectionButton label="Clear All" count={items.length} onClear={clearAllMilestones} />
        </div>
      </div>
      <div className="stats-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
        <div className="stat-card"><div className="stat-label">Overdue</div><div className="stat-value red">{inr(overdueAmt)}</div><div className="stat-sub">{withStatus.filter(m=>m.computedStatus==='Overdue').length} milestones</div></div>
        <div className="stat-card"><div className="stat-label">Total Due</div><div className="stat-value amber">{inr(totalDue)}</div></div>
        <div className="stat-card"><div className="stat-label">Total Paid</div><div className="stat-value green">{inr(totalPaid)}</div></div>
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4,flexWrap:'wrap',gap:8}}>
        <div className="tabs" style={{marginBottom:0}}>
          {[['all','All'],['Upcoming','Upcoming'],['Due Today','Due Today'],['Overdue','Overdue'],['Paid','Paid']].map(([v,l])=>(
            <div key={v} className={`tab ${filter===v?'active':''}`} onClick={()=>setFilter(v)}>{l}</div>
          ))}
        </div>
        <div className="flex gap-2">
          <select className="form-input form-select" style={{width:130}} value={msProjectFilter} onChange={e=>setMsProjectFilter(e.target.value)}>
            <option value="all">All Projects</option>
            {PROJECTS.map(p=><option key={p}>{p}</option>)}
          </select>
          <select className="form-input form-select" style={{width:140}} value={msMonthFilter} onChange={e=>setMsMonthFilter(e.target.value)}>
            <option value="all">All Months</option>
            {msMonths.map(m=><option key={m} value={m}>{new Date(m+'-01').toLocaleString('en-IN',{month:'long',year:'numeric'})}</option>)}
          </select>
          <select className="form-input form-select" style={{width:180}} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
            <option value="date_desc">↓ Due Date (Newest)</option>
            <option value="date_asc">↑ Due Date (Oldest)</option>
            <option value="amount_desc">↓ Amount (Highest)</option>
            <option value="amount_asc">↑ Amount (Lowest)</option>
          </select>
        </div>
      </div>
      <div className="card">
        {loading ? (
          <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Loading…</p></div>
        ) : filtered.length===0 ? (
          <div className="module-coming">
            <div className="big-icon">💳</div>
            <h3>No milestones yet</h3>
            <p className="text-muted">Track vendor payment milestones — advances, interim payments, final payments.</p>
          </div>
        ) : (
          <table>
            <thead><tr><th>Milestone</th><th>PO Ref</th><th>Project</th><th>Amount</th><th>Due Date</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              {filtered.map(m=>(
                <tr key={m.docId} className={m.computedStatus==='Overdue'?'overdue':m.computedStatus==='Due Today'?'due-today':''}>
                  <td className="fw-600">{m.name}</td>
                  <td className="mono" style={{fontSize:11}}>{m.po||'—'}</td>
                  <td>{m.project?<span className={`badge ${PROJECT_COLOR[m.project]||'grey'}`}>{m.project}</span>:<span className="text-muted">—</span>}</td>
                  <td className="amount fw-600">{inr(m.amount||0)}</td>
                  <td>{fmt(m.due)}</td>
                  <td><span className={`badge ${MS_STATUS_COLOR[m.computedStatus]||'grey'}`}>{m.computedStatus}</span></td>
                  <td>
                    <div className="flex gap-2">
                      <button className="btn btn-sm btn-ghost" onClick={()=>setEditMilestone(m)}>Edit</button>
                      {!m.paid && <button className="btn btn-sm btn-primary" onClick={()=>markMilestonePaid(m.docId)}>Mark Paid</button>}
                      <button className="btn btn-sm btn-ghost" onClick={()=>{if(confirm('Delete this milestone?'))deleteMilestone(m.docId);}}>Delete</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
      {showNew && <NewMilestoneModal onClose={()=>setShowNew(false)} pos={pos} />}
      {editMilestone && <NewMilestoneModal onClose={()=>setEditMilestone(null)} pos={pos} existing={editMilestone} />}
    </div>
  );
}

// ─── Dashboard Module ─────────────────────────────────
function Dashboard({ setActive }) {
  const { tasks }            = useTasks();
  const { items: wos }       = useWorkOrders();
  const { items: bills }     = useBills();
  const { items: advances }  = useAdvances();
  const today = new Date().toISOString().slice(0,10);
  const next7 = new Date(Date.now()+7*86400000).toISOString().slice(0,10);

  // Live stats
  const activeWOs   = wos.filter(w => w.stage !== 'Completed' && w.stage !== 'Cancelled');
  const overdueWOs  = wos.filter(w => w.stage !== 'Completed' && w.stage !== 'Cancelled' && w.due && w.due < today);
  const billsWithStatus = bills.map(b => ({
    ...b,
    computedStatus: b.paid ? 'Paid' : b.due === today ? 'Due Today' : b.due < today ? 'Overdue' : 'Upcoming'
  }));
  const overdueBills   = billsWithStatus.filter(b => b.computedStatus === 'Overdue');
  const dueSoonBills   = billsWithStatus.filter(b => !b.paid && b.due >= today && b.due <= next7);
  const overdueBillAmt = overdueBills.reduce((s,b) => s + Number(b.amount||0), 0);
  const dueSoonAmt     = dueSoonBills.reduce((s,b) => s + Number(b.amount||0), 0);
  const unadjAdv       = advances.filter(a => a.status !== 'Fully Adjusted').reduce((s,a) => s + Number(a.balanceAmount||0), 0);
  const openTasks      = tasks.filter(t => t.status !== 'Completed');
  const overdueTasks   = tasks.filter(t => t.status !== 'Completed' && t.due && t.due < today);

  return (
    <div>
      {/* Overdue alerts */}

        <div className="alert-bar critical">
          <span className="alert-icon">🚨</span>
          <span><strong>Overdue Bills:</strong> {overdueBills.length} bill{overdueBills.length>1?'s':''} totalling {inr(overdueBillAmt)} are past due date.</span>

          <div className="stat-sub">{overdueWOs.length > 0 ? `${overdueWOs.length} overdue` : 'All on track'}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Open Tasks</div>

        </div>
        <div className="stat-card">
          <div className="stat-label">Overdue Bills</div>
          <div className="stat-value red">{inr(overdueBillAmt)}</div>
          <div className="stat-sub">{overdueBills.length} unpaid</div>

const PRIO_COLOR = { Critical:'red', High:'amber', Medium:'blue', Low:'grey' };
const TASKS_COLLECTION = 'tasks';

// ─── Firestore hook for Tasks ─────────────────────────
function useTasks() {
  const [tasks, setTasks] = useState([]);
  const [ready, setReady] = useState(false);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(userCol(TASKS_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, (snap) => {
        const rows = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
        setTasks(rows);
        setLoading(false);
      }, (err) => {
        console.error('Tasks listener error', err);
        setLoading(false);
      });
      setReady(true);
      return unsub;
    }

    if (window.fb) {
      const unsub = start();
      return () => unsub && unsub();
    } else {
      let unsub;
      const handler = () => { unsub = start(); };
      window.addEventListener('firebase-ready', handler, { once: true });
      return () => {
        window.removeEventListener('firebase-ready', handler);
        if (unsub) unsub();
      };
    }
  }, []);

  return { tasks, ready, loading };
}

async function addTask(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(userCol(TASKS_COLLECTION), {
    ...data,
    createdAt: Date.now(),
  });
}

async function updateTask(docId, data) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(userDoc(TASKS_COLLECTION, docId), data);
}

async function deleteTask(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(userDoc(TASKS_COLLECTION, docId));
}

async function clearAllTasks() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(userCol(TASKS_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

function Tasks() {

  const [editTask, setEditTask] = useState(null);

  const withComputedStatus = tasks.map(t => {
    const isOverdue = t.due && t.due < todayStr && t.status !== 'Completed' && !t.remark;
    return { ...t, effectiveStatus: isOverdue ? 'Overdue' : (t.status || 'Pending') };
  });

  const filtered = filter === 'all' ? withComputedStatus : withComputedStatus.filter(t => t.effectiveStatus.toLowerCase() === filter);

  async function markComplete(t) {
    try { await updateTask(t.docId, { status: 'Completed' }); }

          <div className="module-coming">

            <h3>No tasks yet</h3>
            <p className="text-muted">Create your first task — it'll be saved permanently to your database.</p>

                      <button className="btn btn-sm btn-ghost" onClick={() => { if(confirm('Delete this task?')) deleteTask(t.docId); }}>Delete</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {showNew && <NewTaskModal onClose={() => setShowNew(false)} />}
      {editTask && <NewTaskModal onClose={() => setEditTask(null)} existing={editTask} />}
      {remarkTask && <RemarkModal task={remarkTask} onClose={() => setRemarkTask(null)} onSaved={() => setRemarkTask(null)} />}
    </div>
  );
}

// WORK ORDERS — issued to vendors for services/labour
// Series: NWTS/WO/2026-27/001
// ════════════════════════════════════════════════════
const WO_COLLECTION = 'workorders';
const WO_STAGES = ['Draft','Issued','In Progress','Completed','Cancelled'];
const FY = '2026-27';

function useWorkOrders() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(userCol(WO_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, (snap) => {
        setItems(snap.docs.map(d => ({ docId: d.id, ...d.data() })));
        setLoading(false);
      }, (err) => { console.error('WO listener error', err); setLoading(false); });
      return unsub;
    }
    if (window.fb && getUserUID()) { const unsub = start(); return () => unsub && unsub(); }
    let unsub;
    const handler = () => { if(getUserUID()) { unsub = start(); } };
    const userHandler = () => { if(unsub) unsub(); if(window.fb) unsub = start(); };
    window.addEventListener('firebase-ready', handler, { once: true });
    window.addEventListener('user-ready', userHandler, { once: true });
    return () => {
      window.removeEventListener('firebase-ready', handler);
      window.removeEventListener('user-ready', userHandler);
      if (unsub) unsub();
    };
  }, []);
  return { items, loading };
}
async function addWorkOrder(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(userCol(WO_COLLECTION), { ...data, createdAt: Date.now() });
}
async function updateWorkOrder(docId, data) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(userDoc(WO_COLLECTION, docId), data);
}
async function deleteWorkOrder(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(userDoc(WO_COLLECTION, docId));
}
async function clearAllWorkOrders() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(userCol(WO_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

function nextWONumber(count) {
  return `NWTS/WO/${FY}/${String(count + 1).padStart(3, '0')}`;
}
function nextPONumber(count) {
  return `NWTS/PO/${FY}/${String(count + 1).padStart(3, '0')}`;
}

// Returns quotations eligible for linking (Finalized stage)
function finalizedQuotations(quotations) {
  return quotations.filter(q => q.stage === 'Finalized');
}

function NewWOModal({ onClose, nextNumber, quotations, existing }) {
  const isEdit = !!existing;
  const knownNames = useKnownNames();
  const [form, setForm] = useState(isEdit ? {
    wo: existing.wo||nextNumber, vendorName: existing.vendorName||'',
    description: existing.description||'', value: existing.value ? String(existing.value) : '',
    linkedQuotation: existing.linkedQuotation||'', stage: existing.stage||'Draft',
    due: existing.due||'', notes: existing.notes||'',
    project: existing.project||'', split: existing.split||{pontoon:50,wtp:50}
  } : {
    wo: nextNumber, vendorName: '', description: '', value: '',
    linkedQuotation: '', stage: 'Draft', due: '', notes: '',
    project: '', split:{pontoon:50,wtp:50}
  });
  const [schedule, setSchedule] = useState(isEdit && existing.paymentSchedule ? existing.paymentSchedule.map(r=>({...r,id:genRowId()})) : []);
  const [saving, setSaving] = useState(false);
  function set(f, v) { setForm(s => ({ ...s, [f]: v })); }

  // Auto-fill vendor name when quotation selected
  function handleQuotationSelect(val) {
    const q = quotations.find(q => q.docId === val);
    set('linkedQuotation', val);
    if (q) {
      setForm(s => ({
        ...s,
        linkedQuotation: val,
        vendorName: q.vendorName || s.vendorName,
        description: s.description || q.description || '',
        value: s.value || (q.value ? String(q.value) : ''),
      }));
      if ((!schedule || schedule.length === 0) && q.paymentSchedule && q.paymentSchedule.length > 0) {
        setSchedule(q.paymentSchedule.map(r => ({ ...r, id: genRowId() })));
      }
    }
  }

  async function handleSave() {
    if (!form.vendorName.trim() || !form.description.trim()) return;
    setSaving(true);
    try {
      if (isEdit) await updateWorkOrder(existing.docId, { ...form, value: Number(form.value)||0, paymentSchedule: schedule });
      else await addWorkOrder({ ...form, value: Number(form.value) || 0, paymentSchedule: schedule });
      onClose();
    } catch (e) { console.error(e); alert('Could not save work order.'); }
    finally { setSaving(false); }
  }

  const eligible = finalizedQuotations(quotations);

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'var(--surface)',borderRadius:10,width:620,maxHeight:'90vh',overflowY:'auto',boxShadow:'0 8px 40px rgba(0,0,0,.22)'}} onClick={e=>e.stopPropagation()}>
        <div style={{background:'var(--secondary)',padding:'14px 18px',position:'sticky',top:0,zIndex:1}}>
          <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>{isEdit ? '✏ Edit Work Order' : '+ Issue Work Order'}</span>
        </div>
        <div style={{padding:'18px 20px'}}>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">WO Number</label>
              <input className="form-input font-mono" value={form.wo} onChange={e=>set('wo', e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Linked Quotation</label>
              <select className="form-input form-select" value={form.linkedQuotation} onChange={e => handleQuotationSelect(e.target.value)}>
                <option value="">Select finalized quotation…</option>
                {eligible.map(q => (
                  <option key={q.docId} value={q.docId}>{q.vendorName} — {q.description ? q.description.slice(0,40) : ''} ({inr(q.value||0)})</option>
                ))}
                {eligible.length === 0 && <option disabled>No finalized quotations yet</option>}
              </select>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Vendor Name</label>
            <AutocompleteInput value={form.vendorName} onChange={v=>set('vendorName',v)} suggestions={knownNames.vendors} placeholder="Vendor / contractor name" />
          </div>
          <div className="form-group">
            <label className="form-label">Scope of Work / Description</label>
            <textarea className="form-input" rows="2" value={form.description} onChange={e=>set('description', e.target.value)} placeholder="e.g. RO plant commissioning and installation at Green Valley CHS" style={{resize:'vertical'}} />
          </div>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Total Value (₹)</label>
              <input className="form-input font-mono" value={form.value} onChange={e=>set('value', e.target.value)} placeholder="0" />
            </div>
            <div className="form-group">
              <label className="form-label">Expected Completion Date</label>
              <input className="form-input" type="date" value={form.due} onChange={e=>set('due', e.target.value)} />
            </div>
          </div>
          <PaymentScheduleEditor rows={schedule} setRows={setSchedule} totalValue={form.value} />
          <div className="form-group">
            <label className="form-label">Stage</label>
            <select className="form-input form-select" value={form.stage} onChange={e=>set('stage', e.target.value)}>
              {WO_STAGES.map(s => <option key={s}>{s}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Internal Notes</label>
            <input className="form-input" value={form.notes} onChange={e=>set('notes', e.target.value)} placeholder="Optional" />
          </div>
        </div>
        <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={handleSave} disabled={saving || !form.vendorName.trim() || !form.description.trim()} className="btn btn-primary"
            style={{background:'var(--secondary)', opacity: saving || !form.vendorName.trim() || !form.description.trim() ? .6 : 1}}>
            {saving ? 'Saving…' : isEdit ? 'Save Changes' : 'Issue Work Order'}
          </button>
        </div>
      </div>
    </div>
  );
}

const WO_STAGE_COLOR = { 'Draft':'grey','Issued':'blue','In Progress':'teal','Completed':'green','Cancelled':'red' };

function WorkOrders() {
  const { items, loading } = useWorkOrders();
  const { items: quotations } = useQuotations();
  const [showNew, setShowNew] = useState(false);
  const [viewSchedule, setViewSchedule] = useState(null);
  const [stageFilter, setStageFilter] = useState('all');
  const [projectFilter, setProjectFilter] = useState('all');
  const [vendorFilter, setVendorFilter] = useState('all');
  const [monthFilter, setMonthFilter] = useState('all');
  const [woSortBy, setWOSortBy] = useState('date_desc');
  const [editWO, setEditWO] = useState(null);

  const nextNumber = nextWONumber(items.length);
  const months = [...new Set(items.map(i=>i.due?.slice(0,7)).filter(Boolean))].sort().reverse();
  const vendors = [...new Set(items.map(i=>i.vendorName).filter(Boolean))].sort();
  const filtered = [...items].filter(w =>
    (stageFilter==='all'||w.stage===stageFilter) &&
    (projectFilter==='all'||w.project===projectFilter) &&
    (vendorFilter==='all'||w.vendorName===vendorFilter) &&
    (monthFilter==='all'||(w.due||'').startsWith(monthFilter))
  ).sort((a,b)=>{
    if(woSortBy==='date_asc')    return (a.due||'').localeCompare(b.due||'');
    if(woSortBy==='amount_desc') return Number(b.value||0)-Number(a.value||0);
    if(woSortBy==='amount_asc')  return Number(a.value||0)-Number(b.value||0);
    if(woSortBy==='vendor_asc')  return (a.vendorName||'').localeCompare(b.vendorName||'');
    return (b.due||'').localeCompare(a.due||'');
  });
  const totalValue = items.reduce((s,w) => s + Number(w.value||0), 0);
  const activeCount = items.filter(w => w.stage === 'Issued' || w.stage === 'In Progress').length;

  // Resolve quotation display name from docId
  function quoteLabel(id) {
    const q = quotations.find(q => q.docId === id);
    return q ? `${q.vendorName}` : (id || '—');
  }

  async function advanceStage(w) {
    const idx = WO_STAGES.indexOf(w.stage);
    if (idx < WO_STAGES.length - 1) {
      try { await updateWorkOrder(w.docId, { stage: WO_STAGES[idx+1] }); }
      catch(e) { console.error(e); alert('Could not update stage.'); }
    }
  }

  return (
    <div style={{marginBottom:24}}>
      <div className="section-header">
        <div>
          <div className="section-title">Work Orders</div>
          <div className="section-sub">
            {loading ? 'Loading from Firestore…' : `${items.length} WO${items.length===1?'':'s'} · ${activeCount} active · Next: ${nextNumber}`}
          </div>
        </div>
        <div className="flex gap-2">
          <button className="btn btn-primary" style={{background:'var(--secondary)'}} onClick={() => setShowNew(true)}>+ Issue Work Order</button>
          <ClearCollectionButton label="Clear All WOs" count={items.length} onClear={clearAllWorkOrders} />
        </div>
      </div>

      <div className="stats-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
        <div className="stat-card"><div className="stat-label">Total WO Value</div><div className="stat-value red">{inr(totalValue)}</div></div>
        <div className="stat-card"><div className="stat-label">Active</div><div className="stat-value blue">{activeCount}</div></div>
        <div className="stat-card"><div className="stat-label">Completed</div><div className="stat-value green">{items.filter(w=>w.stage==='Completed').length}</div></div>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="card-body" style={{paddingTop:10,paddingBottom:10}}>
          <div className="flex gap-2" style={{flexWrap:'wrap'}}>
            <select className="form-input form-select" style={{width:150}} value={stageFilter} onChange={e=>setStageFilter(e.target.value)}>
              <option value="all">All Stages</option>
              {WO_STAGES.map(s=><option key={s}>{s}</option>)}
            </select>
            <select className="form-input form-select" style={{width:130}} value={projectFilter} onChange={e=>setProjectFilter(e.target.value)}>
              <option value="all">All Projects</option>
              {PROJECTS.map(p=><option key={p}>{p}</option>)}
            </select>
            <select className="form-input form-select" style={{width:160}} value={vendorFilter} onChange={e=>setVendorFilter(e.target.value)}>
              <option value="all">All Vendors</option>
              {vendors.map(v=><option key={v}>{v}</option>)}
            </select>
            <select className="form-input form-select" style={{width:150}} value={monthFilter} onChange={e=>setMonthFilter(e.target.value)}>
              <option value="all">All Months</option>
              {months.map(m=><option key={m} value={m}>{new Date(m+'-01').toLocaleString('en-IN',{month:'long',year:'numeric'})}</option>)}
            </select>
            <select className="form-input form-select" style={{width:180}} value={woSortBy} onChange={e=>setWOSortBy(e.target.value)}>
              <option value="date_desc">↓ Due Date (Newest)</option>
              <option value="date_asc">↑ Due Date (Oldest)</option>
              <option value="amount_desc">↓ Value (Highest)</option>
              <option value="amount_asc">↑ Value (Lowest)</option>
              <option value="vendor_asc">A→Z Vendor</option>
            </select>
          </div>
        </div>
      </div>

      <div className="card">
        {loading ? (
          <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
        ) : filtered.length === 0 ? (
          <div className="module-coming">
            <div className="big-icon">🔧</div>
            <h3>No work orders yet</h3>
            <p className="text-muted">Issue a WO to a vendor for services or labour. Link it to a finalized quotation.</p>
          </div>
        ) : (
          <table>
            <thead>
              <tr><th>WO Number</th><th>Vendor</th><th>Project</th><th>Scope of Work</th><th>Value</th><th>Due</th><th>Schedule</th><th>Stage</th><th>Actions</th></tr>
            </thead>
            <tbody>
              {filtered.map(w => (
                <tr key={w.docId}>
                  <td className="mono" style={{whiteSpace:'nowrap'}}>{w.wo}</td>
                  <td className="fw-600">{w.vendorName}</td>
                  <td>{w.project?<span className={`badge ${PROJECT_COLOR[w.project]||'grey'}`}>{w.project}</span>:<span className="text-muted">—</span>}</td>
                  <td style={{maxWidth:180}}>{w.description}</td>
                  <td className="amount fw-600">{inr(w.value||0)}</td>
                  <td>{w.due || '—'}</td>
                  <td>
                    {w.paymentSchedule && w.paymentSchedule.length > 0 ? (
                      <span className="btn btn-sm btn-ghost" style={{cursor:'pointer',whiteSpace:'nowrap'}} onClick={() => setViewSchedule({...w, label:w.wo})}>
                        {w.paymentSchedule.length} stage{w.paymentSchedule.length===1?'':'s'}
                      </span>
                    ) : <span className="text-muted text-sm">—</span>}
                  </td>
                  <td><span className={`badge ${WO_STAGE_COLOR[w.stage]||'grey'}`}>{w.stage}</span></td>
                  <td>
                    <div className="flex gap-2">
                      <button className="btn btn-sm btn-ghost" onClick={() => setEditWO(w)}>Edit</button>
                      {w.stage !== 'Completed' && w.stage !== 'Cancelled' && (
                        <button className="btn btn-sm btn-ghost" onClick={() => advanceStage(w)}>Advance →</button>
                      )}
                      <button className="btn btn-sm btn-ghost" onClick={() => { if(confirm('Delete this work order?')) deleteWorkOrder(w.docId); }}>Delete</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {showNew && <NewWOModal onClose={() => setShowNew(false)} nextNumber={nextNumber} quotations={quotations} />}
      {editWO && <NewWOModal onClose={() => setEditWO(null)} nextNumber={nextNumber} quotations={quotations} existing={editWO} />}
      {viewSchedule && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={() => setViewSchedule(null)}>
          <div style={{background:'var(--surface)',borderRadius:10,width:440,boxShadow:'0 8px 40px rgba(0,0,0,.22)',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
            <div style={{background:'var(--secondary)',padding:'14px 18px'}}>
              <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>Payment Schedule — {viewSchedule.label}</span>
            </div>
            <div style={{padding:'16px 20px'}}>
              <table style={{width:'100%'}}>
                <thead><tr>
                  <th style={{fontSize:10,textAlign:'left',color:'var(--text-muted)',padding:'4px 0'}}>Stage</th>
                  <th style={{fontSize:10,textAlign:'left',color:'var(--text-muted)'}}>%</th>
                  <th style={{fontSize:10,textAlign:'left',color:'var(--text-muted)'}}>Amount</th>
                  <th style={{fontSize:10,textAlign:'left',color:'var(--text-muted)'}}>Date</th>
                </tr></thead>
                <tbody>
                  {(viewSchedule.paymentSchedule||[]).map((r,i) => (
                    <tr key={i} style={{borderTop:'1px solid var(--grey-50)'}}>
                      <td style={{padding:'6px 0',fontSize:12.5}}>{r.name}</td>
                      <td style={{fontSize:12.5}}>{r.pct}%</td>
                      <td className="amount" style={{fontSize:12.5}}>{inr(r.amount||0)}</td>
                      <td style={{fontSize:12.5}}>{r.date || '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{padding:'0 20px 16px',display:'flex',justifyContent:'flex-end'}}>
              <button onClick={() => setViewSchedule(null)} className="btn btn-ghost">Close</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

          <div className="form-grid">

              <label className="form-label">PO Number</label>
              <input className="form-input font-mono" value={form.po} onChange={e=>set('po', e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Linked Quotation</label>
              <select className="form-input form-select" value={form.linkedQuotation} onChange={e => handleQuotationSelect(e.target.value)}>
                <option value="">Select finalized quotation…</option>
                {eligible.map(q => (
                  <option key={q.docId} value={q.docId}>{q.vendorName} — {q.description ? q.description.slice(0,40) : ''} ({inr(q.value||0)})</option>
                ))}

              </select>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Vendor Name</label>
            {vendors && vendors.length > 0 ? (
              <select className="form-input form-select" value={form.vendorName} onChange={e=>set('vendorName', e.target.value)}>
                <option value="">Select vendor…</option>
                {vendors.map(v => <option key={v.docId} value={v.company}>{v.company}</option>)}
                {form.vendorName && !vendors.find(v => v.company === form.vendorName) && (
                  <option value={form.vendorName}>{form.vendorName} (from quotation)</option>
                )}

            ) : (
              <AutocompleteInput value={form.vendorName} onChange={v=>set('vendorName',v)} suggestions={knownNames.vendors} placeholder="Vendor name" />
            )}

          <div className="form-group">
            <label className="form-label">Description of Goods / Materials</label>
            <input className="form-input" value={form.description} onChange={e=>set('description', e.target.value)} placeholder="e.g. RO membranes 4040 — 10 units" />
          </div>
          <div className="form-group">
            <label className="form-label">Total Value (₹)</label>
            <input className="form-input font-mono" value={form.value} onChange={e=>set('value', e.target.value)} placeholder="0" />
          </div>
          <PaymentScheduleEditor rows={schedule} setRows={setSchedule} totalValue={form.value} />
          <div className="form-group">
            <label className="form-label">Stage</label>
            <select className="form-input form-select" value={form.stage} onChange={e=>set('stage', e.target.value)}>
              {PO_STAGES.map(s => <option key={s}>{s}</option>)}
            </select>
          </div>
          <ProjectSelect value={form.project||''} onChange={v=>set('project',v)} split={form.split} onSplitChange={v=>set('split',v)} />
        </div>
        <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={handleSave} disabled={saving || !form.vendorName.trim() || !form.value} className="btn btn-primary"
            style={{opacity: saving || !form.vendorName.trim() || !form.value ? .6 : 1}}>
            {saving ? 'Saving…' : 'Issue Purchase Order'}
          </button>
        </div>
      </div>
    </div>
  );
}

const PO_STAGE_COLOR = { 'Draft':'grey','Issued':'blue','Goods In Transit':'amber','Partially Received':'teal','Fully Received':'green','Closed':'grey' };

function PurchaseOrders() {
  const { items, loading } = usePurchaseOrders();
  const { items: quotations } = useQuotations();
  const [showNew, setShowNew] = useState(false);
  const [editPO, setEditPO] = useState(null);
  const [viewSchedule, setViewSchedule] = useState(null);
  const [stageFilter, setStageFilter] = useState('all');
  const [projectFilter, setPOProjectFilter] = useState('all');
  const [vendorFilter, setPOVendorFilter] = useState('all');
  const [monthFilter, setPOMonthFilter] = useState('all');
  const [poSortBy, setPOSortBy] = useState('date_desc');

  const nextNumber = nextPONumber(items.length);
  const poVendors = [...new Set(items.map(p=>p.vendorName).filter(Boolean))].sort();
  const poMonths = [...new Set(items.map(p=>p.createdAt?new Date(p.createdAt).toISOString().slice(0,7):null).filter(Boolean))].sort().reverse();
  const filtered = [...items].filter(p=>
    (stageFilter==='all'||p.stage===stageFilter) &&
    (projectFilter==='all'||p.project===projectFilter) &&
    (vendorFilter==='all'||p.vendorName===vendorFilter) &&
    (monthFilter==='all'||(p.createdAt?new Date(p.createdAt).toISOString().slice(0,7):'')===monthFilter)
  ).sort((a,b)=>{
    if(poSortBy==='date_asc')    return (a.createdAt||0)-(b.createdAt||0);
    if(poSortBy==='amount_desc') return Number(b.value||0)-Number(a.value||0);
    if(poSortBy==='amount_asc')  return Number(a.value||0)-Number(b.value||0);
    if(poSortBy==='vendor_asc')  return (a.vendorName||'').localeCompare(b.vendorName||'');
    return (b.createdAt||0)-(a.createdAt||0);
  });
  const totalValue = items.reduce((s,p) => s + Number(p.value||0), 0);
  const activeCount = items.filter(p => p.stage !== 'Closed' && p.stage !== 'Draft').length;

  async function advanceStage(p) {
    const idx = PO_STAGES.indexOf(p.stage);
    if (idx < PO_STAGES.length - 1) {
      try { await updatePO(p.docId, { stage: PO_STAGES[idx+1] }); }
      catch(e) { console.error(e); alert('Could not update stage.'); }
    }
  }

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Purchase Orders</div>

            {loading ? 'Loading from Firestore…' : `${items.length} PO${items.length===1?'':'s'} · ${activeCount} active · Next: ${nextNumber}`}
          </div>
        </div>
        <div className="flex gap-2">
          <button className="btn btn-primary" onClick={() => setShowNew(true)}>+ Issue Purchase Order</button>
          <ClearCollectionButton label="Clear All POs" count={items.length} onClear={clearAllPOs} />
        </div>
      </div>

      <div className="stats-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
        <div className="stat-card"><div className="stat-label">Total PO Value</div><div className="stat-value red">{inr(totalValue)}</div></div>
        <div className="stat-card"><div className="stat-label">Active</div><div className="stat-value blue">{activeCount}</div></div>
        <div className="stat-card"><div className="stat-label">Fully Received</div><div className="stat-value green">{items.filter(p=>p.stage==='Fully Received'||p.stage==='Closed').length}</div></div>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="card-body" style={{paddingTop:10,paddingBottom:10}}>
          <div className="flex gap-2" style={{flexWrap:'wrap'}}>
            <select className="form-input form-select" style={{width:180}} value={stageFilter} onChange={e=>setStageFilter(e.target.value)}>
              <option value="all">All Stages</option>
              {PO_STAGES.map(s=><option key={s}>{s}</option>)}
            </select>
            <select className="form-input form-select" style={{width:130}} value={projectFilter} onChange={e=>setPOProjectFilter(e.target.value)}>
              <option value="all">All Projects</option>
              {PROJECTS.map(p=><option key={p}>{p}</option>)}
            </select>
            <select className="form-input form-select" style={{width:160}} value={vendorFilter} onChange={e=>setPOVendorFilter(e.target.value)}>
              <option value="all">All Vendors</option>
              {poVendors.map(v=><option key={v}>{v}</option>)}
            </select>
            <select className="form-input form-select" style={{width:140}} value={monthFilter} onChange={e=>setPOMonthFilter(e.target.value)}>
              <option value="all">All Months</option>
              {poMonths.map(m=><option key={m} value={m}>{new Date(m+'-01').toLocaleString('en-IN',{month:'long',year:'numeric'})}</option>)}
            </select>
            <select className="form-input form-select" style={{width:180}} value={poSortBy} onChange={e=>setPOSortBy(e.target.value)}>
              <option value="date_desc">↓ Date (Newest)</option>
              <option value="date_asc">↑ Date (Oldest)</option>
              <option value="amount_desc">↓ Value (Highest)</option>
              <option value="amount_asc">↑ Value (Lowest)</option>
              <option value="vendor_asc">A→Z Vendor</option>
            </select>
          </div>
        </div>
      </div>

      <div className="card">
        {loading ? (
          <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
        ) : filtered.length === 0 ? (
          <div className="module-coming">
            <div className="big-icon">📦</div>
            <h3>No purchase orders yet</h3>
            <p className="text-muted">Issue a PO to a vendor for materials or goods. Link it to a finalized quotation.</p>
          </div>
        ) : (
          <table>
            <thead>
              <tr><th>PO Number</th><th>Vendor</th><th>Project</th><th>Description</th><th>Value</th><th>Schedule</th><th>Stage</th><th>Actions</th></tr>
            </thead>
            <tbody>
              {filtered.map(p => (
                <tr key={p.docId}>
                  <td className="mono" style={{whiteSpace:'nowrap'}}>{p.po}</td>
                  <td className="fw-600">{p.vendorName}</td>
                  <td>{p.project?<span className={`badge ${PROJECT_COLOR[p.project]||'grey'}`}>{p.project}</span>:<span className="text-muted">—</span>}</td>
                  <td style={{maxWidth:180}}>{p.description || '—'}</td>
                  <td className="amount fw-600">{inr(p.value||0)}</td>
                  <td>
                    {p.paymentSchedule && p.paymentSchedule.length > 0 ? (
                      <span className="btn btn-sm btn-ghost" style={{cursor:'pointer',whiteSpace:'nowrap'}} onClick={() => setViewSchedule({...p, label:p.po})}>
                        {p.paymentSchedule.length} stage{p.paymentSchedule.length===1?'':'s'}
                      </span>
                    ) : <span className="text-muted text-sm">—</span>}
                  </td>
                  <td><span className={`badge ${PO_STAGE_COLOR[p.stage]||'grey'}`}>{p.stage}</span></td>
                  <td>
                    <div className="flex gap-2">
                      <button className="btn btn-sm btn-ghost" onClick={() => setEditPO(p)}>Edit</button>
                      {p.stage !== 'Closed' && (
                        <button className="btn btn-sm btn-ghost" onClick={() => advanceStage(p)}>Advance →</button>
                      )}
                      <button className="btn btn-sm btn-ghost" onClick={() => { if(confirm('Delete this purchase order?')) deletePO(p.docId); }}>Delete</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {showNew && <NewPOModal onClose={() => setShowNew(false)} nextNumber={nextNumber} vendors={vendors} quotations={quotations} />}
      {editPO && <NewPOModal onClose={() => setEditPO(null)} nextNumber={nextNumber} vendors={vendors} quotations={quotations} existing={editPO} />}
      {viewSchedule && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={() => setViewSchedule(null)}>
          <div style={{background:'var(--surface)',borderRadius:10,width:440,boxShadow:'0 8px 40px rgba(0,0,0,.22)',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
            <div style={{background:'var(--primary)',padding:'14px 18px'}}>
              <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>Payment Schedule — {viewSchedule.label}</span>
            </div>
            <div style={{padding:'16px 20px'}}>
              <table style={{width:'100%'}}>
                <thead><tr>
                  <th style={{fontSize:10,textAlign:'left',color:'var(--text-muted)',padding:'4px 0'}}>Stage</th>
                  <th style={{fontSize:10,textAlign:'left',color:'var(--text-muted)'}}>%</th>
