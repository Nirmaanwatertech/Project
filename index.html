function PettyCash({ currentUser }) {
  const { items, loading } = usePettyCash();
  const [showNew, setShowNew] = useState(false);
  const [catFilter, setCatFilter] = useState('all');
  const [paidByFilter, setPaidByFilter] = useState('all');
  const [monthFilter, setMonthFilter] = useState('all');
  const [editEntry, setEditEntry] = useState(null);

  // Month options from entries
  const months = [...new Set(items.map(i=>i.date?.slice(0,7)).filter(Boolean))].sort().reverse();

  // Sort by actual expense date descending (YYYY-MM-DD string comparison works correctly)
  const itemsSortedByDate = [...items].sort((a,b) => {
    const da = a.date || '';
    const db = b.date || '';
    if (db > da) return 1;
    if (db < da) return -1;
    return 0;
  });

  const filtered = itemsSortedByDate.filter(i=>
    (catFilter==='all' || i.category===catFilter) &&
    (paidByFilter==='all' || i.paidBy===paidByFilter) &&
    (monthFilter==='all' || (i.date||'').startsWith(monthFilter))
  );

  const total = filtered.reduce((s,i)=>s+Number(i.amount||0),0);
  const totalAll = items.reduce((s,i)=>s+Number(i.amount||0),0);

  // Category breakdown for filtered period
  const activePettyCategories = window.appLists?.pettyCategories || DEFAULT_LISTS.pettyCategories;
  const byCategory = activePettyCategories.map(cat=>({
    cat,
    amt: filtered.filter(i=>i.category===cat).reduce((s,i)=>s+Number(i.amount||0),0)
  })).filter(c=>c.amt>0).sort((a,b)=>b.amt-a.amt);

  // Paid by breakdown
  const byPerson = [...new Set(items.map(i=>i.paidBy).filter(Boolean))].map(p=>({
    person:p,
    amt: filtered.filter(i=>i.paidBy===p).reduce((s,i)=>s+Number(i.amount||0),0)
  })).filter(p=>p.amt>0).sort((a,b)=>b.amt-a.amt);

  const thisMonth = new Date().toISOString().slice(0,7);
  const thisMonthTotal = items.filter(i=>(i.date||'').startsWith(thisMonth)).reduce((s,i)=>s+Number(i.amount||0),0);

  return (
    <div>
      <div className="section-header">
        <div>

          <div className="section-sub">{loading?'Loading…':`${items.length} entries · all time`}</div>
        </div>
        <div className="flex gap-2">
          <button className="btn btn-primary" style={{background:'var(--secondary)'}} onClick={()=>setShowNew(true)}>+ Add Entry</button>
          <ClearCollectionButton label="Clear All" count={items.length} onClear={clearAllPettyCash} />
        </div>
      </div>

      {/* Stats */}
      <div className="stats-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        <div className="stat-card">
          <div className="stat-label">This Month</div>
          <div className="stat-value red">{inr(thisMonthTotal)}</div>
          <div className="stat-sub">{new Date().toLocaleString('en-IN',{month:'long',year:'numeric'})}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Filtered Total</div>
          <div className="stat-value">{inr(total)}</div>
          <div className="stat-sub">{filtered.length} entries</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Top Category</div>
          <div className="stat-value blue" style={{fontSize:14}}>{byCategory[0]?.cat||'—'}</div>
          <div className="stat-sub">{byCategory[0]?inr(byCategory[0].amt):''}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">All-Time Total</div>
          <div className="stat-value">{inr(totalAll)}</div>
        </div>
      </div>

      {/* Category + Person breakdown */}
      {filtered.length > 0 && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
          <div className="card">
            <div className="card-header"><span className="card-title">By Category</span></div>
            <div className="card-body">
              {byCategory.map(c=>(
                <div key={c.cat} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                  <span style={{fontSize:12,color:'var(--text-secondary)',width:150,flexShrink:0}}>{c.cat}</span>
                  <div className="progress-wrap" style={{flex:1}}>
                    <div className="progress-fill blue" style={{width:`${total>0?Math.round((c.amt/total)*100):0}%`}} />
                  </div>
                  <span className="amount text-sm" style={{width:80,textAlign:'right'}}>{inr(c.amt)}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="card">
            <div className="card-header"><span className="card-title">By Staff</span></div>
            <div className="card-body">
              {byPerson.map(p=>(
                <div key={p.person} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                  <div style={{width:28,height:28,borderRadius:'50%',background:'var(--primary)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>
                    {p.person[0]}
                  </div>
                  <span style={{fontSize:12,color:'var(--text-secondary)',flex:1}}>{p.person}</span>
                  <div className="progress-wrap" style={{width:100}}>

                  </div>
                  <span className="amount text-sm" style={{width:80,textAlign:'right'}}>{inr(p.amt)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Filters + table */}
      <div className="card">
        <div className="card-body" style={{paddingTop:10,paddingBottom:10}}>
          <div className="flex gap-2">
            <select className="form-input form-select" style={{width:160}} onChange={e=>setCatFilter(e.target.value)}>
              <option value="all">All Categories</option>
              {activePettyCategories.map(c=><option key={c}>{c}</option>)}
            </select>
            <select className="form-input form-select" style={{width:140}} onChange={e=>setPaidByFilter(e.target.value)}>
              <option value="all">All Staff</option>
              {[...new Set(items.map(i=>i.paidBy).filter(Boolean))].map(p=><option key={p}>{p}</option>)}
            </select>
            <select className="form-input form-select" style={{width:150}} onChange={e=>setMonthFilter(e.target.value)}>
              <option value="all">All Months</option>
              {months.map(m=><option key={m} value={m}>{new Date(m+'-01').toLocaleString('en-IN',{month:'long',year:'numeric'})}</option>)}
            </select>
          </div>
        </div>
        {loading ? (
          <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
        ) : filtered.length===0 ? (
          <div className="module-coming">
            <div className="big-icon">💰</div>
            <h3>No petty cash entries yet</h3>
            <p className="text-muted">Record day-to-day small cash expenses — fuel, courier, tea, stationery, etc.</p>
          </div>
        ) : (
          <table>
            <thead>
              <tr><th>Date</th><th>Category</th><th>Description</th><th>Paid By</th><th>Project</th><th>Amount</th><th>Actions</th></tr>
            </thead>
            <tbody>
              {filtered.map(i=>(
                <tr key={i.docId}>
                  <td>{i.date}</td>
                  <td><span className="badge grey">{i.category}</span></td>
                  <td>{i.description}</td>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <div style={{width:22,height:22,borderRadius:'50%',background:'var(--primary)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700}}>
                        {(i.paidBy||'?')[0]}
                      </div>
                      {i.paidBy||'—'}
                    </div>
                  </td>
                  <td style={{fontSize:11.5,color:'var(--text-muted)'}}>{i.project||'—'}</td>
                  <td className="amount fw-600" style={{color:'var(--red)'}}>{inr(i.amount||0)}</td>
                  <td>
                    <button className="btn btn-sm btn-ghost" onClick={()=>setEditEntry(i)}>Edit</button>
                    <button className="btn btn-sm btn-ghost" onClick={()=>{if(confirm('Delete this entry?'))deletePettyEntry(i.docId);}}>Delete</button>
                  </td>
                </tr>
              ))}
              {/* Totals row */}
              <tr style={{background:'var(--grey-50)',fontWeight:700}}>
                <td colSpan={5} style={{padding:'8px 12px',fontSize:12,color:'var(--text-secondary)'}}>Total ({filtered.length} entries)</td>
                <td className="amount" style={{color:'var(--red)',fontWeight:700}}>{inr(total)}</td>
                <td></td>
              </tr>
            </tbody>
          </table>
        )}
      </div>

      {showNew && <NewPettyModal onClose={()=>setShowNew(false)} currentUser={currentUser} />}
      {editEntry && <NewPettyModal onClose={()=>setEditEntry(null)} currentUser={currentUser} existing={editEntry} />}
    </div>
  );
}

// PROJECT P&L — Pontoon vs WTP side by side
// ════════════════════════════════════════════════════
function ProjectPnL() {
  const { items: bills }     = useBills();
  const { items: advances }  = useAdvances();
  const { items: pos }       = usePurchaseOrders();
  const { items: wos }       = useWorkOrders();
  const { items: milestones }= useMilestones();
  const { items: receipts }  = useReceipts();
  const { items: petty }     = usePettyCash();
  const { items: capital }   = useCapitalLoans();

  function calcProject(proj) {
    // proj = 'Pontoon' | 'WTP'
    const match = (item) => item.project === proj || item.project === 'Both';

    // ── INCOME ──────────────────────────────────────
    // Client receipts
    const receiptIncome = receipts.filter(r => {
      const sched = r.project || r.scheduleProject;
      return sched === proj || sched === 'Both';
    }).reduce((s,r) => s + Number(r.amountReceived||0), 0);

    // Payment milestones received
    const milestoneIncome = milestones.filter(m => m.paid && match(m)).reduce((s,m) => s + Number(m.amount||0), 0);

    // Capital inflows tagged to this project
    const capitalIncome = capital.filter(c => match(c)).reduce((s,c) => s + Number(c.amount||0), 0);

    const totalIncome = receiptIncome + milestoneIncome + capitalIncome;

    // ── EXPENSES ─────────────────────────────────────
    const billExp    = bills.filter(b => match(b) && !b.paid === false || (match(b))).reduce((s,b) => s + Number(b.amount||0), 0);
    const advanceExp = advances.filter(a => match(a)).reduce((s,a) => s + Number(a.amount||0), 0);
    const poExp      = pos.filter(p => match(p)).reduce((s,p) => s + Number(p.value||0), 0);
    const woExp      = wos.filter(w => match(w)).reduce((s,w) => s + Number(w.value||0), 0);
    const pettyExp   = petty.filter(p => match(p)).reduce((s,p) => s + Number(p.amount||0), 0);

    const totalExpenses = billExp + advanceExp + pettyExp;
    const totalCommitted = poExp + woExp; // POs/WOs are commitments, not yet paid

    const margin = totalIncome - totalExpenses;
    const marginPct = totalIncome > 0 ? Math.round((margin / totalIncome) * 100) : 0;

    return {
      receiptIncome, milestoneIncome, capitalIncome, totalIncome,
      billExp, advanceExp, poExp, woExp, pettyExp,
      totalExpenses, totalCommitted, margin, marginPct,
      billCount:    bills.filter(b=>match(b)).length,
      poCount:      pos.filter(p=>match(p)).length,
      woCount:      wos.filter(w=>match(w)).length,
      pettyCount:   petty.filter(p=>match(p)).length,
    };
  }

  const pontoon = calcProject('Pontoon');
  const wtp     = calcProject('WTP');
  const combined = {
    totalIncome:    pontoon.totalIncome + wtp.totalIncome,
    totalExpenses:  pontoon.totalExpenses + wtp.totalExpenses,
    totalCommitted: pontoon.totalCommitted + wtp.totalCommitted,
    margin:         pontoon.margin + wtp.margin,
  };

  function PnLCard({ label, pData, color }) {
    const isPositive = pData.margin >= 0;
    return (
      <div style={{flex:1,border:`2px solid ${color}`,borderRadius:10,overflow:'hidden'}}>
        {/* Header */}
        <div style={{background:color,padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontWeight:800,fontSize:15,color:'#fff'}}>{label}</span>
          <span style={{fontSize:11,color:'rgba(255,255,255,.75)',fontWeight:500}}>Project P&L</span>
        </div>

        {/* Margin highlight */}
        <div style={{background: isPositive ? 'var(--green-50)' : 'var(--red-50)', padding:'12px 16px',borderBottom:`1px solid ${color}20`}}>
          <div style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:.5,marginBottom:2}}>Net Margin</div>
          <div style={{fontFamily:'var(--font-mono)',fontSize:24,fontWeight:800,color:isPositive?'var(--green)':'var(--red)'}}>
            {inr(pData.margin)}
          </div>
          <div style={{fontSize:11.5,color:'var(--text-muted)',marginTop:2}}>{pData.marginPct}% of income</div>
        </div>

        {/* Income breakdown */}
        <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.5,color:'var(--green)',marginBottom:8}}>Income</div>
          <div className="flex justify-between" style={{marginBottom:4}}>
            <span style={{fontSize:12,color:'var(--text-secondary)'}}>Client Receipts</span>
            <span className="amount" style={{fontSize:12,fontWeight:600,color:'var(--green)'}}>{inr(pData.receiptIncome)}</span>
          </div>
          <div className="flex justify-between" style={{marginBottom:4}}>
            <span style={{fontSize:12,color:'var(--text-secondary)'}}>Payment Milestones</span>
            <span className="amount" style={{fontSize:12,fontWeight:600,color:'var(--green)'}}>{inr(pData.milestoneIncome)}</span>
          </div>
          <div className="flex justify-between" style={{paddingTop:6,borderTop:'1px solid var(--grey-50)'}}>
            <span style={{fontSize:12.5,fontWeight:700}}>Total Income</span>
            <span className="amount" style={{fontSize:12.5,fontWeight:700,color:'var(--green)'}}>{inr(pData.totalIncome)}</span>
          </div>
        </div>

        {/* Expenses breakdown */}
        <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.5,color:'var(--red)',marginBottom:8}}>Expenses (Paid)</div>
          <div className="flex justify-between" style={{marginBottom:4}}>
            <span style={{fontSize:12,color:'var(--text-secondary)'}}>Bills ({pData.billCount})</span>
            <span className="amount" style={{fontSize:12,color:'var(--red)'}}>{inr(pData.billExp)}</span>
          </div>
          <div className="flex justify-between" style={{marginBottom:4}}>
            <span style={{fontSize:12,color:'var(--text-secondary)'}}>Advance Payments</span>
            <span className="amount" style={{fontSize:12,color:'var(--red)'}}>{inr(pData.advanceExp)}</span>
          </div>
          <div className="flex justify-between" style={{marginBottom:4}}>
            <span style={{fontSize:12,color:'var(--text-secondary)'}}>Petty Cash ({pData.pettyCount})</span>
            <span className="amount" style={{fontSize:12,color:'var(--red)'}}>{inr(pData.pettyExp)}</span>
          </div>
          <div className="flex justify-between" style={{paddingTop:6,borderTop:'1px solid var(--grey-50)'}}>
            <span style={{fontSize:12.5,fontWeight:700}}>Total Expenses</span>
            <span className="amount" style={{fontSize:12.5,fontWeight:700,color:'var(--red)'}}>{inr(pData.totalExpenses)}</span>
          </div>
        </div>

        {/* Commitments */}
        <div style={{padding:'12px 16px',background:'var(--grey-50)'}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.5,color:'var(--amber)',marginBottom:8}}>Committed (Not Yet Paid)</div>
          <div className="flex justify-between" style={{marginBottom:4}}>
            <span style={{fontSize:12,color:'var(--text-secondary)'}}>Purchase Orders ({pData.poCount})</span>
            <span className="amount" style={{fontSize:12,color:'var(--amber)'}}>{inr(pData.poExp)}</span>
          </div>
          <div className="flex justify-between">
            <span style={{fontSize:12,color:'var(--text-secondary)'}}>Work Orders ({pData.woCount})</span>
            <span className="amount" style={{fontSize:12,color:'var(--amber)'}}>{inr(pData.woExp)}</span>
          </div>
          <div className="flex justify-between" style={{paddingTop:6,borderTop:'1px solid var(--border)',marginTop:6}}>
            <span style={{fontSize:12.5,fontWeight:700}}>Total Committed</span>
            <span className="amount" style={{fontSize:12.5,fontWeight:700,color:'var(--amber)'}}>{inr(pData.totalCommitted)}</span>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Project P&L</div>
          <div className="section-sub">Pontoon vs WTP — income, expenses, commitments</div>
        </div>
      </div>

      {/* Combined summary */}
      <div className="stats-grid" style={{gridTemplateColumns:'repeat(4,1fr)',marginBottom:20}}>
        <div className="stat-card"><div className="stat-label">Combined Income</div><div className="stat-value green">{inr(combined.totalIncome)}</div></div>
        <div className="stat-card"><div className="stat-label">Combined Expenses</div><div className="stat-value red">{inr(combined.totalExpenses)}</div></div>
        <div className="stat-card"><div className="stat-label">Combined Committed</div><div className="stat-value amber">{inr(combined.totalCommitted)}</div></div>
        <div className="stat-card">
          <div className="stat-label">Combined Net Margin</div>
          <div className={`stat-value ${combined.margin>=0?'green':'red'}`}>{inr(combined.margin)}</div>
        </div>
      </div>

      {/* Side-by-side P&L cards */}
      <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>
        <PnLCard label="Pontoon" pData={pontoon} color="var(--primary)" />
        <PnLCard label="WTP" pData={wtp} color="var(--secondary)" />
      </div>

      <div style={{marginTop:14,padding:'10px 14px',background:'var(--grey-50)',borderRadius:8,fontSize:11.5,color:'var(--text-muted)'}}>
        💡 Data reflects all entries tagged Pontoon, WTP, or Both. Entries tagged Both are counted in full for each project — they are not split. To see only this project's portion of shared expenses, adjust manually.
      </div>
    </div>
  );
}

const VENDORS_COLLECTION = 'vendors';
const VENDOR_CATEGORIES = ['Membrane Supplier','Pump-Equipment','Chemicals','Pipes-Fittings','Logistics','Electrical','Civil','Other'];

function useVendors() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(collection(db, VENDORS_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, (snap) => {
        setItems(snap.docs.map(d => ({ docId: d.id, ...d.data() })));
        setLoading(false);
      }, (err) => { console.error('Vendors listener error', err); setLoading(false); });
      return unsub;
    }
    if (window.fb) { const unsub = start(); return () => unsub && unsub(); }
    let unsub;
    const handler = () => { unsub = start(); };
    window.addEventListener('firebase-ready', handler, { once: true });
    return () => { window.removeEventListener('firebase-ready', handler); if (unsub) unsub(); };
  }, []);
  return { items, loading };
}
async function addVendor(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(collection(db, VENDORS_COLLECTION), { ...data, createdAt: Date.now() });
}
async function updateVendor(docId, data) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(doc(db, VENDORS_COLLECTION, docId), data);
}
async function deleteVendor(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, VENDORS_COLLECTION, docId));
}
async function clearAllVendors() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(collection(db, VENDORS_COLLECTION));
  const batch = writeBatch(db);

}

// PAYMENT SCHEDULE EDITOR — reusable, dynamic rows
// Each row: milestone name, percentage, amount (₹), date
// ════════════════════════════════════════════════════
function genRowId() { return 'r' + Math.random().toString(36).slice(2, 9); }

function PaymentScheduleEditor({ rows, setRows, totalValue }) {
  function addRow() {
    setRows([...rows, { id: genRowId(), name: '', pct: '', amount: '', date: '' }]);
  }
  function removeRow(id) {
    setRows(rows.filter(r => r.id !== id));
  }
  function updateRow(id, field, value) {
    setRows(rows.map(r => {
      if (r.id !== id) return r;
      const next = { ...r, [field]: value };
      // Auto-calc amount from percentage if total value is known and amount wasn't hand-edited this change
      if (field === 'pct' && totalValue) {
        const pctNum = parseFloat(value);
        if (!isNaN(pctNum)) next.amount = String(Math.round((pctNum / 100) * Number(totalValue)));
      }
      return next;
    }));
  }

  const pctTotal = rows.reduce((s, r) => s + (parseFloat(r.pct) || 0), 0);
  const amtTotal = rows.reduce((s, r) => s + (Number(r.amount) || 0), 0);
  const pctMismatch = rows.length > 0 && Math.abs(pctTotal - 100) > 0.01;

  return (
    <div className="form-group">
      <label className="form-label">Payment Schedule</label>
      {rows.length === 0 ? (
        <div style={{fontSize:11.5,color:'var(--text-muted)',padding:'8px 0'}}>No payment stages added yet.</div>
      ) : (
        <div style={{border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',marginBottom:8}}>
          <table style={{width:'100%'}}>
            <thead>
              <tr style={{background:'var(--grey-50)'}}>
                <th style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)'}}>Stage Name</th>
                <th style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)',width:70}}>%</th>
                <th style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)',width:110}}>Amount (₹)</th>
                <th style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)',width:130}}>Date</th>
                <th style={{width:30}}></th>
              </tr>
            </thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.id} style={{borderTop:'1px solid var(--grey-50)'}}>
                  <td style={{padding:4}}>
                    <input className="form-input" style={{fontSize:11.5,padding:'5px 7px'}} value={r.name}
                      onChange={e => updateRow(r.id, 'name', e.target.value)} placeholder="e.g. Advance" />
                  </td>
                  <td style={{padding:4}}>
                    <input className="form-input font-mono" style={{fontSize:11.5,padding:'5px 7px'}} value={r.pct}
                      onChange={e => updateRow(r.id, 'pct', e.target.value)} placeholder="20" />
                  </td>
                  <td style={{padding:4}}>
                    <input className="form-input font-mono" style={{fontSize:11.5,padding:'5px 7px'}} value={r.amount}
                      onChange={e => updateRow(r.id, 'amount', e.target.value)} placeholder="0" />
                  </td>
                  <td style={{padding:4}}>
                    <input className="form-input" type="date" style={{fontSize:11.5,padding:'5px 7px'}} value={r.date}
                      onChange={e => updateRow(r.id, 'date', e.target.value)} />
                  </td>
                  <td style={{padding:4,textAlign:'center'}}>
                    <span onClick={() => removeRow(r.id)} style={{cursor:'pointer',color:'var(--red)',fontSize:14}}>✕</span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      <div className="flex items-center justify-between">
        <button type="button" onClick={addRow} className="btn btn-sm btn-outline">+ Add Payment Stage</button>
        {rows.length > 0 && (
          <span style={{fontSize:11,color: pctMismatch ? 'var(--red)' : 'var(--text-muted)',fontWeight: pctMismatch ? 600 : 400}}>
            Total: {pctTotal}% {pctMismatch && '⚠ should total 100%'} · {inr(amtTotal)}
          </span>
        )}
      </div>
    </div>
  );
}

const QUOTATIONS_COLLECTION = 'quotations';
const QUOTE_STAGES = ['Receipt of Quotation','Negotiation','Finalization of T&C','Issuing of PO/WO'];

function useQuotations() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(collection(db, QUOTATIONS_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, (snap) => {
        setItems(snap.docs.map(d => ({ docId: d.id, ...d.data() })));
        setLoading(false);
      }, (err) => { console.error('Quotations listener error', err); setLoading(false); });
      return unsub;
    }
    if (window.fb) { const unsub = start(); return () => unsub && unsub(); }
    let unsub;
    const handler = () => { unsub = start(); };
    window.addEventListener('firebase-ready', handler, { once: true });
    return () => { window.removeEventListener('firebase-ready', handler); if (unsub) unsub(); };
  }, []);
  return { items, loading };
}
async function addQuotation(data) {
  const { db, collection, addDoc } = window.fb;
  const ref = await addDoc(collection(db, QUOTATIONS_COLLECTION), { ...data, createdAt: Date.now() });
  return ref.id;
}
async function updateQuotation(docId, data) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(doc(db, QUOTATIONS_COLLECTION, docId), data);
}
async function deleteQuotation(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, QUOTATIONS_COLLECTION, docId));
}
async function clearAllQuotations() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(collection(db, QUOTATIONS_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

      try { await updateQuotation(q.docId, { stage: QUOTE_STAGES[idx+1] }); }
      catch(e) { console.error(e); alert('Could not update stage.'); }

  return (

const MILESTONES_COLLECTION = 'milestones';

function useMilestones() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(collection(db, MILESTONES_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, (snap) => {
        setItems(snap.docs.map(d => ({ docId: d.id, ...d.data() })));
        setLoading(false);
      }, (err) => { console.error('Milestones listener error', err); setLoading(false); });
      return unsub;
    }
    if (window.fb) { const unsub = start(); return () => unsub && unsub(); }
    let unsub;
    const handler = () => { unsub = start(); };
    window.addEventListener('firebase-ready', handler, { once: true });
    return () => { window.removeEventListener('firebase-ready', handler); if (unsub) unsub(); };
  }, []);
  return { items, loading };
}
async function addMilestone(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(collection(db, MILESTONES_COLLECTION), { ...data, createdAt: Date.now(), paid: false });
}
async function markMilestonePaid(docId) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(doc(db, MILESTONES_COLLECTION, docId), { paid: true, paidAt: Date.now() });
}
async function deleteMilestone(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, MILESTONES_COLLECTION, docId));
}
async function clearAllMilestones() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(collection(db, MILESTONES_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

  const [saving, setSaving] = useState(false);

    if (!form.name.trim() || !form.amount || !form.due) return;
    setSaving(true);
    try {

        const { db, doc, updateDoc } = window.fb;
        await updateDoc(doc(db, MILESTONES_COLLECTION, existing.docId), { ...form, amount: Number(form.amount) });

        await addMilestone({ ...form, amount: Number(form.amount) });

function PaymentTracker() {
  const { items, loading } = useMilestones();
  const { items: pos } = usePurchaseOrders();
  const [showNew, setShowNew] = useState(false);
  const [editMilestone, setEditMilestone] = useState(null);

  const todayStr = new Date().toISOString().slice(0,10);
  const withStatus = items.map(m => {
    let status;
    if (m.paid) status = 'Paid';
    else if (m.due === todayStr) status = 'Due';
    else if (m.due < todayStr) status = 'Overdue';
    else status = 'Upcoming';
    const days = (status === 'Overdue' && m.due) ? Math.floor((new Date(todayStr) - new Date(m.due)) / 86400000) : 0;
    return { ...m, computedStatus: status, days };
  });

  const totalCollected = withStatus.filter(m => m.paid).reduce((s,m) => s + Number(m.amount||0), 0);
  const overdueTotal = withStatus.filter(m => m.computedStatus === 'Overdue').reduce((s,m) => s + Number(m.amount||0), 0);
  const next7 = new Date(Date.now() + 7*86400000).toISOString().slice(0,10);
  const dueWeekTotal = withStatus.filter(m => !m.paid && m.due >= todayStr && m.due <= next7).reduce((s,m) => s + Number(m.amount||0), 0);
  const next30 = new Date(Date.now() + 30*86400000).toISOString().slice(0,10);
  const upcoming30 = withStatus.filter(m => !m.paid && m.due > next7 && m.due <= next30).reduce((s,m) => s + Number(m.amount||0), 0);

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Payment Tracker</div>

        <div className="stat-card"><div className="stat-label">Overdue</div><div className="stat-value red">{inr(overdueTotal)}</div></div>
        <div className="stat-card"><div className="stat-label">Due This Week</div><div className="stat-value amber">{inr(dueWeekTotal)}</div></div>
        <div className="stat-card"><div className="stat-label">Upcoming 30 Days</div><div className="stat-value blue">{inr(upcoming30)}</div></div>
      </div>
      <div className="card">
        {loading ? (
          <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
        ) : withStatus.length === 0 ? (
          <div className="module-coming">
            <div className="big-icon">💳</div>
            <h3>No payment milestones yet</h3>
            <p className="text-muted">Add your first milestone — saved permanently to your database.</p>
          </div>

            <thead>
              <tr><th>Milestone</th><th>%</th><th>Amount</th><th>Due Date</th><th>Status</th><th>PO #</th><th>WO #</th><th>Action</th></tr>
            </thead>
            <tbody>
              {withStatus.map(m => (
                <tr key={m.docId} className={m.computedStatus==='Overdue'?'overdue':m.computedStatus==='Due'?'due-today':''}>
                  <td className="fw-600">{m.name}</td>
                  <td>{m.pct}</td>
                  <td className="amount fw-600">{inr(m.amount||0)}</td>
                  <td>{m.due}{m.days > 0 && <span style={{color:'var(--red)',fontWeight:600}}> +{m.days}d</span>}</td>
                  <td><span className={`badge ${m.computedStatus==='Paid'?'green':m.computedStatus==='Overdue'?'red':m.computedStatus==='Due'?'amber':'blue'}`}>{m.computedStatus}</span></td>

                      </div>
                    ) : (
                      <span className="text-muted text-sm">✓ Received</span>

              ))}

      if (item.scope === 'tasks') {
        await clearAllTasks();

        await clearAllWorkOrders();

      } else if (item.scope === 'vendors') {
        await clearAllVendors();

      console.error(e);

      setWorking(false);

// Global lists — updated by useLists hook on mount
window.appLists = { ...DEFAULT_LISTS };

function useLists() {
  const [lists, setLists] = useState(window.appLists);
  useEffect(() => {
    function start() {
      const { db, doc, onSnapshot } = window.fb;
      const unsub = onSnapshot(doc(db, 'settings', 'lists'), snap => {
        if (snap.exists()) {
          const data = snap.data();
          // Merge with defaults so any missing key falls back
          const merged = { ...DEFAULT_LISTS, ...data };
          window.appLists = merged;
          setLists(merged);
        }
      }, err => console.error('Lists listener', err));
      return unsub;
    }
    if (window.fb) { const u = start(); return () => u && u(); }
    let u; const h = () => { u = start(); };
    window.addEventListener('firebase-ready', h, { once: true });
    return () => { window.removeEventListener('firebase-ready', h); if (u) u(); };
  }, []);
  return lists;
}

async function saveLists(lists) {
  const { db, doc, setDoc } = window.fb;
  await setDoc(doc(db, 'settings', 'lists'), lists, { merge: true });
  window.appLists = { ...window.appLists, ...lists };
}

// ─── Lists Manager Component ──────────────────────────
function ListsManager() {
  const lists = useLists();
  const [localLists, setLocalLists] = useState(null);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [newItems, setNewItems] = useState({});
  const [dragging, setDragging] = useState(null);   // { listKey, idx }
  const [dragTarget, setDragTarget] = useState(null); // { listKey, idx }

  useEffect(() => { setLocalLists({ ...lists }); }, [JSON.stringify(lists)]);

  if (!localLists) return <div style={{padding:16,color:'var(--text-muted)',fontSize:12}}>Loading lists…</div>;

  function removeItem(listKey, idx) {
    setLocalLists(l => ({ ...l, [listKey]: l[listKey].filter((_,i) => i !== idx) }));
  }

  function addItem(listKey) {
    const val = (newItems[listKey] || '').trim();
    if (!val) return;
    if (localLists[listKey].map(s=>s.toLowerCase()).includes(val.toLowerCase())) return;
    setLocalLists(l => ({ ...l, [listKey]: [...l[listKey], val] }));
    setNewItems(n => ({ ...n, [listKey]: '' }));
  }

  function onDragStart(listKey, idx) {
    setDragging({ listKey, idx });
  }
  function onDragEnter(listKey, idx) {
    setDragTarget({ listKey, idx });
  }
  function onDragEnd(listKey) {
    if (!dragging || !dragTarget) { setDragging(null); setDragTarget(null); return; }
    if (dragging.listKey !== listKey || dragging.idx === dragTarget.idx) {
      setDragging(null); setDragTarget(null); return;
    }
    setLocalLists(l => {
      const arr = [...l[listKey]];
      const [moved] = arr.splice(dragging.idx, 1);
      arr.splice(dragTarget.idx, 0, moved);
      return { ...l, [listKey]: arr };
    });
    setDragging(null);
    setDragTarget(null);
  }

  async function handleSave() {
    setSaving(true);
    try {
      await saveLists(localLists);
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);
    } catch(e) { console.error(e); alert('Could not save.'); }
    finally { setSaving(false); }
  }

  const SECTIONS = [
    { key: 'employees',       label: '👷 Employees',              desc: 'Task assigned-to · Petty Cash paid-by' },
    { key: 'pettyCategories', label: '💰 Petty Cash Categories',  desc: 'Petty Cash entry category' },
    { key: 'billCategories',  label: '📑 Bill Categories',        desc: 'Bill Payments category' },
    { key: 'paymentModes',    label: '💳 Payment Modes',          desc: 'Advances · Receipts · Capital & Loans' },
    { key: 'capitalTypes',    label: '🏦 Capital / Loan Types',   desc: 'Capital & Loans type selector' },
    { key: 'reqCategories',   label: '📝 Requisition Categories', desc: 'Requisitions category' },
    { key: 'reqPriorities',   label: '🔺 Requisition Priorities', desc: 'Requisitions priority' },
  ];

  return (
    <div className="card">
      <div className="card-header" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span className="card-title">Lists Manager</span>
        <button className="btn btn-sm btn-primary" onClick={handleSave} disabled={saving}>
          {saving ? 'Saving…' : saved ? '✓ Saved' : 'Save All Changes'}
        </button>
      </div>
      <div className="card-body">
        <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:16}}>
          Drag ☰ to reorder · × to remove · type and press Enter to add. Changes apply everywhere after saving.
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          {SECTIONS.map(sec => (
            <div key={sec.key} style={{border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
              {/* Header */}
              <div style={{background:'var(--grey-50)',padding:'8px 12px',borderBottom:'1px solid var(--border)'}}>
                <div style={{fontWeight:700,fontSize:12.5}}>{sec.label}</div>
                <div style={{fontSize:10.5,color:'var(--text-muted)',marginTop:1}}>{sec.desc}</div>
              </div>
              <div style={{padding:'8px 12px'}}>
                {/* Draggable items */}
                <div style={{marginBottom:8}}>
                  {localLists[sec.key].length === 0 && (
                    <div style={{fontSize:11.5,color:'var(--text-muted)',padding:'6px 0'}}>No items — add one below.</div>
                  )}
                  {localLists[sec.key].map((item, idx) => (
                    <div
                      key={idx}
                      draggable
                      onDragStart={() => onDragStart(sec.key, idx)}
                      onDragEnter={() => onDragEnter(sec.key, idx)}
                      onDragEnd={() => onDragEnd(sec.key)}
                      onDragOver={e => e.preventDefault()}
                      style={{
                        display:'flex', alignItems:'center', justifyContent:'space-between',
                        padding:'5px 4px', borderBottom:'1px solid var(--grey-50)',
                        cursor:'grab', userSelect:'none',
                        background: dragging?.listKey===sec.key && dragging?.idx===idx ? 'var(--primary-50)' :
                                    dragTarget?.listKey===sec.key && dragTarget?.idx===idx ? 'var(--grey-50)' : '',
                        borderRadius:4,
                        opacity: dragging?.listKey===sec.key && dragging?.idx===idx ? 0.5 : 1,
                      }}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span style={{color:'var(--text-muted)',fontSize:13,cursor:'grab'}}>☰</span>
                        <span style={{fontSize:12.5}}>{item}</span>
                      </div>
                      <span
                        onClick={() => removeItem(sec.key, idx)}
                        style={{cursor:'pointer',color:'var(--red)',fontSize:17,lineHeight:1,padding:'0 4px',flexShrink:0}}
                        title="Remove">×</span>
                    </div>
                  ))}
                </div>
                {/* Add new */}
                <div style={{display:'flex',gap:6}}>
                  <input
                    className="form-input"
                    style={{fontSize:12,padding:'5px 8px',flex:1}}
                    value={newItems[sec.key] || ''}
                    onChange={e => setNewItems(n => ({ ...n, [sec.key]: e.target.value }))}

              </div>
            </div>
          ))}
        </div>

  );

function can(user, action, customPerms) {

}

function LoginScreen({ onLogin }) {

    try {
      const { auth, signInWithEmailAndPassword, db, doc } = window.fb;
      // Sign in with Firebase Auth
      const cred = await signInWithEmailAndPassword(auth, email.trim(), password);
      const uid = cred.user.uid;
      // Fetch user profile from Firestore users collection
      const { getDoc } = await Promise.resolve({ getDoc: async (ref) => {
        return new Promise((resolve, reject) => {
          const { onSnapshot } = window.fb;
          const unsub = onSnapshot(ref, snap => { unsub(); resolve(snap); }, reject);
        });
      }});
      const userRef = doc(db, 'users', uid);
      const snap = await getDoc(userRef);
      let profile;
      if (snap.exists()) {
        const data = snap.data();
        profile = {
          uid,
          name: data.name || cred.user.email,
          email: cred.user.email,
          initials: data.initials || (data.name ? data.name[0].toUpperCase() : 'U'),

          uid,
          name: cred.user.email,
          email: cred.user.email,
          initials: cred.user.email[0].toUpperCase(),
          role: 'viewer'
        };

const REQ_PRIORITIES = ['Urgent','Normal','Low'];

function useRequisitions() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(collection(db, REQ_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, snap => {
        setItems(snap.docs.map(d => ({ docId: d.id, ...d.data() })));
        setLoading(false);
      }, err => { console.error('REQ listener', err); setLoading(false); });
      return unsub;
    }
    if (window.fb) { const u = start(); return () => u && u(); }
    let u; const h = () => { u = start(); };
    window.addEventListener('firebase-ready', h, { once: true });
    return () => { window.removeEventListener('firebase-ready', h); if (u) u(); };
  }, []);
  return { items, loading };
}
async function addRequisition(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(collection(db, REQ_COLLECTION), { ...data, createdAt: Date.now() });
}
async function updateRequisition(docId, data) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(doc(db, REQ_COLLECTION, docId), data);
}
async function deleteRequisition(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, REQ_COLLECTION, docId));
}
async function clearAllRequisitions() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(collection(db, REQ_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

function nextREQNumber(count) { return `REQ/${FY}/${String(count+1).padStart(3,'0')}`; }

function LineItemEditor({ items, setItems }) {
  function addItem() { setItems([...items, { id: genRowId(), name:'', qty:'', unit:'', estimatedValue:'' }]); }
  function removeItem(id) { setItems(items.filter(r => r.id !== id)); }
  function updateItem(id, field, value) { setItems(items.map(r => r.id===id ? {...r,[field]:value} : r)); }

  return (
    <div className="form-group">
      <label className="form-label">Items Required</label>
      {items.length === 0
        ? <div style={{fontSize:11.5,color:'var(--text-muted)',padding:'6px 0'}}>No items added yet.</div>
        : (
          <div style={{border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',marginBottom:8}}>
            <table style={{width:'100%'}}>
              <thead>
                <tr style={{background:'var(--grey-50)'}}>
                  {['Item Description','Qty','Unit','Est. Value (₹)',''].map((h,i) => (
                    <th key={i} style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {items.map(r => (
                  <tr key={r.id} style={{borderTop:'1px solid var(--grey-50)'}}>
                    <td style={{padding:4}}><input className="form-input" style={{fontSize:11.5,padding:'5px 7px'}} value={r.name} onChange={e=>updateItem(r.id,'name',e.target.value)} placeholder="e.g. RO Membrane 4040" /></td>
                    <td style={{padding:4,width:70}}><input className="form-input font-mono" style={{fontSize:11.5,padding:'5px 7px'}} value={r.qty} onChange={e=>updateItem(r.id,'qty',e.target.value)} placeholder="5" /></td>
                    <td style={{padding:4,width:80}}><input className="form-input" style={{fontSize:11.5,padding:'5px 7px'}} value={r.unit} onChange={e=>updateItem(r.id,'unit',e.target.value)} placeholder="Nos" /></td>
                    <td style={{padding:4,width:110}}><input className="form-input font-mono" style={{fontSize:11.5,padding:'5px 7px'}} value={r.estimatedValue} onChange={e=>updateItem(r.id,'estimatedValue',e.target.value)} placeholder="0" /></td>
                    <td style={{padding:4,textAlign:'center',width:30}}><span onClick={()=>removeItem(r.id)} style={{cursor:'pointer',color:'var(--red)',fontSize:14}}>✕</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )
      }
      <button type="button" onClick={addItem} className="btn btn-sm btn-outline">+ Add Item</button>
    </div>
  );
}

function NewRequisitionModal({ onClose, nextNumber, currentUser, existing }) {
  const isEdit = !!existing;
  const [form, setForm] = useState(isEdit ? {
    req: existing.req||nextNumber, date: existing.date||'',
    raisedBy: existing.raisedBy||currentUser.name, raisedByUid: existing.raisedByUid||currentUser.uid,
    category: existing.category||'Materials', priority: existing.priority||'Normal',
    projectRef: existing.projectRef||'', description: existing.description||'', status: existing.status||'Open', project: existing.project||''
  } : {
    req: nextNumber, date: new Date().toISOString().slice(0,10),
    raisedBy: currentUser.name, raisedByUid: currentUser.uid,
    category: 'Materials', priority: 'Normal', projectRef: '', description: '', status: 'Open', project: ''
  });
  const [lineItems, setLineItems] = useState(isEdit && existing.lineItems ? existing.lineItems : []);
  const [saving, setSaving] = useState(false);
  function set(f,v) { setForm(s=>({...s,[f]:v})); }

  async function handleSave() {
    if (!form.description.trim()) return;
    setSaving(true);
    try {
      if (isEdit) {
        const { db, doc, updateDoc } = window.fb;
        await updateDoc(doc(db, REQ_COLLECTION, existing.docId), { ...form, lineItems, totalEstimated: lineItems.reduce((s,r)=>s+Number(r.estimatedValue||0),0) });
      } else {
        await addRequisition({ ...form, lineItems, totalEstimated: lineItems.reduce((s,r)=>s+Number(r.estimatedValue||0),0) });
      }
      onClose();
    } catch(e) { console.error(e); alert('Could not save requisition.'); }
    finally { setSaving(false); }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'var(--surface)',borderRadius:10,width:640,maxHeight:'92vh',overflowY:'auto',boxShadow:'0 8px 40px rgba(0,0,0,.22)'}} onClick={e=>e.stopPropagation()}>
        <div style={{background:'var(--primary-dark)',padding:'14px 18px',position:'sticky',top:0,zIndex:1}}>
          <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>{isEdit ? '✏ Edit Requisition' : '+ New Requisition'}</span>
        </div>
        <div style={{padding:'18px 20px'}}>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">REQ Number</label>
              <input className="form-input font-mono" value={form.req} onChange={e=>set('req',e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Date</label>
              <input className="form-input" type="date" value={form.date} onChange={e=>set('date',e.target.value)} />
            </div>
          </div>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Raised By</label>
              <input className="form-input" value={form.raisedBy} readOnly style={{background:'var(--grey-50)',color:'var(--text-muted)'}} />
            </div>
            <div className="form-group">
              <label className="form-label">Priority</label>
              <select className="form-input form-select" value={form.priority} onChange={e=>set('priority',e.target.value)}>
                {(window.appLists?.reqPriorities||DEFAULT_LISTS.reqPriorities).map(p=><option key={p}>{p}</option>)}
              </select>
            </div>
          </div>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Category</label>
              <select className="form-input form-select" value={form.category} onChange={e=>set('category',e.target.value)}>
                {(window.appLists?.reqCategories||DEFAULT_LISTS.reqCategories).map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Project / Site (optional)</label>
              <input className="form-input" value={form.project} onChange={e=>set('project',e.target.value)} placeholder="e.g. Green Valley CHS WTP" />
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Description / Purpose</label>
            <textarea className="form-input" rows="2" value={form.description} onChange={e=>set('description',e.target.value)} placeholder="What is needed and why" style={{resize:'vertical'}} />
          </div>
          <LineItemEditor items={lineItems} setItems={setLineItems} />
          <ProjectSelect value={form.project} onChange={v=>setForm(s=>({...s,project:v}))} required />
        </div>
        <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={handleSave} disabled={saving||!form.description.trim()} className="btn btn-primary"
            style={{opacity: (saving||!form.description.trim()) ? 0.6 : 1}}>
            {saving?'Saving…': isEdit ? 'Save Changes' : 'Submit Requisition'}
          </button>
        </div>
      </div>
    </div>
  );
}

const REQ_STATUS_COLOR = { 'Open':'blue','Quotations Invited':'amber','Quotation Approved':'teal','PO/WO Issued':'green','Closed':'grey' };
const REQ_PRIORITY_COLOR = { 'Urgent':'red','Normal':'blue','Low':'grey' };

function Requisitions({ currentUser }) {
  const { items, loading } = useRequisitions();
  const [showNew, setShowNew] = useState(false);
  const [statusFilter, setStatusFilter] = useState('all');
  const [expandedId, setExpandedId] = useState(null);
  const [editReq, setEditReq] = useState(null);

  const nextNumber = nextREQNumber(items.length);
  const filtered = statusFilter==='all' ? items : items.filter(r=>r.status===statusFilter);

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Requisitions</div>
          <div className="section-sub">{loading?'Loading…':`${items.length} requisition${items.length===1?'':'s'} · Next: ${nextNumber}`}</div>
        </div>
        <div className="flex gap-2">
          <PermGate user={currentUser} action="raise_requisition" fallback={<span style={{fontSize:11,color:'var(--text-muted)'}}>No permission to raise requisitions</span>}>
            <button className="btn btn-primary" onClick={()=>setShowNew(true)}>+ New Requisition</button>
          </PermGate>
          <ClearCollectionButton label="Clear All" count={items.length} onClear={clearAllRequisitions} />
        </div>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="card-body" style={{paddingTop:10,paddingBottom:10}}>
          <select className="form-input form-select" style={{width:180}} onChange={e=>setStatusFilter(e.target.value)}>
            <option value="all">All Status</option>
            {REQ_STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
      </div>

      <div className="card">
        {loading ? (
          <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
        ) : filtered.length===0 ? (
          <div className="module-coming">
            <div className="big-icon">📝</div>
            <h3>No requisitions yet</h3>
            <p className="text-muted">Raise a requisition to start the procurement process.</p>
          </div>
        ) : (
          <table>
            <thead>
              <tr><th>REQ #</th><th>Date</th><th>Raised By</th><th>Category</th><th>Description</th><th>Priority</th><th>Est. Value</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody>
              {filtered.map(r=>(
                <React.Fragment key={r.docId}>
                  <tr style={{cursor:'pointer'}} onClick={()=>setExpandedId(expandedId===r.docId?null:r.docId)}>
                    <td className="mono" style={{whiteSpace:'nowrap'}}>{r.req}</td>
                    <td>{r.date}</td>
                    <td>{r.raisedBy}</td>
                    <td><span className="badge teal">{r.category}</span></td>
                    <td className="fw-600">{r.description}</td>
                    <td><span className={`badge ${REQ_PRIORITY_COLOR[r.priority]||'grey'}`}>{r.priority}</span></td>
                    <td className="amount">{inr(r.totalEstimated||0)}</td>
                    <td><span className={`badge ${REQ_STATUS_COLOR[r.status]||'grey'}`}>{r.status}</span></td>
                    <td>
                      <div className="flex gap-2">
                        <button className="btn btn-sm btn-ghost" onClick={e=>{e.stopPropagation();setEditReq(r);}}>Edit</button>
                      <button className="btn btn-sm btn-ghost" onClick={e=>{e.stopPropagation();setExpandedId(expandedId===r.docId?null:r.docId)}}>
                          {expandedId===r.docId?'▲':'▼'} Details
                        </button>
                        <button className="btn btn-sm btn-ghost" onClick={e=>{e.stopPropagation();if(confirm('Delete?'))deleteRequisition(r.docId);}}>Delete</button>
                      </div>
                    </td>
                  </tr>
                  {expandedId===r.docId && (
                    <tr>
                      <td colSpan={9} style={{background:'var(--grey-50)',padding:'12px 16px'}}>
                        <div className="flex gap-3" style={{flexWrap:'wrap',marginBottom:8}}>
                          {r.project && <span style={{fontSize:11.5}}><strong>Project:</strong> {r.project}</span>}
                          <span style={{fontSize:11.5}}><strong>Raised by:</strong> {r.raisedBy} on {r.date}</span>
                        </div>
                        {r.lineItems && r.lineItems.length>0 && (
                          <table style={{width:'100%',background:'var(--surface)',borderRadius:6,overflow:'hidden'}}>
                            <thead><tr style={{background:'var(--primary-50)'}}>
                              <th style={{fontSize:10,padding:'5px 8px',textAlign:'left',color:'var(--primary)'}}>Item</th>
                              <th style={{fontSize:10,padding:'5px 8px',textAlign:'left',color:'var(--primary)'}}>Qty</th>
                              <th style={{fontSize:10,padding:'5px 8px',textAlign:'left',color:'var(--primary)'}}>Unit</th>
                              <th style={{fontSize:10,padding:'5px 8px',textAlign:'left',color:'var(--primary)'}}>Est. Value</th>
                            </tr></thead>
                            <tbody>
                              {r.lineItems.map((li,i)=>(
                                <tr key={i} style={{borderTop:'1px solid var(--grey-50)'}}>
                                  <td style={{padding:'5px 8px',fontSize:12}}>{li.name}</td>
                                  <td style={{padding:'5px 8px',fontSize:12}}>{li.qty}</td>
                                  <td style={{padding:'5px 8px',fontSize:12}}>{li.unit}</td>
                                  <td style={{padding:'5px 8px',fontSize:12}} className="amount">{inr(li.estimatedValue||0)}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        )}
                        <div className="flex gap-2" style={{marginTop:10}}>
                          <select className="form-input form-select" style={{width:200,fontSize:11.5}} defaultValue={r.status}
                            onChange={async e=>{try{await updateRequisition(r.docId,{status:e.target.value});}catch(err){alert('Could not update.')}}}>
                            {REQ_STATUSES.map(s=><option key={s}>{s}</option>)}
                          </select>
                          <span style={{fontSize:11,color:'var(--text-muted)',alignSelf:'center'}}>Update status</span>
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              ))}
            </tbody>
          </table>
        )}
      </div>
      {showNew && <NewRequisitionModal onClose={()=>setShowNew(false)} nextNumber={nextNumber} currentUser={currentUser} />}
      {editReq && <NewRequisitionModal onClose={()=>setEditReq(null)} nextNumber={nextNumber} currentUser={currentUser} existing={editReq} />}
    </div>
  );
}

// CROSS-REFERENCE VIEWER
// Search any document number → see the full chain
// ════════════════════════════════════════════════════
function CrossReference() {
  const { items: reqs } = useRequisitions();
  const { items: quotes } = useQuotations();
  const { items: pos } = usePurchaseOrders();
  const { items: wos } = useWorkOrders();
  const { items: milestones } = useMilestones();
  const [search, setSearch] = useState('');
  const [result, setResult] = useState(null);

  function findChain(query) {
    const q = query.trim().toUpperCase();
    if (!q) { setResult(null); return; }

    // Find starting point — could be REQ, QUOT, PO, WO
    let chain = { query: q, req: null, quotations: [], approvedQuote: null, po: null, wo: null, milestones: [] };

    // Try match as REQ
    const req = reqs.find(r => (r.req||'').toUpperCase().includes(q));
    if (req) {
      chain.req = req;
      chain.quotations = quotes.filter(qt => qt.linkedReq === req.docId || qt.linkedReq === req.req);
      chain.approvedQuote = chain.quotations.find(qt => qt.approved);
      if (chain.approvedQuote) {
        chain.po = pos.find(p => p.linkedQuotation === chain.approvedQuote.docId);
        chain.wo = wos.find(w => w.linkedQuotation === chain.approvedQuote.docId);
      }
    }
    // Try as QUOT
    if (!chain.req) {
      const qt = quotes.find(qt => (qt.quotNo||'').toUpperCase().includes(q) || (qt.vendorName||'').toUpperCase().includes(q));
      if (qt) {
        chain.approvedQuote = qt.approved ? qt : null;
        chain.quotations = [qt];
        chain.req = reqs.find(r => r.docId === qt.linkedReq || r.req === qt.linkedReq);
        chain.po = pos.find(p => p.linkedQuotation === qt.docId);
        chain.wo = wos.find(w => w.linkedQuotation === qt.docId);
      }
    }
    // Try as PO
    if (!chain.req && !chain.quotations.length) {
      const po = pos.find(p => (p.po||'').toUpperCase().includes(q));
      if (po) {
        chain.po = po;
        const qt = quotes.find(qt => qt.docId === po.linkedQuotation);
        if (qt) { chain.quotations = [qt]; chain.approvedQuote = qt.approved ? qt : null; chain.req = reqs.find(r=>r.docId===qt.linkedReq); }
      }
    }
    // Try as WO
    if (!chain.req && !chain.quotations.length && !chain.po) {
      const wo = wos.find(w => (w.wo||'').toUpperCase().includes(q));
      if (wo) {
        chain.wo = wo;
        const qt = quotes.find(qt => qt.docId === wo.linkedQuotation);
        if (qt) { chain.quotations = [qt]; chain.approvedQuote = qt.approved ? qt : null; chain.req = reqs.find(r=>r.docId===qt.linkedReq); }
      }
    }

    if (chain.po) chain.milestones = milestones.filter(m => m.po === chain.po.po);
    setResult(chain);
  }

  const ChainStep = ({ icon, color, label, number, details, found }) => (
    <div style={{display:'flex',gap:0,alignItems:'stretch'}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',width:40,flexShrink:0}}>
        <div style={{width:32,height:32,borderRadius:'50%',background:found?color:'var(--grey-50)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,border:`2px solid ${found?color:'var(--border)'}`}}>
          {found ? icon : '○'}
        </div>
        <div style={{flex:1,width:2,background:'var(--border)',margin:'2px 0'}} />
      </div>
      <div style={{flex:1,paddingBottom:16,paddingLeft:10}}>
        <div style={{fontSize:11,fontWeight:700,color:found?color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:.5}}>{label}</div>
        {found && number && <div className="font-mono" style={{fontSize:12,fontWeight:700,color:'var(--text)',marginTop:2}}>{number}</div>}
        {found && details && <div style={{fontSize:11.5,color:'var(--text-muted)',marginTop:2}}>{details}</div>}
        {!found && <div style={{fontSize:11.5,color:'var(--text-muted)',marginTop:2}}>Not found</div>}
      </div>
    </div>
  );

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Cross-Reference</div>
          <div className="section-sub">Trace any document through the full procurement chain</div>
        </div>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div className="card-body">
          <div className="flex gap-2 items-center">
            <div className="search-wrap" style={{flex:1}}>
              <span className="search-icon">🔍</span>
              <input className="form-input" value={search}
                onChange={e=>setSearch(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&findChain(search)}
                placeholder="Type a REQ, QUOT, PO, WO number or vendor name…" style={{maxWidth:440}} />
            </div>
            <button className="btn btn-primary" onClick={()=>findChain(search)}>Trace</button>
            {result && <button className="btn btn-ghost" onClick={()=>{setResult(null);setSearch('');}}>Clear</button>}
          </div>
        </div>
      </div>

      {result && (
        <div className="card">
          <div className="card-header">
            <span className="card-title">Procurement Chain — "{result.query}"</span>
          </div>
          <div className="card-body" style={{padding:'20px 24px'}}>
            <ChainStep icon="📝" color="var(--primary)" label="Requisition" found={!!result.req}
              number={result.req?.req}
              details={result.req ? `${result.req.description} · Raised by ${result.req.raisedBy} · ${result.req.status}` : null} />

            <ChainStep icon="📋" color="var(--amber)" label={`Quotations (${result.quotations.length})`} found={result.quotations.length>0}
              number={result.quotations.map(q=>q.quotNo||q.vendorName).join(', ')}
              details={result.quotations.length>0 ? result.quotations.map(q=>`${q.vendorName} — ${inr(q.value||0)} [${q.approved?'✓ Approved':q.stage}]`).join(' · ') : null} />

            <ChainStep icon="✅" color="var(--secondary)" label="Approved Quotation" found={!!result.approvedQuote}
              number={result.approvedQuote?.quotNo || result.approvedQuote?.vendorName}
              details={result.approvedQuote ? `${inr(result.approvedQuote.value||0)} · Approved` : null} />

            <ChainStep icon="📦" color="var(--primary)" label="Purchase Order" found={!!result.po}
              number={result.po?.po}
              details={result.po ? `${result.po.vendorName} — ${inr(result.po.value||0)} · ${result.po.stage}` : null} />

            <ChainStep icon="🔧" color="var(--secondary)" label="Work Order" found={!!result.wo}
              number={result.wo?.wo}
              details={result.wo ? `${result.wo.vendorName} — ${inr(result.wo.value||0)} · ${result.wo.stage}` : null} />

            <div style={{display:'flex',gap:0,alignItems:'stretch'}}>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',width:40,flexShrink:0}}>
                <div style={{width:32,height:32,borderRadius:'50%',background:result.milestones.length>0?'var(--green)':'var(--grey-50)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,border:`2px solid ${result.milestones.length>0?'var(--green)':'var(--border)'}`}}>
                  {result.milestones.length>0?'💳':'○'}
                </div>
              </div>
              <div style={{flex:1,paddingLeft:10}}>
                <div style={{fontSize:11,fontWeight:700,color:result.milestones.length>0?'var(--green)':'var(--text-muted)',textTransform:'uppercase',letterSpacing:.5}}>Payment Milestones ({result.milestones.length})</div>
                {result.milestones.length>0
                  ? result.milestones.map((m,i)=>(
                      <div key={i} style={{fontSize:11.5,color:'var(--text-muted)',marginTop:2}}>
                        {m.name} — {inr(m.amount||0)} · <span className={`badge ${m.paid?'green':'blue'}`} style={{fontSize:10}}>{m.paid?'Paid':'Pending'}</span>
                      </div>
                    ))
                  : <div style={{fontSize:11.5,color:'var(--text-muted)',marginTop:2}}>No payment milestones linked</div>
                }
              </div>
            </div>
          </div>

function usePermSettings() {
  const [perms, setPerms] = useState(DEFAULT_PERMISSIONS);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    function start() {
      const { db, doc, onSnapshot } = window.fb;
      const unsub = onSnapshot(doc(db, 'settings', 'permissions'), snap => {
        if (snap.exists()) setPerms(s => ({ ...DEFAULT_PERMISSIONS, ...snap.data() }));
        setLoading(false);
      }, () => setLoading(false));
      return unsub;
    }
    if (window.fb) { const u = start(); return () => u && u(); }
    let u; const h = () => { u = start(); };
    window.addEventListener('firebase-ready', h, { once: true });
    return () => { window.removeEventListener('firebase-ready', h); if (u) u(); };
  }, []);

  async function savePerms(newPerms) {
    const { db, doc, setDoc } = window.fb;
    await setDoc(doc(db, 'settings', 'permissions'), newPerms, { merge: true });
  }

  return { perms, setPerms, savePerms, loading };
}

function PermissionMatrix({ currentUser }) {
  const { perms, setPerms, savePerms } = usePermSettings();
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  function toggle(role, action) {
    if (role === 'owner') return; // owner always has all permissions
    setPerms(p => ({ ...p, [role]: { ...(p[role]||{}), [action]: !(p[role]||{})[action] } }));
  }

  async function handleSave() {
    setSaving(true);
    try { await savePerms(perms); setSaved(true); setTimeout(()=>setSaved(false),2000); }
    catch(e) { console.error(e); alert('Could not save permissions.'); }
    finally { setSaving(false); }
  }

  return (
    <div className="card">
      <div className="card-header">
        <span className="card-title">Role & Permission Matrix</span>
        <PermGate user={currentUser} action="edit_settings">
          <button className="btn btn-sm btn-primary" onClick={handleSave} disabled={saving}>
            {saving?'Saving…':saved?'✓ Saved':'Save Permissions'}
          </button>
        </PermGate>
      </div>
      <div className="card-body" style={{overflowX:'auto'}}>
        <table style={{width:'100%',minWidth:600}}>
          <thead>
            <tr>
              <th style={{textAlign:'left',fontSize:11,color:'var(--text-muted)',padding:'6px 10px',width:200}}>Action</th>
              {ROLES.map(r=>(
                <th key={r.key} style={{textAlign:'center',fontSize:11,color:'var(--text-muted)',padding:'6px 10px'}}>
                  {r.label}
                  {r.key==='owner'&&<div style={{fontSize:9,color:'var(--primary)'}}>all access</div>}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {ACTIONS.map(a=>(
              <tr key={a.key} style={{borderTop:'1px solid var(--grey-50)'}}>
                <td style={{fontSize:12.5,padding:'8px 10px',color:'var(--text)'}}>{a.label}</td>
                {ROLES.map(r=>{
                  const granted = r.key==='owner' ? true : !!(perms[r.key]||{})[a.key];
                  return (
                    <td key={r.key} style={{textAlign:'center',padding:'8px 10px'}}>
                      <div onClick={()=>toggle(r.key,a.key)} style={{
                        width:36,height:20,borderRadius:10,margin:'0 auto',cursor:r.key==='owner'?'not-allowed':'pointer',
                        background:granted?'var(--green)':'var(--border)',position:'relative',transition:'background .15s'
                      }}>
                        <div style={{
                          position:'absolute',top:2,left:granted?18:2,width:16,height:16,borderRadius:'50%',
                          background:'#fff',transition:'left .15s',boxShadow:'0 1px 3px rgba(0,0,0,.2)'
                        }} />
                      </div>
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{fontSize:11,color:'var(--text-muted)',marginTop:10}}>Owner always has full access — cannot be restricted.</div>
      </div>
    </div>
  );
}

// Note: quotation Firestore functions (addQuotation, updateQuotation etc.) already defined above.
// Just rebuilding the UI components that use currentUser for approval.

function QuotationApprovalAction({ quotation, currentUser, onApproved, onRejected }) {
  const [working, setWorking] = useState(false);

  async function handleApprove() {
    if (!can(currentUser, 'approve_quotation')) { alert('You do not have permission to approve quotations.'); return; }
    setWorking(true);
    try {
      await updateQuotation(quotation.docId, {
        approved: true,
        approvedBy: currentUser.name,
        approvedByUid: currentUser.uid,
        approvedAt: Date.now(),
        stage: 'Finalization of T&C'
      });
      onApproved && onApproved();
    } catch(e) { console.error(e); alert('Could not approve.'); }
    finally { setWorking(false); }
  }

  async function handleReject() {
    setWorking(true);
    try {
      await updateQuotation(quotation.docId, { approved: false, rejectedBy: currentUser.name, rejectedAt: Date.now() });
      onRejected && onRejected();
    } catch(e) { console.error(e); alert('Could not update.'); }
    finally { setWorking(false); }
  }

  if (quotation.approved) {
    return (
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <span className="badge green">✓ Approved</span>
        <span style={{fontSize:10.5,color:'var(--text-muted)'}}>by {quotation.approvedBy}</span>
        <button className="btn btn-sm btn-ghost" style={{fontSize:10}} onClick={handleReject} disabled={working}>Revoke</button>
      </div>
    );
  }

  return (
    <PermGate user={currentUser} action="approve_quotation" fallback={
      <span style={{fontSize:11,color:'var(--text-muted)'}}>Pending approval</span>
    }>
      <button className="btn btn-sm btn-primary" style={{background:'var(--green)'}} onClick={handleApprove} disabled={working}>
        {working?'…':'✓ Approve'}
      </button>
    </PermGate>
  );
}

// ─── New Quotation with REQ dropdown and Quot Number ─
function NewQuotationWithREQ({ onClose, reqs, existing }) {
  const isEdit = !!existing;
  const { items: allQuotes } = useQuotations();
  const [form, setForm] = useState(isEdit ? {
    quotNo: existing.quotNo||'', vendorName: existing.vendorName||'',
    description: existing.description||'', value: existing.value ? String(existing.value) : '',
    receivedDate: existing.receivedDate||'', linkedReq: existing.linkedReq||'',
    stage: existing.stage||'Receipt of Quotation', notes: existing.notes||'', project: existing.project||''
  } : {
    quotNo:'', vendorName:'', description:'', value:'',
    receivedDate: new Date().toISOString().slice(0,10),
    linkedReq:'', stage:'Receipt of Quotation', notes:'', project:''
  });
  const [schedule, setSchedule] = useState([]);
  const [saving, setSaving] = useState(false);
  function set(f,v){setForm(s=>({...s,[f]:v}));}

  // Auto-generate quotNo based on linked REQ + suffix letter
  useEffect(()=>{
    if(form.linkedReq){
      const req = reqs.find(r=>r.docId===form.linkedReq);
      if(req){
        const existing = allQuotes.filter(q=>q.linkedReq===form.linkedReq);
        const suffix = String.fromCharCode(65+existing.length); // A, B, C...
        const base = req.req.replace('REQ/','QUOT/');
        set('quotNo', `${base}/${suffix}`);
      }
    }
  },[form.linkedReq]);

  async function handleSave(){
    if(!form.vendorName.trim()||!form.value) return;
    setSaving(true);
    try{
      if (isEdit) {
        await updateQuotation(existing.docId, {...form, value:Number(form.value), paymentSchedule:schedule});
      } else {
        await addQuotation({...form,value:Number(form.value),paymentSchedule:schedule});
      }
      onClose();
    }catch(e){console.error(e);alert('Could not save quotation.');}
    finally{setSaving(false);}
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'var(--surface)',borderRadius:10,width:620,maxHeight:'92vh',overflowY:'auto',boxShadow:'0 8px 40px rgba(0,0,0,.22)'}} onClick={e=>e.stopPropagation()}>

        </div>
        <div style={{padding:'18px 20px'}}>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Reference Requisition</label>
              <select className="form-input form-select" value={form.linkedReq} onChange={e=>set('linkedReq',e.target.value)}>
                <option value="">Select requisition (optional)…</option>
                {reqs.map(r=><option key={r.docId} value={r.docId}>{r.req} — {r.description.slice(0,40)}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Quotation Number</label>
              <input className="form-input font-mono" value={form.quotNo} onChange={e=>set('quotNo',e.target.value)} placeholder="Auto-filled from REQ link" />
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Vendor Name</label>
            <AutocompleteInput value={form.vendorName} onChange={v=>set('vendorName',v)} suggestions={useKnownNames().vendors} placeholder="Vendor / supplier name" />
          </div>
          <div className="form-group">
            <label className="form-label">Description</label>

          </div>
          <div className="form-grid">

              <label className="form-label">Total Value (₹)</label>
              <input className="form-input font-mono" value={form.value} onChange={e=>set('value',e.target.value)} placeholder="0" />
            </div>

          <div className="form-group">

            {saving?'Saving…': isEdit ? 'Save Changes' : 'Save Quotation'}

  );
