// Note: quotation Firestore functions (addQuotation, updateQuotation etc.) already defined above.
// Just rebuilding the UI components that use currentUser for approval.

function QuotationApprovalAction({ quotation, currentUser, onApproved, onRejected }) {
  const [working, setWorking] = useState(false);

  async function handleApprove() {
    if (!can(currentUser, 'approve_quotation')) { alert('You do not have permission to approve quotations.'); return; }
    setWorking(true);
    try {
      await updateQuotation(quotation.docId, {
        approved: true,
        approvedBy: currentUser.name,
        approvedByUid: currentUser.uid,
        approvedAt: Date.now(),
        stage: 'Finalization of T&C'
      });
      onApproved && onApproved();
    } catch(e) { console.error(e); alert('Could not approve.'); }
    finally { setWorking(false); }
  }

  async function handleReject() {
    setWorking(true);
    try {
      await updateQuotation(quotation.docId, { approved: false, rejectedBy: currentUser.name, rejectedAt: Date.now() });
      onRejected && onRejected();
    } catch(e) { console.error(e); alert('Could not update.'); }
    finally { setWorking(false); }
  }

  if (quotation.approved) {
    return (
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <span className="badge green">✓ Approved</span>
        <span style={{fontSize:10.5,color:'var(--text-muted)'}}>by {quotation.approvedBy}</span>
        <button className="btn btn-sm btn-ghost" style={{fontSize:10}} onClick={handleReject} disabled={working}>Revoke</button>
      </div>
    );
  }

  return (
    <PermGate user={currentUser} action="approve_quotation" fallback={
      <span style={{fontSize:11,color:'var(--text-muted)'}}>Pending approval</span>
    }>
      <button className="btn btn-sm btn-primary" style={{background:'var(--green)'}} onClick={handleApprove} disabled={working}>
        {working?'…':'✓ Approve'}
      </button>
    </PermGate>
  );
}

function QuotationsWithUser({ currentUser }) {

  const [issuingFor, setIssuingFor] = useState(null);
  const [viewSchedule, setViewSchedule] = useState(null);

  const filtered = items.filter(q =>
    (stageFilter==='all' || q.stage===stageFilter) &&
    (approvedFilter==='all' || (approvedFilter==='approved'&&q.approved) || (approvedFilter==='pending'&&!q.approved))
  );
  const pipelineValue = items.filter(q=>!q.approved).reduce((s,q)=>s+Number(q.value||0),0);

  async function advanceStage(q) {
    const idx = QUOTE_STAGES.indexOf(q.stage);
    if (idx < QUOTE_STAGES.length - 2) {
      try { await updateQuotation(q.docId, { stage: QUOTE_STAGES[idx+1] }); }
      catch(e) { console.error(e); alert('Could not update stage.'); }
    } else if (idx === QUOTE_STAGES.length - 2) {
      setIssuingFor(q);
    }
  }

  function reqLabel(id) {
    const r = reqs.find(r=>r.docId===id||r.req===id);
    return r ? `${r.req} — ${r.description.slice(0,30)}` : (id||'—');
  }

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Quotations</div>
          <div className="section-sub">{loading?'Loading…':`${items.length} quotation${items.length===1?'':'s'} · pipeline ${inr(pipelineValue)}`}</div>
        </div>
        <div className="flex gap-2">
          <PermGate user={currentUser} action="enter_quotation" fallback={null}>
            <button className="btn btn-primary" onClick={()=>setShowNew(true)}>+ New Quotation</button>
          </PermGate>
          <ClearCollectionButton label="Clear All" count={items.length} onClear={clearAllQuotations} />
        </div>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="card-body" style={{paddingTop:10,paddingBottom:10}}>
          <div className="flex gap-2">
            <select className="form-input form-select" style={{width:200}} onChange={e=>setStageFilter(e.target.value)}>
              <option value="all">All Stages</option>
              {QUOTE_STAGES.map(s=><option key={s}>{s}</option>)}
            </select>
            <select className="form-input form-select" style={{width:160}} onChange={e=>setApprovedFilter(e.target.value)}>
              <option value="all">All</option>
              <option value="approved">Approved only</option>
              <option value="pending">Pending approval</option>
            </select>
          </div>
        </div>
      </div>

      <div className="card">
        {loading ? (
          <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
        ) : filtered.length===0 ? (
          <div className="module-coming">
            <div className="big-icon">📋</div>
            <h3>No quotations yet</h3>
            <p className="text-muted">Add vendor quotations. Link to a requisition. Approve the best one to issue a PO or WO.</p>
          </div>
        ) : (
          <table>
            <thead>
              <tr><th>Quot #</th><th>Vendor</th><th>REQ Ref</th><th>Value</th><th>Payment Schedule</th><th>Stage</th><th>Approval</th><th>Actions</th></tr>
            </thead>
            <tbody>
              {filtered.map(q=>(
                <tr key={q.docId} style={{background:q.approved?'#F0FFF4':''}}>
                  <td className="mono" style={{whiteSpace:'nowrap'}}>{q.quotNo||'—'}</td>
                  <td className="fw-600">{q.vendorName}</td>
                  <td style={{fontSize:11.5,color:'var(--text-muted)'}}>{reqLabel(q.linkedReq)}</td>
                  <td className="amount fw-600">{inr(q.value||0)}</td>
                  <td>
                    {q.paymentSchedule&&q.paymentSchedule.length>0
                      ? <span className="btn btn-sm btn-ghost" style={{cursor:'pointer'}} onClick={()=>setViewSchedule(q)}>{q.paymentSchedule.length} stage{q.paymentSchedule.length===1?'':'s'}</span>
                      : <span className="text-muted text-sm">—</span>}
                  </td>
                  <td><span className={`badge ${STAGE_COLOR[q.stage]||'grey'}`}>{q.stage}</span></td>
                  <td>
                    <QuotationApprovalAction quotation={q} currentUser={currentUser} />
                  </td>
                  <td>
                    <div className="flex gap-2">
                      {q.approved && q.stage==='Finalization of T&C' && (
                        <PermGate user={currentUser} action="issue_po">
                          <button className="btn btn-sm btn-primary" style={{background:'var(--green)'}} onClick={()=>setIssuingFor(q)}>Issue PO →</button>
                        </PermGate>
                      )}
                      {!q.approved && q.stage!=='Issuing of PO/WO' && q.stage!=='Finalization of T&C' && (
                        <button className="btn btn-sm btn-ghost" onClick={()=>advanceStage(q)}>Advance →</button>
                      )}
                      <button className="btn btn-sm btn-ghost" onClick={()=>{if(confirm('Delete?'))deleteQuotation(q.docId);}}>Delete</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
      {showNew && <NewQuotationWithREQ onClose={()=>setShowNew(false)} reqs={reqs} />}

            </div>
            <div style={{padding:'0 20px 16px',display:'flex',justifyContent:'flex-end'}}>
              <button onClick={()=>setViewSchedule(null)} className="btn btn-ghost">Close</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── New Quotation with REQ dropdown and Quot Number ─
function NewQuotationWithREQ({ onClose, reqs }) {
  const { items: allQuotes } = useQuotations();
  const [form, setForm] = useState({
    quotNo:'', vendorName:'', description:'', value:'',
    receivedDate: new Date().toISOString().slice(0,10),
    linkedReq:'', stage:'Receipt of Quotation', notes:''
  });
  const [schedule, setSchedule] = useState([]);
  const [saving, setSaving] = useState(false);
  function set(f,v){setForm(s=>({...s,[f]:v}));}

  // Auto-generate quotNo based on linked REQ + suffix letter
  useEffect(()=>{
    if(form.linkedReq){
      const req = reqs.find(r=>r.docId===form.linkedReq);
      if(req){
        const existing = allQuotes.filter(q=>q.linkedReq===form.linkedReq);
        const suffix = String.fromCharCode(65+existing.length); // A, B, C...
        const base = req.req.replace('REQ/','QUOT/');
        set('quotNo', `${base}/${suffix}`);
      }
    }
  },[form.linkedReq]);

  async function handleSave(){
    if(!form.vendorName.trim()||!form.value) return;
    setSaving(true);
    try{
      await addQuotation({...form,value:Number(form.value),paymentSchedule:schedule});
      onClose();

              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Quotation Number</label>
              <input className="form-input font-mono" value={form.quotNo} onChange={e=>set('quotNo',e.target.value)} placeholder="Auto-filled from REQ link" />

            <div className="form-group">

            <div className="form-group">
              <label className="form-label">Received Date</label>
              <input className="form-input" type="date" value={form.receivedDate} onChange={e=>set('receivedDate',e.target.value)} />
            </div>
          </div>
          <PaymentScheduleEditor rows={schedule} setRows={setSchedule} totalValue={form.value} />
          <div className="form-group">
            <label className="form-label">Stage</label>
            <select className="form-input form-select" value={form.stage} onChange={e=>set('stage',e.target.value)}>
              {QUOTE_STAGES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Notes / Negotiation Points</label>
            <textarea className="form-input" rows="2" value={form.notes} onChange={e=>set('notes',e.target.value)} style={{resize:'vertical'}} />
          </div>
        </div>
        <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={handleSave} disabled={saving||!form.vendorName.trim()||!form.value} className="btn btn-primary"
            style={{opacity: (saving||!form.vendorName.trim()||!form.value) ? 0.6 : 1}}>
            {saving?'Saving…':'Save Quotation'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Settings wrapper with currentUser ─────────────
function SettingsWithUser({ currentUser }) {
  return (
    <div>
      <div className="section-header">
        <div className="section-title">Settings</div>
      </div>
      <div style={{marginBottom:20}}>
        <PermissionMatrix currentUser={currentUser} />
      </div>
      <Settings currentUser={currentUser} />
    </div>
  );
}

// ─── Topbar titles ─────────────────────────────────────
const TITLES = {
  dashboard:'Dashboard', tasks:'Tasks', requisitions:'Requisitions',
  quotations:'Quotations', workorders:'Work Orders', purchaseorders:'Purchase Orders',
  crossref:'Cross-Reference', paymenttracker:'Payment Tracker',
  billpayments:'Bill Payments', cashflow:'Cash Flow', pettycash:'Petty Cash',
  projects:'Projects', vendors:'Vendor Master', documents:'Document Vault',
  chat:'Team Chat', reminders:'Reminders', reports:'Reports', settings:'Settings',
};

// ─── App ──────────────────────────────────────────────
function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [currentUser, setCurrentUser] = useState(null);
  const [active, setActive] = useState('dashboard');
  const today = new Date().toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' });

  function handleLogin(user) {
    setCurrentUser(user);
    setLoggedIn(true);
  }

  function handleLogout() {
    window.currentUser = null;
    setCurrentUser(null);
    setLoggedIn(false);
    setActive('dashboard');
  }

  if (!loggedIn || !currentUser) {
    return <LoginScreen onLogin={handleLogin} />;
  }

  return (
    <div className="app">
      {/* Sidebar */}
      <div className="sidebar">
        <div className="sidebar-header">
          <div className="sidebar-logo">💧 Nirman Watertech</div>
          <div className="sidebar-sub">Internal Workflow Platform</div>
        </div>
        {NAV.map((item, i) => {
          if (item.section) return <div className="sidebar-section" key={i}>{item.section}</div>;
          return (
            <div className={`nav-item ${active===item.id?'active':''}`} key={item.id} onClick={()=>setActive(item.id)}>
              <span className="icon">{item.icon}</span>
              <span>{item.label}</span>
              {item.badge && <span className="nav-badge">{item.badge}</span>}
            </div>
          );
        })}

        {/* User info at bottom of sidebar */}
        <div style={{marginTop:'auto',padding:'12px 10px',borderTop:'1px solid rgba(255,255,255,.10)'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 6px',borderRadius:8,cursor:'pointer'}} onClick={handleLogout} title="Click to sign out">
            <div style={{width:30,height:30,borderRadius:'50%',background:'rgba(255,255,255,.15)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>
              {currentUser.initials}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:'#fff',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{currentUser.name}</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.5)',textTransform:'capitalize'}}>{currentUser.role.replace('_',' ')} · Sign out</div>
            </div>
          </div>
        </div>
      </div>

      {/* Main area */}
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{TITLES[active]||'Dashboard'}</div>
          <div className="topbar-right">
            <span style={{fontSize:11,color:'var(--text-muted)'}}>{today}</span>
            <button className="icon-btn" title="Notifications">🔔</button>
            <div className="avatar" title={`${currentUser.name} — ${currentUser.role}`} onClick={handleLogout} style={{cursor:'pointer',title:'Sign out'}}>
              {currentUser.initials}
            </div>
          </div>
        </div>
        <div className="content">
          <ErrorBoundary key={active}>
            <Module id={active} setActive={setActive} currentUser={currentUser} />
          </ErrorBoundary>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
