<style>

<script type="text/babel" data-presets="react">
/* @jsxRuntime classic */
const { useState, useEffect, useRef } = React;

// ─── Formatters ───────────────────────────────────────
const inr = (n) => '₹' + Number(n).toLocaleString('en-IN');

// ─── Projects ─────────────────────────────────────────
const PROJECTS = ['Pontoon', 'WTP', 'Both'];
const PROJECT_COLOR = { 'Pontoon': 'blue', 'WTP': 'teal', 'Both': 'grey' };

// Reusable project selector — drop-in for any form
function ProjectSelect({ value, onChange, required }) {
  return (
    <div className="form-group">
      <label className="form-label">
        Project {required ? <span style={{color:'var(--red)'}}>*</span> : <span style={{color:'var(--text-muted)',fontWeight:400}}>(optional)</span>}
      </label>
      <select className="form-input form-select" value={value||''} onChange={e=>onChange(e.target.value)}>
        <option value="">Select project…</option>
        {PROJECTS.map(p=><option key={p}>{p}</option>)}
      </select>
    </div>
  );
}

// ─── Known Names Hook ─────────────────────────────────
// Aggregates all vendor/payee names from every collection for autocomplete
function useKnownNames() {
  const [names, setNames] = useState({ vendors:[], payees:[], clients:[] });

  useEffect(() => {
    function start() {
      const { db, collection, getDocs } = window.fb;
      async function load() {
        try {
          const [vendors, bills, advances, pos, wos, quotes, reqs, petty, capital] = await Promise.all([
            getDocs(collection(db, 'vendors')),
            getDocs(collection(db, 'bills')),
            getDocs(collection(db, 'advances')),
            getDocs(collection(db, 'purchaseorders')),
            getDocs(collection(db, 'workorders')),
            getDocs(collection(db, 'quotations')),
            getDocs(collection(db, 'requisitions')),
            getDocs(collection(db, 'petty_cash')),
            getDocs(collection(db, 'capital_loans')),
          ]);

          const vendorNames = [
            ...vendors.docs.map(d=>d.data().company),
            ...pos.docs.map(d=>d.data().vendorName),
            ...wos.docs.map(d=>d.data().vendorName),
            ...quotes.docs.map(d=>d.data().vendorName),
            ...advances.docs.map(d=>d.data().vendor),
          ].filter(Boolean);

          const payeeNames = [
            ...bills.docs.map(d=>d.data().payee),
            ...advances.docs.map(d=>d.data().vendor),
            ...petty.docs.map(d=>d.data().paidBy),
          ].filter(Boolean);

          const clientNames = [
            ...reqs.docs.map(d=>d.data().client),
          ].filter(Boolean);

          const capitalSources = capital.docs.map(d=>d.data().source).filter(Boolean);

          setNames({
            vendors: [...new Set(vendorNames)].sort(),
            payees:  [...new Set(payeeNames)].sort(),
            clients: [...new Set(clientNames)].sort(),
            capital: [...new Set(capitalSources)].sort(),
          });
        } catch(e) { console.error('useKnownNames error', e); }
      }
      load();
    }
    if (window.fb) start();
    else window.addEventListener('firebase-ready', start, { once: true });
  }, []);

  return names;
}



const STATUS_COLOR = { 'In Progress':'blue','Scheduled':'teal','Overdue':'red','Completed':'green','Pending':'grey' };
const BILL_STATUS_COLOR = { 'Overdue':'red','Due Today':'amber','Upcoming':'blue','Paid':'green' };


// ─── Reusable Components ──────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  componentDidCatch(e, info) { console.error('Module error:', e, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:32,textAlign:'center'}}>
          <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
          <div style={{fontWeight:700,fontSize:14,color:'var(--red)',marginBottom:8}}>Something went wrong in this module</div>
          <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:16,fontFamily:'var(--font-mono)'}}>{this.state.error.message}</div>
          <button className="btn btn-primary" onClick={()=>this.setState({error:null})}>Try Again</button>
        </div>
      );
    }
    return this.props.children;
  }
}

// ─── Autocomplete Input ───────────────────────────────
// Reusable: shows dropdown of past values as you type
// suggestions = array of strings from existing Firestore data
function AutocompleteInput({ value, onChange, suggestions, placeholder, className, style }) {
  const [open, setOpen] = useState(false);
  const [filtered, setFiltered] = useState([]);
  const ref = useRef(null);

  useEffect(() => {
    function handleClick(e) {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  function handleChange(e) {
    const val = e.target.value;
    onChange(val);
    if (val.trim().length > 0) {
      const q = val.toLowerCase();
      const matches = [...new Set(suggestions.filter(s => s && s.toLowerCase().includes(q) && s.toLowerCase() !== q))].slice(0, 8);
      setFiltered(matches);
      setOpen(matches.length > 0);
    } else {
      // Show all suggestions when field is focused but empty
      const all = [...new Set(suggestions.filter(Boolean))].slice(0, 8);
      setFiltered(all);
      setOpen(all.length > 0);
    }
  }

  function handleFocus() {
    if (!value || value.trim() === '') {
      const all = [...new Set(suggestions.filter(Boolean))].slice(0, 8);
      setFiltered(all);
      setOpen(all.length > 0);
    }
  }

  function handleSelect(s) {
    onChange(s);
    setOpen(false);
  }

  return (
    <div ref={ref} style={{position:'relative'}}>
      <input
        className={className || 'form-input'}
        style={style}
        value={value}
        onChange={handleChange}
        onFocus={handleFocus}
        placeholder={placeholder}
        autoComplete="off"
      />
      {open && filtered.length > 0 && (
        <div style={{
          position:'absolute', top:'100%', left:0, right:0, zIndex:2000,
          background:'var(--surface)', border:'1px solid var(--border)',
          borderRadius:'0 0 6px 6px', boxShadow:'0 4px 12px rgba(0,0,0,.12)',
          maxHeight:200, overflowY:'auto'
        }}>
          {filtered.map((s, i) => (
            <div key={i} onMouseDown={() => handleSelect(s)}
              style={{padding:'7px 12px', fontSize:12.5, cursor:'pointer', borderTop: i>0?'1px solid var(--grey-50)':'none',
                display:'flex', alignItems:'center', gap:8}}
              onMouseEnter={e=>e.currentTarget.style.background='var(--primary-50)'}
              onMouseLeave={e=>e.currentTarget.style.background=''}>
              <span style={{color:'var(--text-muted)',fontSize:11}}>↩</span>
              {s}

function ClearCollectionButton({ label, count, onClear }) {
  const [step, setStep] = useState(0);
  const [typed, setTyped] = useState('');
  const [working, setWorking] = useState(false);
  const CONFIRM_PHRASE = 'DELETE';
  function close() { setStep(0); setTyped(''); }

  async function handleClear() {
    setWorking(true);
    try { await onClear(); close(); }
    catch(e) { console.error(e); alert('Could not clear data — check Firestore connection.'); }
    finally { setWorking(false); }
  }

  return (
    <>
      <button onClick={() => setStep(1)} disabled={count === 0}
        style={{background:'transparent',border:'1px solid #EF9A9A',color:'var(--red)',borderRadius:4,padding:'6px 14px',fontSize:12,fontWeight:600,cursor:count===0?'not-allowed':'pointer',opacity:count===0?.5:1}}>
        🗑 {label}
      </button>
      {step === 1 && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={close}>
          <div style={{background:'var(--surface)',borderRadius:10,width:420,boxShadow:'0 8px 40px rgba(0,0,0,.22)',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
            <div style={{background:'var(--red)',padding:'14px 18px',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:20}}>🗑</span>
              <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>{label}</span>
            </div>
            <div style={{padding:'20px 20px 8px'}}>
              <div style={{fontSize:13,color:'var(--text)',marginBottom:10,lineHeight:1.6}}>
                You are about to <strong>permanently delete all {count} record{count===1?'':'s'}</strong>.<br/><br/>
                <span style={{color:'var(--red)',fontWeight:600}}>This cannot be undone.</span>
              </div>
            </div>
            <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button onClick={close} className="btn btn-ghost">Cancel</button>
              <button onClick={() => setStep(2)} style={{background:'var(--red)',color:'#fff',border:'none',borderRadius:4,padding:'7px 18px',fontWeight:600,fontSize:12.5,cursor:'pointer'}}>
                Yes, delete →
              </button>
            </div>
          </div>
        </div>
      )}
      {step === 2 && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={close}>
          <div style={{background:'var(--surface)',borderRadius:10,width:440,boxShadow:'0 8px 40px rgba(0,0,0,.28)',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
            <div style={{background:'#B71C1C',padding:'14px 18px',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:20}}>⛔</span>
              <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>Final Confirmation</span>
            </div>
            <div style={{padding:'22px 22px 8px'}}>
              <div style={{fontSize:13,color:'var(--text)',marginBottom:16}}>Type the word below to confirm:</div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:18,fontWeight:800,color:'var(--red)',letterSpacing:4,textAlign:'center',background:'var(--red-50)',padding:'10px',borderRadius:6,marginBottom:16,border:'1px dashed #EF9A9A'}}>
                {CONFIRM_PHRASE}
              </div>
              <input className="form-input font-mono" placeholder={`Type ${CONFIRM_PHRASE} to confirm`} value={typed}
                onChange={e => setTyped(e.target.value.toUpperCase())} autoFocus
                style={{fontSize:14,fontWeight:600,letterSpacing:2,textAlign:'center',borderColor:typed===CONFIRM_PHRASE?'var(--red)':typed.length>0?'#EF9A9A':'var(--border)'}} />

const PRIO_COLOR = { Critical:'red', High:'amber', Medium:'blue', Low:'grey' };
const TASKS_COLLECTION = 'tasks';

// ─── Firestore hook for Tasks ─────────────────────────
function useTasks() {
  const [tasks, setTasks] = useState([]);
  const [ready, setReady] = useState(false);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(collection(db, TASKS_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, (snap) => {
        const rows = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
        setTasks(rows);
        setLoading(false);
      }, (err) => {
        console.error('Tasks listener error', err);
        setLoading(false);
      });
      setReady(true);
      return unsub;
    }

    if (window.fb) {
      const unsub = start();
      return () => unsub && unsub();
    } else {
      let unsub;
      const handler = () => { unsub = start(); };
      window.addEventListener('firebase-ready', handler, { once: true });
      return () => {
        window.removeEventListener('firebase-ready', handler);
        if (unsub) unsub();
      };
    }
  }, []);

  return { tasks, ready, loading };
}

async function addTask(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(collection(db, TASKS_COLLECTION), {
    ...data,
    createdAt: Date.now(),
  });
}

async function updateTask(docId, data) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(doc(db, TASKS_COLLECTION, docId), data);
}

async function deleteTask(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, TASKS_COLLECTION, docId));
}

async function clearAllTasks() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(collection(db, TASKS_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

// ─── Remark Modal (mandatory before moving an overdue task) ──
function RemarkModal({ task, onClose, onSaved }) {
  const [reason, setReason] = useState('');
  const [newDate, setNewDate] = useState('');
  const [saving, setSaving] = useState(false);

  async function handleSave() {
    if (!reason.trim() || !newDate) return;
    setSaving(true);
    try {
      await updateTask(task.docId, {
        status: 'In Progress',
        due: newDate,
        remark: reason,
        remarkAt: Date.now(),
      });
      onSaved();
    } catch (e) {
      console.error(e);
      alert('Could not save remark.');
    } finally {
      setSaving(false);
    }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'var(--surface)',borderRadius:10,width:440,boxShadow:'0 8px 40px rgba(0,0,0,.22)',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
        <div style={{background:'var(--amber)',padding:'14px 18px'}}>
          <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>⚠️ Overdue Remark Required</span>
        </div>
        <div style={{padding:'18px 20px'}}>
          <div style={{fontSize:12.5,color:'var(--text)',marginBottom:14}}>
            <strong>{task.name}</strong> is overdue. A remark is required before this task can move forward.
          </div>
          <div className="form-group">
            <label className="form-label">Reason for Delay</label>
            <textarea className="form-input" rows="3" value={reason} onChange={e=>setReason(e.target.value)} placeholder="Explain the delay…" style={{resize:'vertical'}} />

          <div className="form-group">
            <label className="form-label">New Expected Date</label>

  );
}

// ─── Tasks Module (Firestore-backed) ──────────────────
function Tasks() {
  const { tasks, loading } = useTasks();
  const [filter, setFilter] = useState('all');
  const [showNew, setShowNew] = useState(false);
  const [remarkTask, setRemarkTask] = useState(null);
  const [editTask, setEditTask] = useState(null);

  // Auto-detect overdue: due date in the past and not Completed
  const todayStr = new Date().toISOString().slice(0,10);
  const withComputedStatus = tasks.map(t => {
    const isOverdue = t.due && t.due < todayStr && t.status !== 'Completed' && !t.remark;
    return { ...t, effectiveStatus: isOverdue ? 'Overdue' : (t.status || 'Pending') };
  });

  const filtered = filter === 'all' ? withComputedStatus : withComputedStatus.filter(t => t.effectiveStatus.toLowerCase() === filter);

  async function markComplete(t) {
    try { await updateTask(t.docId, { status: 'Completed' }); }
    catch (e) { console.error(e); alert('Could not update task.'); }
  }

  return (
    <div>
      <div className="section-header">

        <div className="card-body" style={{paddingTop:10,paddingBottom:10}}>
          <div className="flex gap-2 items-center">
            <select className="form-input form-select" style={{width:140}} onChange={e=>setFilter(e.target.value)}>
              <option value="all">All Status</option>
              <option value="overdue">Overdue</option>
              <option value="in progress">In Progress</option>
              <option value="scheduled">Scheduled</option>
              <option value="pending">Pending</option>
              <option value="completed">Completed</option>
            </select>
          </div>
        </div>
      </div>

      <div className="card">
        {loading ? (
          <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
        ) : filtered.length === 0 ? (
          <div className="module-coming">
            <div className="big-icon">📋</div>
            <h3>No tasks yet</h3>
            <p className="text-muted">Create your first task — it'll be saved permanently to your database.</p>
          </div>
        ) : (
          <table>
            <thead>
              <tr><th>Task Name</th><th>Client</th><th>WO #</th><th>Assigned</th><th>Priority</th><th>Status</th><th>Due Date</th><th>Actions</th></tr>
            </thead>
            <tbody>
              {filtered.map(t => (
                <tr key={t.docId} className={t.effectiveStatus==='Overdue'?'overdue':''}>
                  <td><span className="fw-600">{t.name}</span>{t.remark && <div className="text-sm text-muted mt-1">Remark: {t.remark}</div>}</td>
                  <td>{t.client || '—'}</td>
                  <td className="mono">{t.wo || '—'}</td>
                  <td>{t.assigned}</td>
                  <td><span className={`badge ${PRIO_COLOR[t.priority] || 'grey'}`}>{t.priority}</span></td>
                  <td><StatusBadge status={t.effectiveStatus} /></td>
                  <td className={t.effectiveStatus==='Overdue'?'fw-600':''} style={t.effectiveStatus==='Overdue'?{color:'var(--red)'}:{}}>{t.due || '—'}</td>
                  <td>
                    <div className="flex gap-2">
                      <button className="btn btn-sm btn-ghost" onClick={() => setEditTask(t)}>Edit</button>
                      {t.effectiveStatus !== 'Completed' && (
                        <button className="btn btn-sm btn-ghost" onClick={() => markComplete(t)}>Complete</button>
                      )}
                      {t.effectiveStatus === 'Overdue' && (
                        <button className="btn btn-sm" style={{background:'var(--red-50)',color:'var(--red)',border:'none',borderRadius:4,fontSize:11,padding:'4px 10px',cursor:'pointer'}} onClick={() => setRemarkTask(t)}>

      {showNew && <NewTaskModal onClose={() => setShowNew(false)} />}

    </div>
  );
}

// WORK ORDERS — issued to vendors for services/labour
// Series: NWTS/WO/2026-27/001
// ════════════════════════════════════════════════════
const WO_COLLECTION = 'workorders';
const WO_STAGES = ['Draft','Issued','In Progress','Completed','Cancelled'];
const FY = '2026-27';

function useWorkOrders() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(collection(db, WO_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, (snap) => {
        setItems(snap.docs.map(d => ({ docId: d.id, ...d.data() })));
        setLoading(false);
      }, (err) => { console.error('WO listener error', err); setLoading(false); });
      return unsub;
    }
    if (window.fb) { const unsub = start(); return () => unsub && unsub(); }
    let unsub;
    const handler = () => { unsub = start(); };
    window.addEventListener('firebase-ready', handler, { once: true });
    return () => { window.removeEventListener('firebase-ready', handler); if (unsub) unsub(); };
  }, []);
  return { items, loading };
}
async function addWorkOrder(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(collection(db, WO_COLLECTION), { ...data, createdAt: Date.now() });
}
async function updateWorkOrder(docId, data) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(doc(db, WO_COLLECTION, docId), data);
}
async function deleteWorkOrder(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, WO_COLLECTION, docId));
}
async function clearAllWorkOrders() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(collection(db, WO_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

function nextWONumber(count) {
  return `NWTS/WO/${FY}/${String(count + 1).padStart(3, '0')}`;
}
function nextPONumber(count) {
  return `NWTS/PO/${FY}/${String(count + 1).padStart(3, '0')}`;
}

// Returns quotations eligible for linking (Finalization of T&C or Issuing of PO/WO)
function finalizedQuotations(quotations) {
  return quotations.filter(q => q.stage === 'Finalization of T&C' || q.stage === 'Issuing of PO/WO');
}

function NewWOModal({ onClose, nextNumber, quotations, existing }) {
  const isEdit = !!existing;
  const [form, setForm] = useState(isEdit ? {
    wo: existing.wo||nextNumber, vendorName: existing.vendorName||'',
    description: existing.description||'', value: existing.value ? String(existing.value) : '',
    linkedQuotation: existing.linkedQuotation||'', stage: existing.stage||'Draft',
    due: existing.due||'', notes: existing.notes||'',
    penaltyClause: existing.penaltyClause||'', disputeClause: existing.disputeClause||'', project: existing.project||''
  } : {
    wo: nextNumber, vendorName: '', description: '', value: '',
    linkedQuotation: '', stage: 'Draft', due: '', notes: '',
    penaltyClause: '', disputeClause: '', project: ''
  });
  const [schedule, setSchedule] = useState(isEdit && existing.paymentSchedule ? existing.paymentSchedule.map(r=>({...r,id:genRowId()})) : []);
  const [saving, setSaving] = useState(false);
  function set(f, v) { setForm(s => ({ ...s, [f]: v })); }

  // Auto-fill vendor name when quotation selected
  function handleQuotationSelect(val) {
    const q = quotations.find(q => q.docId === val);
    set('linkedQuotation', val);
    if (q) {
      setForm(s => ({
        ...s,
        linkedQuotation: val,
        vendorName: q.vendorName || s.vendorName,
        description: s.description || q.description || '',
        value: s.value || (q.value ? String(q.value) : ''),
      }));
      if ((!schedule || schedule.length === 0) && q.paymentSchedule && q.paymentSchedule.length > 0) {
        setSchedule(q.paymentSchedule.map(r => ({ ...r, id: genRowId() })));

    }

  async function handleSave() {

      else await addWorkOrder({ ...form, value: Number(form.value) || 0, paymentSchedule: schedule });

  return (

const PO_COLLECTION = 'purchaseorders';
const PO_STAGES = ['Draft','Issued','Goods In Transit','Partially Received','Fully Received','Closed'];

function usePurchaseOrders() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(collection(db, PO_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, (snap) => {
        setItems(snap.docs.map(d => ({ docId: d.id, ...d.data() })));
        setLoading(false);
      }, (err) => { console.error('PO listener error', err); setLoading(false); });
      return unsub;
    }
    if (window.fb) { const unsub = start(); return () => unsub && unsub(); }
    let unsub;
    const handler = () => { unsub = start(); };
    window.addEventListener('firebase-ready', handler, { once: true });
    return () => { window.removeEventListener('firebase-ready', handler); if (unsub) unsub(); };
  }, []);
  return { items, loading };
}
async function addPO(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(collection(db, PO_COLLECTION), { ...data, createdAt: Date.now() });
}
async function updatePO(docId, data) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(doc(db, PO_COLLECTION, docId), data);
}
async function deletePO(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, PO_COLLECTION, docId));
}
async function clearAllPOs() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(collection(db, PO_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

function NewPOModal({ onClose, nextNumber, vendors, quotations, prefill, existing }) {
  const isEdit = !!existing;
  const [form, setForm] = useState(isEdit ? {
    po: existing.po||nextNumber, vendorName: existing.vendorName||'',
    description: existing.description||'', value: existing.value ? String(existing.value) : '',
    linkedQuotation: existing.linkedQuotation||'', stage: existing.stage||'Draft',
    penaltyClause: existing.penaltyClause||'', disputeClause: existing.disputeClause||'', project: existing.project||''
  } : {
    po: nextNumber, vendorName: prefill?.party || '', description: prefill?.description || '',
    value: prefill?.value ? String(prefill.value) : '',
    linkedQuotation: prefill?.fromQuotation || '',
    stage: 'Draft', penaltyClause: prefill?.penaltyClause || '', disputeClause: prefill?.disputeClause || '', project: ''
  });
  const [schedule, setSchedule] = useState(
    isEdit && existing.paymentSchedule ? existing.paymentSchedule.map(r=>({...r,id:genRowId()})) :
    prefill?.paymentSchedule ? prefill.paymentSchedule.map(r => ({...r, id: genRowId()})) : []
  );
  const [saving, setSaving] = useState(false);
  function set(f, v) { setForm(s => ({ ...s, [f]: v })); }

  function handleQuotationSelect(val) {
    const q = quotations.find(q => q.docId === val);
    set('linkedQuotation', val);
    if (q) {
      setForm(s => ({
        ...s,
        linkedQuotation: val,
        vendorName: s.vendorName || q.vendorName || '',
        description: s.description || q.description || '',
        value: s.value || (q.value ? String(q.value) : ''),
      }));
      if ((!schedule || schedule.length === 0) && q.paymentSchedule && q.paymentSchedule.length > 0) {
        setSchedule(q.paymentSchedule.map(r => ({ ...r, id: genRowId() })));
      }
    }
  }

  async function handleSave() {
    if (!form.vendorName.trim() || !form.value) return;
    setSaving(true);
    try {
      if (isEdit) await updatePO(existing.docId, { ...form, value: Number(form.value), paymentSchedule: schedule });
      else await addPO({ ...form, value: Number(form.value), paymentSchedule: schedule });
      onClose();
    } catch (e) { console.error(e); alert('Could not save purchase order.'); }
    finally { setSaving(false); }
  }

  const eligible = finalizedQuotations(quotations);

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>

        </div>
        <div style={{padding:'18px 20px'}}>

              <input className="form-input font-mono" value={form.po} onChange={e=>set('po', e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Linked Quotation</label>
              <select className="form-input form-select" value={form.linkedQuotation} onChange={e => handleQuotationSelect(e.target.value)}>
                <option value="">Select finalized quotation…</option>
                {eligible.map(q => (
                  <option key={q.docId} value={q.docId}>{q.vendorName} — {q.description ? q.description.slice(0,40) : ''} ({inr(q.value||0)})</option>
                ))}
                {eligible.length === 0 && <option disabled>No finalized quotations yet</option>}

          <div className="form-group">

            {vendors && vendors.length > 0 ? (
              <select className="form-input form-select" value={form.vendorName} onChange={e=>set('vendorName', e.target.value)}>
                <option value="">Select vendor…</option>

            )}
          </div>
          <div className="form-group">

          </div>

            <input className="form-input font-mono" value={form.value} onChange={e=>set('value', e.target.value)} placeholder="0" />
          </div>

              {PO_STAGES.map(s => <option key={s}>{s}</option>)}

          <div className="form-group">

            <input className="form-input" value={form.disputeClause} onChange={e=>set('disputeClause', e.target.value)} placeholder="Optional" />
          </div>

        <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={handleSave} disabled={saving || !form.vendorName.trim() || !form.value} className="btn btn-primary"
            style={{opacity: saving || !form.vendorName.trim() || !form.value ? .6 : 1}}>
            {saving ? 'Saving…' : 'Issue Purchase Order'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Cash Flow Module ──────────────────────────────────
const SETTINGS_COLLECTION = 'settings';
const SETTINGS_DOC = 'cashflow';

function useCashSettings() {
  const [settings, setSettings] = useState({ startingBalance: 1350000, criticalThreshold: 500000, warningThreshold: 800000 });
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    function start() {
      const { db, doc, onSnapshot } = window.fb;
      const unsub = onSnapshot(doc(db, SETTINGS_COLLECTION, SETTINGS_DOC), (snap) => {
        if (snap.exists()) setSettings(s => ({ ...s, ...snap.data() }));
        setLoading(false);
      }, () => setLoading(false));
      return unsub;
    }
    if (window.fb) {
      const unsub = start();
      return () => unsub && unsub();
    } else {
      let unsub;
      const handler = () => { unsub = start(); };
      window.addEventListener('firebase-ready', handler, { once: true });
      return () => { window.removeEventListener('firebase-ready', handler); if (unsub) unsub(); };
    }
  }, []);

  async function save(newSettings) {
    const { db, doc, setDoc } = window.fb;
    await setDoc(doc(db, SETTINGS_COLLECTION, SETTINGS_DOC), { ...settings, ...newSettings }, { merge: true });
  }

  return { settings, loading, save };
}

async function clearCashFlowData() {
  const { db, doc, setDoc } = window.fb;
  // Clear all unpaid bills (the forecast's source data) and reset the starting balance.
  await clearAllBills();
  await setDoc(doc(db, SETTINGS_COLLECTION, SETTINGS_DOC), { startingBalance: 0 }, { merge: true });
}

function CashFlow() {
  const [horizon, setHorizon] = useState('30');
  const { items: bills, loading: billsLoading } = useBills();
  const { settings, loading: settingsLoading } = useCashSettings();
  const [editingBalance, setEditingBalance] = useState(false);
  const [balanceInput, setBalanceInput] = useState('');

  const loading = billsLoading || settingsLoading;
  const todayStr = new Date().toISOString().slice(0,10);
  const horizonDate = new Date(Date.now() + Number(horizon)*86400000).toISOString().slice(0,10);

  // Build forecast rows from unpaid bills within horizon, sorted by due date
  const unpaidInRange = bills
    .filter(b => !b.paid && b.due && b.due <= horizonDate)
    .sort((a,b) => (a.due || '').localeCompare(b.due || ''));

  let running = Number(settings.startingBalance) || 0;
  const rows = unpaidInRange.map(b => {
    running -= Number(b.amount || 0);
    return { date: b.due, label: b.payee, cat: b.category, type: 'out', amt: Number(b.amount||0), balance: running };
  });

  const forecastLow = rows.length ? Math.min(...rows.map(r => r.balance), running) : running;
  const lowRow = rows.find(r => r.balance === forecastLow);
  const outflowsTotal = unpaidInRange.reduce((s,b) => s + Number(b.amount||0), 0);

  const criticalBreached = forecastLow < Number(settings.criticalThreshold || 0);
  const warningBreached = !criticalBreached && forecastLow < Number(settings.warningThreshold || 0);

  async function saveBalance() {
    const { db, doc, setDoc } = window.fb;
    try {
      await setDoc(doc(db, SETTINGS_COLLECTION, SETTINGS_DOC), { ...settings, startingBalance: Number(balanceInput) || 0 }, { merge: true });
      setEditingBalance(false);
    } catch (e) { console.error(e); alert('Could not save balance.'); }
  }

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Cash Flow Management</div>
          <div className="section-sub">{loading ? 'Loading from Firestore…' : 'Live balance and forecast · derived from unpaid bills'}</div>
        </div>
        <div className="flex gap-2">
          <select className="form-input form-select" style={{width:130}} value={horizon} onChange={e=>setHorizon(e.target.value)}>
            <option value="30">30-day view</option>
            <option value="45">45-day view</option>
            <option value="60">60-day view</option>
            <option value="90">90-day view</option>
          </select>
          <ClearCollectionButton label="Clear Forecast Data" count={unpaidInRange.length} onClear={clearCashFlowData} />
        </div>
      </div>

      {!loading && criticalBreached && (
        <div className="alert-bar critical" style={{marginBottom:14}}>
          <span className="alert-icon">🚨</span>
          <strong>Critical Threshold Breached:</strong>&nbsp;Forecast balance drops to {inr(forecastLow)} {lowRow ? `on ${lowRow.date}` : ''} — below your ₹{Number(settings.criticalThreshold).toLocaleString('en-IN')} critical threshold.
        </div>
      )}
      {!loading && warningBreached && (
        <div className="alert-bar warning" style={{marginBottom:14}}>
          <span className="alert-icon">⚠️</span>
          <strong>Warning Threshold Approaching:</strong>&nbsp;Forecast balance drops to {inr(forecastLow)} {lowRow ? `on ${lowRow.date}` : ''} — below your ₹{Number(settings.warningThreshold).toLocaleString('en-IN')} warning threshold.
        </div>
      )}

      <div className="stats-grid" style={{gridTemplateColumns:'repeat(4,1fr)',marginBottom:14}}>
        <div className="stat-card">
          <div className="stat-label">Starting / Live Balance</div>
          {editingBalance ? (
            <div className="flex gap-2 items-center mt-1">
              <input className="form-input font-mono" style={{width:120}} value={balanceInput} onChange={e=>setBalanceInput(e.target.value)} autoFocus />
              <button className="btn btn-sm btn-primary" onClick={saveBalance}>Save</button>
              <button className="btn btn-sm btn-ghost" onClick={() => setEditingBalance(false)}>✕</button>
            </div>
          ) : (
            <>
              <div className="stat-value green">{inr(settings.startingBalance)}</div>
              <div className="stat-sub" style={{cursor:'pointer',color:'var(--primary)'}} onClick={() => { setBalanceInput(String(settings.startingBalance)); setEditingBalance(true); }}>Edit balance</div>
            </>
          )}
        </div>
        <div className="stat-card"><div className="stat-label">Outflows ({horizon}d)</div><div className="stat-value red">{inr(outflowsTotal)}</div><div className="stat-sub">{unpaidInRange.length} unpaid bill{unpaidInRange.length===1?'':'s'}</div></div>
        <div className="stat-card"><div className="stat-label">Forecast Low</div><div className={`stat-value ${criticalBreached?'red':warningBreached?'amber':'blue'}`}>{inr(forecastLow)}</div>{lowRow && <div className="stat-sub">{lowRow.date}</div>}</div>
        <div className="stat-card"><div className="stat-label">Critical / Warning</div><div className="stat-value" style={{fontSize:14}}>{inr(settings.criticalThreshold)} / {inr(settings.warningThreshold)}</div><div className="stat-sub">Set in Settings</div></div>
      </div>

      <div className="card">
        <div className="card-header"><span className="card-title">{horizon}-Day Rolling Forecast — Live Unpaid Bills</span></div>
        {loading ? (
          <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
        ) : rows.length === 0 ? (
          <div className="module-coming">
            <div className="big-icon">📈</div>
            <h3>No upcoming outflows</h3>
            <p className="text-muted">Forecast will populate from unpaid bills as you add them in Bill Payments.</p>
          </div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr><th>Date</th><th>Description</th><th>Category</th><th>Outflow</th><th>Running Balance</th></tr>
              </thead>
              <tbody>
                {rows.map((r,i) => (
                  <tr key={i} className={r.balance < Number(settings.criticalThreshold) ? 'overdue' : ''}>
                    <td className="mono">{r.date}</td>
                    <td>{r.label}</td>
                    <td><span className="badge grey">{r.cat}</span></td>
                    <td className="amount" style={{color:'var(--red)'}}>{inr(r.amt)}</td>
                    <td className="amount fw-600">{inr(r.balance)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

const BILLS_COLLECTION = 'bills';
const ADVANCES_COLLECTION = 'advances';

// ─── Bills hooks and helpers ───────────────────────
function useBills() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const q = query(collection(db, BILLS_COLLECTION), orderBy('createdAt', 'desc'));
      const unsub = onSnapshot(q, (snap) => {
        setItems(snap.docs.map(d => ({ docId: d.id, ...d.data() })));
        setLoading(false);
      }, (err) => { console.error('Bills listener error', err); setLoading(false); });
      return unsub;
    }
    if (window.fb) { const unsub = start(); return () => unsub && unsub(); }
    let unsub;
    const handler = () => { unsub = start(); };
    window.addEventListener('firebase-ready', handler, { once: true });
    return () => { window.removeEventListener('firebase-ready', handler); if (unsub) unsub(); };
  }, []);
  return { items, loading };
}
async function addBill(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(collection(db, BILLS_COLLECTION), { ...data, createdAt: Date.now(), paid: false });
}
async function markBillPaid(docId) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(doc(db, BILLS_COLLECTION, docId), { paid: true, paidAt: Date.now() });
}
async function deleteBill(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, BILLS_COLLECTION, docId));
}
async function clearAllBills() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(collection(db, BILLS_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

// ─── Bill Payments Module ──────────────────────────
function BillPayments() {
  const { items, loading } = useBills();
  const { items: advances, loading: advLoading } = useAdvances();
  const { items: pos } = usePurchaseOrders();
  const [catFilter, setCatFilter] = useState('all');
  const [statusFilter, setStatusFilter] = useState('all');
  const [tab, setTab] = useState('bills'); // 'bills' | 'advances'
  const [showNewBill, setShowNewBill] = useState(false);
  const [showNewAdvance, setShowNewAdvance] = useState(false);
  const [linkingAdvance, setLinkingAdvance] = useState(null);
  const [editBill, setEditBill] = useState(null);
  const [editAdvance, setEditAdvance] = useState(null);

  const todayStr = new Date().toISOString().slice(0,10);

  // Bills with computed status
  const withStatus = items.map(b => {
    let status;
    if (b.paid) status = 'Paid';
    else if (b.due === todayStr) status = 'Due Today';
    else if (b.due < todayStr) status = 'Overdue';
    else status = 'Upcoming';
    const days = (status === 'Overdue' && b.due) ? Math.floor((new Date(todayStr) - new Date(b.due)) / 86400000) : 0;
    // Find linked advance deduction
    const linkedAdv = advances.filter(a => a.linkedBill === b.docId);
    const advanceDeducted = linkedAdv.reduce((s,a) => s + Number(a.adjustedAmount||0), 0);
    const netPayable = Math.max(0, Number(b.amount||0) - advanceDeducted);
    return { ...b, computedStatus: status, days, advanceDeducted, netPayable };
  });

  const filtered = withStatus.filter(b =>
    (catFilter === 'all' || b.category === catFilter) &&
    (statusFilter === 'all' || b.computedStatus === statusFilter)
  );

  // Stats
  const overdueTotal = withStatus.filter(b=>b.computedStatus==='Overdue').reduce((s,b)=>s+b.netPayable,0);
  const overdueCount = withStatus.filter(b=>b.computedStatus==='Overdue').length;
  const dueTodayTotal = withStatus.filter(b=>b.computedStatus==='Due Today').reduce((s,b)=>s+b.netPayable,0);
  const next7 = new Date(Date.now()+7*86400000).toISOString().slice(0,10);
  const dueWeekTotal = withStatus.filter(b=>!b.paid&&b.due>=todayStr&&b.due<=next7).reduce((s,b)=>s+b.netPayable,0);
  const paidTotal = withStatus.filter(b=>b.paid).reduce((s,b)=>s+Number(b.amount||0),0);

  // Advance stats
  const totalAdvances = advances.reduce((s,a)=>s+Number(a.amount||0),0);
  const unadjustedAdvances = advances.filter(a=>a.status!=='Fully Adjusted').reduce((s,a)=>s+Number(a.balanceAmount||0),0);

  // PO label lookup
  function poLabel(poNo) {
    const p = pos.find(p=>p.po===poNo);
    return p ? `${p.po} — ${p.vendorName}` : poNo;
  }

  const ADV_STATUS_COLOR = { 'Unadjusted':'red', 'Partially Adjusted':'amber', 'Fully Adjusted':'green' };

  return (
    <div>

        <div>
          <div className="section-title">Bill Payments</div>
          <div className="section-sub">
            {tab==='bills'

          </div>
        </div>
        <div className="flex gap-2">
          {tab==='bills'
            ? <button className="btn btn-primary" onClick={()=>setShowNewBill(true)}>+ Add Bill</button>
            : <button className="btn btn-primary" style={{background:'var(--secondary)'}} onClick={()=>setShowNewAdvance(true)}>+ Record Advance</button>}
          {tab==='bills'
            ? <ClearCollectionButton label="Clear Bills" count={items.length} onClear={clearAllBills} />
            : <ClearCollectionButton label="Clear Advances" count={advances.length} onClear={clearAllAdvances} />}
        </div>
      </div>

      {/* Tabs */}
      <div className="tabs">
        <div className={`tab ${tab==='bills'?'active':''}`} onClick={()=>setTab('bills')}>📑 Bills & Invoices</div>
        <div className={`tab ${tab==='advances'?'active':''}`} onClick={()=>setTab('advances')}>
          💰 Advance Payments
          {unadjustedAdvances > 0 && <span className="nav-badge" style={{background:'var(--amber)',marginLeft:8}}>{advances.filter(a=>a.status!=='Fully Adjusted').length}</span>}
        </div>
      </div>

      {/* ── BILLS TAB ── */}
      {tab==='bills' && (
        <>
          <div className="stats-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
            <div className="stat-card"><div className="stat-label">Overdue (Net)</div><div className="stat-value red">{inr(overdueTotal)}</div><div className="stat-sub">{overdueCount} bill{overdueCount===1?'':'s'}</div></div>
            <div className="stat-card"><div className="stat-label">Due Today (Net)</div><div className="stat-value amber">{inr(dueTodayTotal)}</div></div>
            <div className="stat-card"><div className="stat-label">Due This Week (Net)</div><div className="stat-value blue">{inr(dueWeekTotal)}</div></div>
            <div className="stat-card"><div className="stat-label">Paid Total</div><div className="stat-value green">{inr(paidTotal)}</div></div>
          </div>
          <div className="card">
            <div className="card-body" style={{paddingTop:10,paddingBottom:10}}>
              <div className="flex gap-2">
                <select className="form-input form-select" style={{width:150}} onChange={e=>setCatFilter(e.target.value)}>
                  <option value="all">All Categories</option>
                  {(window.appLists?.billCategories||DEFAULT_LISTS.billCategories).map(c=><option key={c}>{c}</option>)}
                </select>
                <select className="form-input form-select" style={{width:140}} onChange={e=>setStatusFilter(e.target.value)}>
                  <option value="all">All Status</option>
                  <option>Overdue</option><option>Due Today</option><option>Upcoming</option><option>Paid</option>
                </select>
              </div>
            </div>
            {loading ? (
              <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Connecting to Firestore…</p></div>
            ) : filtered.length===0 ? (
              <div className="module-coming"><div className="big-icon">📑</div><h3>No bills yet</h3><p className="text-muted">Add your first bill.</p></div>
            ) : (
              <table>
                <thead>
                  <tr><th>Payee</th><th>Category</th><th>Invoice #</th><th>Due Date</th><th>Bill Amount</th><th>Advance Deducted</th><th>Net Payable</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                  {filtered.map(b => (
                    <tr key={b.docId} className={b.computedStatus==='Overdue'?'overdue':b.computedStatus==='Due Today'?'due-today':''}>
                      <td className="fw-600">{b.payee}</td>
                      <td><span className="badge grey">{b.category}</span></td>
                      <td className="mono">{b.invoiceNo||'—'}</td>
                      <td>{b.due}{b.days>0&&<span style={{color:'var(--red)',fontWeight:600,marginLeft:4}}>+{b.days}d</span>}</td>
                      <td className="amount">{inr(b.amount||0)}</td>
                      <td className="amount" style={{color:'var(--green)'}}>
                        {b.advanceDeducted > 0 ? <>− {inr(b.advanceDeducted)}</> : <span className="text-muted">—</span>}
                      </td>
                      <td className="amount fw-600" style={{color: b.advanceDeducted > 0 ? 'var(--primary)' : 'var(--text)'}}>
                        {inr(b.netPayable)}
                      </td>
                      <td><span className={`badge ${BILL_STATUS_COLOR[b.computedStatus]}`}>{b.computedStatus}</span></td>
                      <td>
                        <div className="flex gap-2">
                          {!b.paid && <button className="btn btn-sm btn-primary" onClick={()=>markBillPaid(b.docId)}>Mark Paid</button>}
                          <button className="btn btn-sm btn-ghost" onClick={()=>{if(confirm('Delete?'))deleteBill(b.docId);}}>Delete</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </>
      )}

      {/* ── ADVANCES TAB ── */}
      {tab==='advances' && (
        <>
          <div className="stats-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
            <div className="stat-card"><div className="stat-label">Total Advances Paid</div><div className="stat-value red">{inr(totalAdvances)}</div></div>
            <div className="stat-card"><div className="stat-label">Unadjusted Balance</div><div className="stat-value amber">{inr(unadjustedAdvances)}</div><div className="stat-sub">{advances.filter(a=>a.status!=='Fully Adjusted').length} pending</div></div>

              <table>

                </thead>
                <tbody>
                  {advances.map(a => (
                    <tr key={a.docId} style={{background: a.status==='Unadjusted' ? 'var(--amber-50)' : a.status==='Fully Adjusted' ? 'var(--green-50)' : ''}}>
                      <td className="fw-600">{a.vendor}</td>
                      <td>{a.datePaid}</td>
                      <td><span className="badge grey">{a.paymentMode}</span></td>
                      <td className="mono" style={{fontSize:11}}>{a.refNumber||'—'}</td>
                      <td className="amount fw-600">{inr(a.amount||0)}</td>
                      <td className="amount" style={{color:'var(--green)'}}>{inr(a.adjustedAmount||0)}</td>
                      <td className="amount fw-600" style={{color: Number(a.balanceAmount||0)>0?'var(--amber)':'var(--green)'}}>{inr(a.balanceAmount||0)}</td>
                      <td style={{fontSize:11.5}}>
                        {a.linkedPO && <div className="mono">{a.linkedPO}</div>}
                        {a.linkedBill && <div style={{color:'var(--text-muted)'}}>Bill linked</div>}
                        {!a.linkedPO && !a.linkedBill && <span className="text-muted">Not linked yet</span>}
                      </td>
                      <td><span className={`badge ${ADV_STATUS_COLOR[a.status]||'grey'}`}>{a.status}</span></td>
                      <td>
                        <div className="flex gap-2">
                          <button className="btn btn-sm btn-ghost" onClick={()=>setEditAdvance(a)}>Edit</button>
                          {a.status !== 'Fully Adjusted' && (
                            <button className="btn btn-sm btn-ghost" onClick={()=>setLinkingAdvance(a)}>Link / Adjust</button>
                          )}
                          <button className="btn btn-sm btn-ghost" onClick={()=>{if(confirm('Delete?'))deleteAdvance(a.docId);}}>Delete</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </>
      )}

      {showNewBill && <NewBillModal onClose={()=>setShowNewBill(false)} />}
      {editBill && <NewBillModal onClose={()=>setEditBill(null)} existing={editBill} />}
      {showNewAdvance && <NewAdvanceModal onClose={()=>setShowNewAdvance(false)} pos={pos} bills={items} />}
      {linkingAdvance && <LinkAdvanceModal advance={linkingAdvance} onClose={()=>setLinkingAdvance(null)} pos={pos} bills={items} />}
    </div>
  );
}

// RECEIPTS — three-layer client billing system
// Billing Schedule → RA Bills → Receipts
// ════════════════════════════════════════════════════
const BILLING_COLLECTION  = 'billing_schedules';
const RABILLS_COLLECTION  = 'ra_bills';
const RECEIPTS_COLLECTION = 'receipts';

// ─── Firestore hooks ───────────────────────────────
function useBillingSchedules() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const unsub = onSnapshot(
        query(collection(db, BILLING_COLLECTION), orderBy('createdAt','desc')),
        snap => { setItems(snap.docs.map(d=>({docId:d.id,...d.data()}))); setLoading(false); },
        err  => { console.error('Billing listener',err); setLoading(false); }
      );
      return unsub;
    }
    if (window.fb) { const u=start(); return ()=>u&&u(); }
    let u; const h=()=>{u=start();};
    window.addEventListener('firebase-ready',h,{once:true});
    return ()=>{ window.removeEventListener('firebase-ready',h); if(u) u(); };
  },[]);
  return {items,loading};
}

// ─── CRUD helpers ──────────────────────────────────
async function addBillingSchedule(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(collection(db, BILLING_COLLECTION), {...data, createdAt:Date.now()});
}
async function deleteBillingSchedule(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, BILLING_COLLECTION, docId));
}
async function addRABill(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(collection(db, RABILLS_COLLECTION), {...data, createdAt:Date.now()});
}
async function updateRABill(docId, data) {
  const { db, doc, updateDoc } = window.fb;
  await updateDoc(doc(db, RABILLS_COLLECTION, docId), data);
}
async function deleteRABill(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, RABILLS_COLLECTION, docId));
}
async function addReceipt(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(collection(db, RECEIPTS_COLLECTION), {...data, createdAt:Date.now()});
}
async function deleteReceipt(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, RECEIPTS_COLLECTION, docId));
}
async function clearAllReceipts() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const [s1,s2,s3] = await Promise.all([
    getDocs(collection(db, BILLING_COLLECTION)),
    getDocs(collection(db, RABILLS_COLLECTION)),
    getDocs(collection(db, RECEIPTS_COLLECTION)),
  ]);
  const batch = writeBatch(db);
  [...s1.docs,...s2.docs,...s3.docs].forEach(d=>batch.delete(d.ref));
  await batch.commit();
}

function nextRABillNumber(existing) {
  return `RA/${FY}/${String(existing+1).padStart(3,'0')}`;
}

// MODAL 1 — New Billing Schedule
// ════════════════════════════════════════════════════
function NewBillingScheduleModal({ onClose }) {
  const [form, setForm] = useState({ client:'', projectRef:'', contractValue:'', project:'' });
  const [milestones, setMilestones] = useState([
    { id:genRowId(), name:'Advance',    pct:'', amount:'', expectedDate:'' },
    { id:genRowId(), name:'RA Bill 1',  pct:'', amount:'', expectedDate:'' },
    { id:genRowId(), name:'Final Bill', pct:'', amount:'', expectedDate:'' },
  ]);
  const [saving, setSaving] = useState(false);
  function set(f,v){setForm(s=>({...s,[f]:v}));}

  function addMilestone(){setMilestones(m=>[...m,{id:genRowId(),name:'',pct:'',amount:'',expectedDate:''}]);}
  function removeMilestone(id){setMilestones(m=>m.filter(r=>r.id!==id));}
  function updateMilestone(id,field,value){
    setMilestones(m=>m.map(r=>{
      if(r.id!==id) return r;
      const next={...r,[field]:value};
      if(field==='pct'&&form.contractValue){
        const pct=parseFloat(value);
        if(!isNaN(pct)) next.amount=String(Math.round((pct/100)*Number(form.contractValue)));
      }
      return next;
    }));
  }

  const pctTotal = milestones.reduce((s,m)=>s+(parseFloat(m.pct)||0),0);
  const amtTotal = milestones.reduce((s,m)=>s+(Number(m.amount)||0),0);

  async function handleSave(){
    if(!form.client.trim()) return;
    setSaving(true);
    try {
      await addBillingSchedule({
        ...form,
        contractValue: Number(form.contractValue)||0,
        milestones: milestones.filter(m=>m.name.trim()),
      });
      onClose();
    } catch(e){ console.error(e); alert('Could not save.'); }
    finally{ setSaving(false); }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'var(--surface)',borderRadius:10,width:640,maxHeight:'92vh',overflowY:'auto',boxShadow:'0 8px 40px rgba(0,0,0,.22)'}} onClick={e=>e.stopPropagation()}>
        <div style={{background:'var(--green)',padding:'14px 18px',position:'sticky',top:0,zIndex:1}}>
          <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>+ New Billing Schedule</span>
        </div>
        <div style={{padding:'18px 20px'}}>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Client Name</label>
              <AutocompleteInput value={form.client} onChange={v=>set('client',v)} suggestions={useKnownNames().clients} placeholder="e.g. Green Valley CHS" />
            </div>
            <div className="form-group">
              <label className="form-label">Project / Site Reference</label>
              <input className="form-input" value={form.projectRef} onChange={e=>set('projectRef',e.target.value)} placeholder="e.g. WTP installation, Thane" />
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Contract Value (₹)</label>
            <input className="form-input font-mono" value={form.contractValue}
              onChange={e=>{set('contractValue',e.target.value);}}
              placeholder="Total contract amount — entering this auto-calculates milestone amounts from %" />
          </div>

          <div style={{borderTop:'1px solid var(--border)',paddingTop:14,marginTop:4}}>
            <label className="form-label" style={{marginBottom:8,display:'block'}}>Billing Milestones</label>
            <div style={{border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',marginBottom:8}}>
              <table style={{width:'100%'}}>
                <thead>
                  <tr style={{background:'var(--grey-50)'}}>
                    <th style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)'}}>Milestone Name</th>
                    <th style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)',width:60}}>%</th>
                    <th style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)',width:120}}>Amount (₹)</th>
                    <th style={{fontSize:10,padding:'6px 8px',textAlign:'left',color:'var(--text-muted)',width:140}}>Expected Date</th>
                    <th style={{width:30}}></th>
                  </tr>
                </thead>
                <tbody>
                  {milestones.map(m=>(
                    <tr key={m.id} style={{borderTop:'1px solid var(--grey-50)'}}>
                      <td style={{padding:4}}>
                        <input className="form-input" style={{fontSize:11.5,padding:'5px 7px'}} value={m.name}
                          onChange={e=>updateMilestone(m.id,'name',e.target.value)} placeholder="e.g. Advance 20%" />
                      </td>
                      <td style={{padding:4}}>
                        <input className="form-input font-mono" style={{fontSize:11.5,padding:'5px 7px'}} value={m.pct}
                          onChange={e=>updateMilestone(m.id,'pct',e.target.value)} placeholder="20" />
                      </td>
                      <td style={{padding:4}}>
                        <input className="form-input font-mono" style={{fontSize:11.5,padding:'5px 7px'}} value={m.amount}
                          onChange={e=>updateMilestone(m.id,'amount',e.target.value)} placeholder="0" />
                      </td>
                      <td style={{padding:4}}>
                        <input className="form-input" type="date" style={{fontSize:11.5,padding:'5px 7px'}} value={m.expectedDate}
                          onChange={e=>updateMilestone(m.id,'expectedDate',e.target.value)} />
                      </td>
                      <td style={{padding:4,textAlign:'center'}}>
                        <span onClick={()=>removeMilestone(m.id)} style={{cursor:'pointer',color:'var(--red)',fontSize:14}}>✕</span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="flex items-center justify-between">
              <button type="button" onClick={addMilestone} className="btn btn-sm btn-outline">+ Add Milestone</button>
              <span style={{fontSize:11,color: Math.abs(pctTotal-100)>0.01&&pctTotal>0?'var(--red)':'var(--text-muted)',fontWeight:Math.abs(pctTotal-100)>0.01&&pctTotal>0?600:400}}>
                Total: {pctTotal}% · {inr(amtTotal)}
                {Math.abs(pctTotal-100)>0.01&&pctTotal>0&&' ⚠ should total 100%'}
              </span>
            </div>
          </div>
          <ProjectSelect value={form.project} onChange={v=>set('project',v)} required />
        </div>
        <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={handleSave} disabled={saving||!form.client.trim()} className="btn btn-primary"
            style={{background:'var(--green)',opacity:saving||!form.client.trim()?0.6:1}}>
            {saving?'Saving…':'Save Billing Schedule'}
          </button>
        </div>
      </div>
    </div>
  );
}

// MODAL 2 — Submit RA Bill
// ════════════════════════════════════════════════════
function SubmitRABillModal({ onClose, schedules, existingCount }) {
  const [form, setForm] = useState({
    raBillNo: nextRABillNumber(existingCount),
    scheduleId: '', client:'', projectRef:'', milestoneIndex: '',
    amountClaimed: '', dateSubmitted: new Date().toISOString().slice(0,10),
    notes: ''
  });
  const [saving, setSaving] = useState(false);
  function set(f,v){setForm(s=>({...s,[f]:v}));}

  const selectedSchedule = schedules.find(s=>s.docId===form.scheduleId);
  const selectedMilestone = selectedSchedule && form.milestoneIndex!==''
    ? selectedSchedule.milestones[Number(form.milestoneIndex)]
    : null;

  function handleScheduleSelect(docId){
    const sc = schedules.find(s=>s.docId===docId);
    set('scheduleId',docId);
    set('client',sc?sc.client:'');
    set('projectRef',sc?sc.projectRef:'');
    set('milestoneIndex','');
    set('amountClaimed','');
  }
  function handleMilestoneSelect(idx){
    set('milestoneIndex',idx);
    const sc = schedules.find(s=>s.docId===form.scheduleId);
    if(sc&&sc.milestones[idx]) set('amountClaimed',String(sc.milestones[idx].amount||''));
  }

  async function handleSave(){
    if(!form.scheduleId||!form.amountClaimed||!form.dateSubmitted) return;
    setSaving(true);
    try {
      await addRABill({
        ...form,
        amountClaimed: Number(form.amountClaimed),
        amountReceived: 0,
        balancePending: Number(form.amountClaimed),
        status: 'Submitted',
        milestoneName: selectedMilestone?.name||'',
      });
      onClose();
    } catch(e){ console.error(e); alert('Could not submit RA Bill.'); }
    finally{ setSaving(false); }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'var(--surface)',borderRadius:10,width:540,maxHeight:'90vh',overflowY:'auto',boxShadow:'0 8px 40px rgba(0,0,0,.22)'}} onClick={e=>e.stopPropagation()}>
        <div style={{background:'var(--primary)',padding:'14px 18px',position:'sticky',top:0,zIndex:1}}>
          <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>📄 Submit Running Bill</span>
        </div>
        <div style={{padding:'18px 20px'}}>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">RA Bill Number</label>
              <input className="form-input font-mono" value={form.raBillNo} onChange={e=>set('raBillNo',e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Date Submitted</label>
              <input className="form-input" type="date" value={form.dateSubmitted} onChange={e=>set('dateSubmitted',e.target.value)} />
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Client / Project</label>
            <select className="form-input form-select" value={form.scheduleId} onChange={e=>handleScheduleSelect(e.target.value)}>
              <option value="">Select billing schedule…</option>
              {schedules.map(sc=>(
                <option key={sc.docId} value={sc.docId}>{sc.client} — {sc.projectRef||'No ref'}</option>
              ))}
            </select>
          </div>

          {selectedSchedule && (
            <div className="form-group">
              <label className="form-label">Against Billing Schedule Milestone</label>
              <select className="form-input form-select" value={form.milestoneIndex} onChange={e=>handleMilestoneSelect(e.target.value)}>
                <option value="">Select milestone this bill applies to…</option>
                {(selectedSchedule.milestones||[]).map((m,i)=>(
                  <option key={i} value={i}>{m.name} — {inr(m.amount||0)}{m.pct?` (${m.pct}%)`:''}</option>
                ))}
              </select>
            </div>
          )}

          {selectedMilestone && (
            <div style={{background:'var(--primary-50)',borderRadius:6,padding:'8px 12px',fontSize:12,marginBottom:14}}>
              <div className="flex justify-between">
                <span>Milestone: <strong>{selectedMilestone.name}</strong></span>
                <span className="amount fw-600">{inr(selectedMilestone.amount||0)}</span>
              </div>
              {selectedMilestone.expectedDate && (
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Expected date: {selectedMilestone.expectedDate}</div>
              )}
            </div>
          )}

          <div className="form-group">
            <label className="form-label">Amount Claimed (₹)</label>
            <input className="form-input font-mono" value={form.amountClaimed} onChange={e=>set('amountClaimed',e.target.value)} placeholder="0" />
          </div>
          <div className="form-group">
            <label className="form-label">Notes</label>
            <input className="form-input" value={form.notes} onChange={e=>set('notes',e.target.value)} placeholder="Optional — scope, period, etc." />
          </div>
        </div>
        <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={handleSave} disabled={saving||!form.scheduleId||!form.amountClaimed} className="btn btn-primary"
            style={{opacity:saving||!form.scheduleId||!form.amountClaimed?0.6:1}}>
            {saving?'Saving…':'Submit RA Bill'}
          </button>
        </div>
      </div>
    </div>
  );
}

// MODAL 3 — Record Receipt against RA Bill
// ════════════════════════════════════════════════════
function RecordReceiptModal({ raBill, onClose, allReceipts }) {
  const alreadyReceived = allReceipts.filter(r=>r.raBillId===raBill.docId).reduce((s,r)=>s+Number(r.amountReceived||0),0);
  const pendingBalance = Math.max(0, Number(raBill.amountClaimed||0) - alreadyReceived);

  const [form, setForm] = useState({
    amountReceived: String(pendingBalance),
    dateReceived: new Date().toISOString().slice(0,10),
    paymentMode: 'NEFT', refNumber: '', notes: ''
  });
  const [saving, setSaving] = useState(false);
  function set(f,v){setForm(s=>({...s,[f]:v}));}

  const newBalance = Math.max(0, pendingBalance - Number(form.amountReceived||0));
  const isShort = Number(form.amountReceived||0) < pendingBalance;
  const isOver = Number(form.amountReceived||0) > pendingBalance;

  async function handleSave(){
    if(!form.amountReceived||!form.dateReceived) return;
    setSaving(true);
    try {
      const amt = Number(form.amountReceived);
      await addReceipt({
        raBillId:        raBill.docId,
        raBillNo:        raBill.raBillNo,
        scheduleId:      raBill.scheduleId,
        client:          raBill.client,
        projectRef:      raBill.projectRef,
        milestoneName:   raBill.milestoneName,
        amountClaimed:   raBill.amountClaimed,
        amountReceived:  amt,
        dateReceived:    form.dateReceived,
        paymentMode:     form.paymentMode,
        refNumber:       form.refNumber,
        notes:           form.notes,
      });
      // Update RA Bill received total and status
      const totalReceived = alreadyReceived + amt;
      const newPending = Math.max(0, Number(raBill.amountClaimed||0) - totalReceived);
      const status = newPending <= 0 ? 'Fully Received' : 'Partially Received';
      await updateRABill(raBill.docId, {
        amountReceived: totalReceived,
        balancePending: newPending,
        status
      });
      onClose();
    } catch(e){ console.error(e); alert('Could not record receipt.'); }
    finally{ setSaving(false); }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'var(--surface)',borderRadius:10,width:480,boxShadow:'0 8px 40px rgba(0,0,0,.22)',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
        <div style={{background:'var(--green)',padding:'14px 18px'}}>
          <span style={{fontWeight:700,fontSize:14,color:'#fff'}}>✓ Record Receipt — {raBill.raBillNo}</span>
        </div>
        <div style={{padding:'18px 20px'}}>
          {/* Cross-reference summary */}
          <div style={{background:'var(--green-50)',border:'1px solid #C8E6C9',borderRadius:6,padding:'10px 14px',fontSize:12,marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:12.5,marginBottom:6,color:'var(--green)'}}>Cross-Reference</div>
            <div className="flex justify-between mt-1"><span style={{color:'var(--text-muted)'}}>Client</span><strong>{raBill.client}</strong></div>
            <div className="flex justify-between mt-1"><span style={{color:'var(--text-muted)'}}>Project</span><span>{raBill.projectRef||'—'}</span></div>
            <div className="flex justify-between mt-1"><span style={{color:'var(--text-muted)'}}>Billing Milestone</span><span>{raBill.milestoneName||'—'}</span></div>
            <div className="flex justify-between mt-1"><span style={{color:'var(--text-muted)'}}>RA Bill No.</span><span className="mono">{raBill.raBillNo}</span></div>
            <div style={{borderTop:'1px solid #C8E6C9',marginTop:8,paddingTop:8}}>
              <div className="flex justify-between"><span style={{color:'var(--text-muted)'}}>Total Claimed</span><span className="amount fw-600">{inr(raBill.amountClaimed||0)}</span></div>
              <div className="flex justify-between mt-1"><span style={{color:'var(--text-muted)'}}>Already Received</span><span className="amount" style={{color:'var(--green)'}}>{inr(alreadyReceived)}</span></div>
              <div className="flex justify-between mt-1"><span style={{color:'var(--text-muted)'}}>Balance Pending</span><span className="amount fw-600" style={{color:'var(--red)'}}>{inr(pendingBalance)}</span></div>
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Amount Received Now (₹)</label>
            <input className="form-input font-mono" value={form.amountReceived}
              onChange={e=>set('amountReceived',e.target.value)} autoFocus />
            {form.amountReceived && (
              <div style={{fontSize:11.5,marginTop:4,color:isOver?'var(--amber)':isShort?'var(--primary)':'var(--green)',fontWeight:500}}>
                {isOver  && `⚠ Exceeds balance by ${inr(Number(form.amountReceived)-pendingBalance)}`}
                {isShort && `Partial payment — balance remaining: ${inr(newBalance)}`}
                {!isOver && !isShort && '✓ Full balance cleared'}
              </div>
            )}
          </div>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Date Received</label>
              <input className="form-input" type="date" value={form.dateReceived} onChange={e=>set('dateReceived',e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Payment Mode</label>
              <select className="form-input form-select" value={form.paymentMode} onChange={e=>set('paymentMode',e.target.value)}>
                {(window.appLists?.paymentModes||DEFAULT_LISTS.paymentModes).map(m=><option key={m}>{m}</option>)}
              </select>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Reference / UTR Number</label>
            <input className="form-input font-mono" value={form.refNumber} onChange={e=>set('refNumber',e.target.value)} placeholder="Transaction reference" />
          </div>
          <div className="form-group">
            <label className="form-label">Notes</label>
            <input className="form-input" value={form.notes} onChange={e=>set('notes',e.target.value)} placeholder="Optional" />
          </div>
        </div>
        <div style={{padding:'0 20px 20px',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={onClose} className="btn btn-ghost">Cancel</button>
          <button onClick={handleSave} disabled={saving||!form.amountReceived||!form.dateReceived} className="btn btn-primary"
            style={{background:'var(--green)',opacity:saving||!form.amountReceived||!form.dateReceived?0.6:1}}>
            {saving?'Saving…':'Record Receipt'}
          </button>
        </div>
      </div>
    </div>
  );
}

// RECEIPTS MODULE — main view
// ════════════════════════════════════════════════════
function Receipts() {
  const { items: schedules,  loading: schedLoading  } = useBillingSchedules();
  const { items: raBills,    loading: raBillLoading  } = useRABills();
  const { items: receipts,   loading: recLoading     } = useReceipts();

  const [tab, setTab] = useState('schedules');
  const [showNewSchedule,  setShowNewSchedule]  = useState(false);
  const [showNewRABill,    setShowNewRABill]     = useState(false);
  const [recordingFor,     setRecordingFor]      = useState(null);
  const [expandedSchedule, setExpandedSchedule] = useState(null);

  // ── Computed helpers ──
  function receivedForRABill(raBillId) {
    return receipts.filter(r=>r.raBillId===raBillId).reduce((s,r)=>s+Number(r.amountReceived||0),0);
  }
  function raBillsForSchedule(scheduleId) {
    return raBills.filter(b=>b.scheduleId===scheduleId);
  }
  function receiptsForRABill(raBillId) {
    return receipts.filter(r=>r.raBillId===raBillId);
  }

  // ── Stats ──
  const totalContract   = schedules.reduce((s,sc)=>s+Number(sc.contractValue||0),0);
  const totalClaimed    = raBills.reduce((s,b)=>s+Number(b.amountClaimed||0),0);
  const totalReceived   = receipts.reduce((s,r)=>s+Number(r.amountReceived||0),0);
  const totalPending    = raBills.reduce((s,b)=>s+Number(b.balancePending||0),0);

  const RA_STATUS_COLOR = {
    'Submitted':'blue','Partially Received':'amber','Fully Received':'green'
  };

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">Receipts</div>
          <div className="section-sub">Billing schedules → RA Bills → Receipts</div>
        </div>
        <div className="flex gap-2">
          <button className="btn btn-primary" style={{background:'var(--green)'}} onClick={()=>setShowNewSchedule(true)}>+ Billing Schedule</button>
          <button className="btn btn-primary" onClick={()=>setShowNewRABill(true)}>+ Submit RA Bill</button>
          <ClearCollectionButton label="Clear All" count={schedules.length+raBills.length+receipts.length} onClear={clearAllReceipts} />
        </div>
      </div>

      {/* Stats */}
      <div className="stats-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        <div className="stat-card"><div className="stat-label">Total Contract Value</div><div className="stat-value">{inr(totalContract)}</div></div>
        <div className="stat-card"><div className="stat-label">Total Billed (Claimed)</div><div className="stat-value blue">{inr(totalClaimed)}</div></div>
        <div className="stat-card"><div className="stat-label">Total Received</div><div className="stat-value green">{inr(totalReceived)}</div></div>
        <div className="stat-card"><div className="stat-label">Balance Pending</div><div className="stat-value red">{inr(totalPending)}</div></div>
      </div>

      {/* Tabs */}
      <div className="tabs">
        <div className={`tab ${tab==='schedules'?'active':''}`} onClick={()=>setTab('schedules')}>📋 Billing Schedules</div>
        <div className={`tab ${tab==='rabills'?'active':''}`} onClick={()=>setTab('rabills')}>
          📄 RA Bills
          {totalPending>0 && <span className="nav-badge" style={{background:'var(--amber)',marginLeft:8}}>{raBills.filter(b=>b.status!=='Fully Received').length}</span>}
        </div>
        <div className={`tab ${tab==='receipts'?'active':''}`} onClick={()=>setTab('receipts')}>✓ All Receipts</div>
      </div>

      {/* ── TAB 1: BILLING SCHEDULES ── */}
      {tab==='schedules' && (
        <div className="card">
          {schedLoading ? (
            <div className="module-coming"><div className="big-icon">⏳</div><p className="text-muted">Loading…</p></div>
          ) : schedules.length===0 ? (
            <div className="module-coming">
              <div className="big-icon">📋</div>

            const scPending  = scRABills.reduce((s,b)=>s+Number(b.balancePending||0),0);

                    <div style={{fontWeight:700,fontSize:13}}>{sc.client}</div>

                                <td style={{padding:'6px 8px'}} className="amount" style={{color:Number(b.balancePending||0)>0?'var(--red)':'var(--green)'}}>{inr(b.balancePending||0)}</td>

const PETTY_COLLECTION = 'petty_cash';
const PETTY_CATEGORIES = [
  'Auto / Fuel',
  'Tea & Snacks',
  'Courier',
  'Stationery',
  'Site Travel',
  'Minor Hardware',
  'Telephone / Recharge',
  'Printing',
  'Bank Charges',
  'Miscellaneous',
];

function usePettyCash() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    function start() {
      const { db, collection, query, orderBy, onSnapshot } = window.fb;
      const unsub = onSnapshot(
        query(collection(db, PETTY_COLLECTION), orderBy('createdAt','desc')),
        snap => { setItems(snap.docs.map(d=>({docId:d.id,...d.data()}))); setLoading(false); },
        err  => { console.error('Petty cash listener',err); setLoading(false); }
      );
      return unsub;
    }
    if (window.fb) { const u=start(); return ()=>u&&u(); }
    let u; const h=()=>{u=start();};
    window.addEventListener('firebase-ready',h,{once:true});
    return ()=>{ window.removeEventListener('firebase-ready',h); if(u) u(); };
  },[]);
  return {items,loading};
}

async function addPettyEntry(data) {
  const { db, collection, addDoc } = window.fb;
  await addDoc(collection(db, PETTY_COLLECTION), {...data, createdAt:Date.now()});
}
async function deletePettyEntry(docId) {
  const { db, doc, deleteDoc } = window.fb;
  await deleteDoc(doc(db, PETTY_COLLECTION, docId));
}
async function clearAllPettyCash() {
  const { db, collection, getDocs, writeBatch } = window.fb;
  const snap = await getDocs(collection(db, PETTY_COLLECTION));
  const batch = writeBatch(db);
  snap.docs.forEach(d=>batch.delete(d.ref));
  await batch.commit();
}
