      </div>
      <Settings currentUser={currentUser} />
    </div>
  );
}

// ─── Topbar titles ─────────────────────────────────────
const TITLES = {
  dashboard:'Dashboard', tasks:'Tasks', requisitions:'Requisitions',
  quotations:'Quotations', workorders:'Work Orders', purchaseorders:'Purchase Orders',
  crossref:'Cross-Reference', projectpnl:'Project P&L', receipts:'Receipts', capital:'Capital & Loans',
  paymenttracker:'Payment Tracker', billpayments:'Bill Payments',
  cashflow:'Cash Flow', pettycash:'Petty Cash', projects:'Projects',
  vendors:'Vendor Master', documents:'Document Vault', chat:'Team Chat',
  reminders:'Reminders', reports:'Reports', settings:'Settings',
};

// ─── App ──────────────────────────────────────────────
function App() {
  const [currentUser, setCurrentUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true); // true while checking session
  const [active, setActiveState] = useState(() => sessionStorage.getItem('nw_active') || 'dashboard');
  function setActive(page) {
    sessionStorage.setItem('nw_active', page);
    setActiveState(page);
  }
  const today = new Date().toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' });

  // Listen for Firebase Auth state — persists across page reloads
  useEffect(() => {
    function startAuthListener() {
      const { auth, onAuthStateChanged, db, doc, onSnapshot } = window.fb;
      const unsub = onAuthStateChanged(auth, async (firebaseUser) => {
        if (firebaseUser) {
          // User is signed in — fetch their Firestore profile
          const userRef = doc(db, 'users', firebaseUser.uid);
          const profileUnsub = onSnapshot(userRef, (snap) => {
            if (snap.exists()) {
              const data = snap.data();
              const profile = {
                uid: firebaseUser.uid,
                name: data.name || firebaseUser.email,
                email: firebaseUser.email,
                initials: data.initials || (data.name ? data.name[0].toUpperCase() : 'U'),
                role: data.role || 'viewer'
              };
              window.currentUser = profile;
              setCurrentUser(profile);
            } else {
              // Auth user exists but no Firestore profile — treat as viewer
              const profile = {
                uid: firebaseUser.uid,
                name: firebaseUser.email,
                email: firebaseUser.email,
                initials: firebaseUser.email[0].toUpperCase(),
                role: 'viewer'
              };
              window.currentUser = profile;
              setCurrentUser(profile);
            }
            setAuthLoading(false);
          });
          return profileUnsub;
        } else {
          // Not signed in
          window.currentUser = null;
          setCurrentUser(null);
          setAuthLoading(false);
        }
      });
      return unsub;
    }

    if (window.fb) {
      const unsub = startAuthListener();
      return () => unsub && unsub();
    } else {
      let unsub;
      const handler = () => { unsub = startAuthListener(); };
      window.addEventListener('firebase-ready', handler, { once: true });
      return () => { window.removeEventListener('firebase-ready', handler); if (unsub) unsub(); };
    }
  }, []);

  async function handleLogout() {
    try {
      const { auth, signOut } = window.fb;
      await signOut(auth);
      window.currentUser = null;
      setCurrentUser(null);
      setActive('dashboard');
    } catch(e) {
      console.error('Logout error:', e);
    }
  }

  // Show loading spinner while checking auth state
  if (authLoading) {
    return (
      <div style={{minHeight:'100vh',background:'var(--primary-dark)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
        <div style={{fontSize:36}}>💧</div>
        <div style={{color:'rgba(255,255,255,.7)',fontSize:13}}>Loading Nirmaan Watertech…</div>
      </div>
    );
  }

  // Show login screen if not authenticated
  if (!currentUser) {
    return <LoginScreen onLogin={(user) => { setCurrentUser(user); }} />;
  }

  return (
    <div className="app">
      {/* Sidebar */}
      <div className="sidebar">
        <div className="sidebar-header">
          <div className="sidebar-logo">💧 Nirman Watertech</div>
          <div className="sidebar-sub">Internal Workflow Platform</div>
        </div>
        {NAV.map((item, i) => {
          if (item.section) return <div className="sidebar-section" key={i}>{item.section}</div>;
          return (
            <div className={`nav-item ${active===item.id?'active':''}`} key={item.id} onClick={()=>setActive(item.id)}>
              <span className="icon">{item.icon}</span>
              <span>{item.label}</span>
              {item.badge && <span className="nav-badge">{item.badge}</span>}
            </div>
          );
        })}

        {/* User info at bottom of sidebar */}
        <div style={{marginTop:'auto',padding:'12px 10px',borderTop:'1px solid rgba(255,255,255,.10)'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 6px',borderRadius:8,cursor:'pointer'}} onClick={handleLogout} title="Click to sign out">
            <div style={{width:30,height:30,borderRadius:'50%',background:'rgba(255,255,255,.15)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>
              {currentUser.initials}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:'#fff',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{currentUser.name}</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.5)',textTransform:'capitalize'}}>{currentUser.role.replace('_',' ')} · Sign out</div>
            </div>
          </div>
        </div>
      </div>

      {/* Main area */}
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{TITLES[active]||'Dashboard'}</div>
          <div className="topbar-right">
            <span style={{fontSize:11,color:'var(--text-muted)'}}>{today}</span>
            <button className="icon-btn" title="Notifications">🔔</button>
            <div className="avatar" title={`${currentUser.name} — ${currentUser.role}`} onClick={handleLogout} style={{cursor:'pointer',title:'Sign out'}}>
              {currentUser.initials}
            </div>
          </div>
        </div>
        <div className="content">
          <ErrorBoundary key={active}>
            <Module id={active} setActive={setActive} currentUser={currentUser} />
          </ErrorBoundary>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
